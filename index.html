      '<div style="display:flex;justify-content:space-between;margin-bottom:6px">' +
      '<div style="font-family:var(--display);font-size:14px;letter-spacing:2px;color:var(--accent)">' + (answered+1) + ' OF ' + questions.length + '</div>' +
      '<button onclick="gbBuilderBack()" style="background:none;border:none;font-family:var(--display);font-size:13px;letter-spacing:2px;color:var(--text3);cursor:pointer">← BACK</button></div>' +
      '<div style="height:3px;background:var(--bg3);margin-bottom:20px"><div style="width:' + progress + '%;height:100%;background:var(--accent)"></div></div>' +
      '<div style="font-family:var(--display);font-size:22px;letter-spacing:2px;color:var(--text);margin-bottom:16px">' + current.label + '</div>' +
      current.opts.map(function(opt) {
        return '<button data-qid="' + current.id + '" data-qval="' + opt.replace(/"/g,'&quot;') + '" onclick="gbBuilderAnswer(this.dataset.qid,this.dataset.qval)" class="gen-option">' + opt + '</button>';
      }).join('') + '</div>';
  }

  if (step === 7) {
    var qq = gbBuilderQuestions(d.discipline, d.goalType);
    var countdown = goalCountdown(d.targetDate);
    return '<div class="fade-in" style="padding:24px 16px 30px">' + hdr +
      '<div style="font-family:var(--display);font-size:28px;letter-spacing:2px;color:var(--text);margin-bottom:4px">' + d.label + '</div>' +
      '<div style="font-family:var(--display);font-size:14px;color:var(--accent);letter-spacing:2px;margin-bottom:16px">' + goalSubLabel(d) + (countdown ? ' · ' + countdown : '') + '</div>' +
      '<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:16px">' +
      '<div style="font-family:var(--display);font-size:13px;letter-spacing:2px;color:var(--text3);margin-bottom:10px">GOAL SUMMARY</div>' +
      '<div style="font-family:var(--body);font-size:14px;color:var(--text2);margin-bottom:4px">' + getDisciplineLabel(d.discipline) + (d.activity ? ' → ' + getActivityLabel(d.activity) : '') + (d.goalType && d.goalType !== 'general' ? ' → ' + getGoalTypeLabel(d.goalType) : '') + '</div>' +
      (d.targetDate ? '<div style="font-family:var(--body);font-size:14px;color:var(--text2);margin-bottom:4px">Target: ' + new Date(d.targetDate + 'T12:00:00').toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}) + '</div>' : '') +
      (d.crossTraining.length ? '<div style="font-family:var(--body);font-size:14px;color:var(--text2);margin-bottom:4px">Cross-training: ' + d.crossTraining.map(getDisciplineLabel).join(', ') + '</div>' : '') +
      '<div style="font-family:var(--body);font-size:14px;color:var(--text2)">Plan: ' + (d.planType==='app'?'App-generated':d.planType==='own'?'Following own plan':'Undecided') + '</div>' +
      (d.planType==='app'&&Object.keys(GB.builderAnswers).length ? '<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">' + qq.map(function(q){return '<div style="font-family:var(--display);font-size:14px;color:var(--text3);margin-bottom:2px">' + q.label.replace('?','') + ': <span style="color:var(--text2)">' + (GB.builderAnswers[q.id]||'—') + '</span></div>';}).join('') + '</div>' : '') +
      '</div>' +
      (GB.error ? '<div style="font-family:var(--body);font-size:13px;color:var(--red);margin-bottom:12px">' + GB.error + '</div>' : '') +
      (GB.loading ? '<div style="text-align:center;padding:20px"><div class="spinner"></div></div>' :
        '<button onclick="gbSaveGoal()" class="action-btn amber">SAVE GOAL</button>') +
      '<button onclick="gbCancel()" class="action-btn secondary">CANCEL</button></div>';
  }
  return '';
}
function gbBuilderBack(){const k=Object.keys(GB.builderAnswers);if(k.length){delete GB.builderAnswers[k[k.length-1]];renderMain();}else{GB.step=5;renderMain();}}
function gbBuilderAnswer(k,v){GB.builderAnswers[k]=v;renderMain();}

function gbSaveGoal() {
  GB.loading = true; GB.error = null; renderMain();
  try {
    const d = GB.draft;
    const id = d.id || makeGoalId();
    let planData = null;

    if (d.planType === 'app' && Object.keys(GB.builderAnswers).length) {
      planData = buildOfflinePlan({
        discipline: d.discipline,
        activity: d.activity,
        goalType: d.goalType,
        crossTraining: d.crossTraining,
        ...GB.builderAnswers,
      });
      if (!planData) { GB.loading = false; GB.error = 'Could not generate plan. Try different options.'; renderMain(); return; }
    }

    // Validate active goal count
    const existing = getGoals();
    const activeCount = existing.filter(g => g.status === 'active' && g.id !== id).length;
    if (activeCount >= 3 && !GB.editingId) {
      GB.loading = false;
      GB.error = 'You have 3 active goals. Archive one before adding another.';
      renderMain(); return;
    }

    // Model B: save program as a standalone entity, link via programId
    let programId = d.programId || null; // may already be linked (reuse case)
    if (planData) {
      const prog = {
        id: programId || makeProgramId(),
        name: d.label || 'Training Program',
        phases: planData.phases,
        planType: d.planType,
        discipline: d.discipline || null,
        goalType: d.goalType || null,
        createdAt: new Date().toISOString(),
        sourceGoalId: id,
      };
      saveProgramEntry(prog);
      programId = prog.id;
    }

    upsertGoal({id, label:d.label, targetDate:d.targetDate||null, discipline:d.discipline,
      activity:d.activity||null, goalType:d.goalType||null, crossTraining:d.crossTraining,
      planType:d.planType,
      programId: programId,   // Model B: link to program
      planData: null,         // Model B: no longer embedded
      status:'active'});

    // If goal has a program, set as active and update start date
    if (programId) saveSettings({startDate: todayStr()});

    GB.loading = false;
    announce('Goal saved');
    gbReset();
    S.showGoalCreator = false;
    S.activeGoalId = id;
    renderMain();
  } catch(e) {
    GB.loading = false;
    GB.error = 'Something went wrong. ' + e.message;
    renderMain();
  }
}

// Mid-goal discipline change
function goalChangeDisc(goalId) {
  const goal = getGoals().find(g => g.id === goalId);
  if (!goal) return;
  GB.editingId = goalId;
  GB.draft = {...goal};
  GB.draft.id = goalId;
  GB.builderAnswers = {};
  GB.step = 2; // start at discipline selection
  S.showGoalCreator = true;
  renderMain();
}

// Adapt plan (keeps discipline, rebuilds plan)
function goalAdaptPlan(goalId) {
  const goal = getGoals().find(g => g.id === goalId);
  if (!goal) return;
  // Archive old plan data under a history key
  if (goal.planData) {
    const history = JSON.parse(localStorage.getItem('forge_plan_history') || '[]');
    history.unshift({goalId, archivedAt: new Date().toISOString(), planData: goal.planData});
    localStorage.setItem('forge_plan_history', JSON.stringify(history.slice(0, 10)));
  }
  GB.editingId = goalId;
  GB.draft = {...goal};
  GB.draft.id = goalId;
  GB.builderAnswers = {};
  GB.step = 6; // go straight to builder questions
  S.showGoalCreator = true;
  renderMain();
}

function buildOfflinePlan(opts) {
  const { discipline, activity, goalType, crossTraining = [],
          days = '4 days', duration = '8 weeks', experience = 'Intermediate', equipment = 'Dumbbells' } = opts;

  const daysNum  = parseInt(days)  || 4;
  const weeksNum = parseInt(duration) || 8;
  const level    = experience.toLowerCase().includes('begin') ? 'beginner' :
                   experience.toLowerCase().includes('adv')   ? 'advanced' : 'intermediate';
  const equip    = equipment.toLowerCase();

  if (discipline === 'endurance') return buildEndurancePlan(activity, goalType, daysNum, weeksNum, level, crossTraining);
  if (discipline === 'functional') return buildFunctionalPlan(daysNum, weeksNum, level, equip, crossTraining);
  if (discipline === 'hiit')       return buildHIITPlan(daysNum, weeksNum, level, equip, crossTraining);
  if (discipline === 'mobility')   return buildMobilityPlan(daysNum, weeksNum, level, crossTraining);
  return buildWeightTrainingPlan(daysNum, weeksNum, level, equip, crossTraining);
}

// ---- HELPERS ----
function makePlanId() { return 'p_' + Date.now().toString(36); }

function phaseColor(i) {
  return ['var(--green)','var(--accent)','#80961F','#A6CB2A','#A6CB2A'][i % 5];
}

function dowLabel(dow) {
  return ['SUN','MON','TUE','WED','THU','FRI','SAT'][dow];
}

// Build a dowMap and schedule from an array of day-of-week numbers
// sessions = [{dow:1, label:'Upper Body', tag:'IRON', exercises:[...]}, ...]
function buildPhase(id, title, short, weeksStr, durationDays, tagline, sessions) {
  const dowMap = {};
  sessions.forEach((s, i) => { dowMap[String(s.dow)] = i; });
  const schedule = sessions.map(function(s) {
    return { day: dowLabel(s.dow), label: s.label, tag: s.tag, exercises: s.exercises };
  });
  return { id, title, short, weeks: weeksStr, durationDays, color: phaseColor(id), tagline, dowMap, schedule };
}

// Standard day-of-week assignments by days/week count
function getDows(count) {
  const patterns = {
    2: [1,4],           // Mon Thu
    3: [1,3,5],         // Mon Wed Fri
    4: [1,2,4,6],       // Mon Tue Thu Sat
    5: [1,2,3,4,6],     // Mon-Thu Sat
    6: [1,2,3,4,5,6],   // Mon-Sat
  };
  return patterns[count] || patterns[4];
}

// ---- WEIGHT TRAINING PLAN ----
function buildWeightTrainingPlan(days, weeks, level, equip, crossTraining) {
  const hasXtrain = crossTraining.length > 0;
  const dows = getDows(days);
  const phases = [];

  // Determine split based on days
  let split = 'fullbody';
  if (days >= 4) split = 'upperlower';
  if (days >= 5) split = 'ppl';

  // Phase 1: Foundation (weeks 1 - half)
  const p1weeks = Math.ceil(weeks / 2);
  const p2weeks = weeks - p1weeks;

  function makeWeightSessions(phase) {
    const mult = phase === 2 ? ' — add weight' : '';
    if (split === 'fullbody') {
      return dows.map(function(dow, i) {
        var isXt = hasXtrain && i === dows.length - 1;
        if (isXt) return {dow, label:'Active Recovery', tag:'RECOVERY', exercises: warmup().concat(EX.mobFull).concat(cool())};
        var exs = pickEquip(equip, warmup().concat(EX.pushDB.slice(0,2)).concat(EX.pullDB.slice(0,2)).concat(EX.lowerDB.slice(0,2)).concat(core()).concat(cool()),
                                   warmup().concat(EX.fullBW).concat(core()).concat(cool()));
        return {dow, label:'Full Body'+(phase===2?' — Load':''), tag: equip.includes('body')?'BODYWEIGHT':'IRON', exercises: exs};
      });
    }
    if (split === 'upperlower') {
      return dows.map(function(dow, i) {
        var isXt = hasXtrain && (i === 1 || i === dows.length - 1);
        if (isXt) return {dow, label:'Cross-Training', tag:'ACTIVE', exercises: warmup().concat(EX.cardioXt).concat(cool())};
        if (i % 2 === 0) {
          return {dow, label:'Upper Body'+mult, tag:'IRON', exercises: warmup().concat(EX.pushDB.slice(0,3)).concat(EX.pullDB.slice(0,2)).concat(cool())};
        } else {
          return {dow, label:'Lower Body'+mult, tag:'IRON', exercises: warmup().concat(EX.lowerDB).concat(core()).concat(cool())};
        }
      });
    }
    // PPL
    return dows.map(function(dow, i) {
      var t = i % 3;
      if (t === 0) return {dow, label:'Push'+mult, tag:'IRON', exercises: warmup().concat(EX.pushDB).concat(cool())};
      if (t === 1) return {dow, label:'Pull'+mult, tag:'IRON', exercises: warmup().concat(EX.pullDB).concat(cool())};
      return {dow, label:'Legs'+mult, tag:'IRON', exercises: warmup().concat(EX.lowerDB).concat(core()).concat(cool())};
    });
  }

  phases.push(buildPhase(0, 'FOUNDATION', 'BASE', 'Wks 1-'+p1weeks, p1weeks*7,
    'Establish movement patterns and baseline strength.', makeWeightSessions(1)));
  if (p2weeks > 0) {
    phases.push(buildPhase(1, 'BUILD', 'BUILD', 'Wks '+(p1weeks+1)+'-'+weeks, p2weeks*7,
      'Progressive overload. Add weight each week where possible.', makeWeightSessions(2)));
  }
  return {title:'Weight Training — '+weeks+' Weeks', summary:'Progressive '+split.replace('ppl','Push/Pull/Legs').replace('upperlower','Upper/Lower')+' program, '+weeks+' weeks.', phases};
}

// ---- ENDURANCE PLAN ----
function buildEndurancePlan(activity, goalType, days, weeks, level, crossTraining) {
  const isRun = activity === 'running';
  const isRow = activity === 'rowing';
  const hasXT = crossTraining.includes('weight_training') || crossTraining.includes('functional');
  const phases = [];

  if (isRun) {
    // Long run distance targets by goal type and week
    function longRunTarget(week, goalType, weeks) {
      var pct = week / weeks;
      var peak = goalType === 'full_marathon' ? 20 : goalType === 'half_marathon' ? 12 :
                 goalType === '10k' ? 8 : 5;
      if (pct > 0.85) return Math.round(peak * 0.7); // taper
      return Math.round(peak * Math.min(pct * 1.2, 0.95));
    }

    function easyMiles(week, goalType, weeks) {
      return Math.max(2, Math.round(longRunTarget(week, goalType, weeks) * 0.5));
    }

    function tempoMiles(week, goalType, weeks) {
      return Math.max(2, Math.round(longRunTarget(week, goalType, weeks) * 0.4));
    }

    var dows = getDows(Math.min(days, 5));
    var runDows = dows.slice(0, isRow ? dows.length : dows.length);

    // Split weeks into phases
    var p1 = Math.ceil(weeks * 0.3); // base
    var p3 = Math.min(3, Math.ceil(weeks * 0.15)); // taper
    var p2 = weeks - p1 - p3; // build

    function makeRunWeek(weekNum) {
      return dows.map(function(dow, i) {
        var isLong = i === dows.length - 1;
        var isTempo = !isLong && i === 1 && weekNum > p1;
        var isIntervals = !isLong && !isTempo && i === 2 && weekNum > p1 + 2;
        var isXT = hasXT && (i === 0);

        if (isXT) return {dow, label:'Strength Cross-Training', tag:'IRON',
          exercises: warmup().concat(EX.pushDB.slice(0,2)).concat(EX.pullDB.slice(0,2)).concat(EX.lowerDB.slice(0,2)).concat(cool())};
        if (isLong) return {dow, label:'Long Run', tag:'RUN',
          exercises: warmup().concat(EX.runLong(longRunTarget(weekNum, goalType, weeks))).concat(cool())};
        if (isTempo) return {dow, label:'Tempo Run', tag:'RUN',
          exercises: warmup().concat(EX.runTempo(tempoMiles(weekNum, goalType, weeks))).concat(cool())};
        if (isIntervals) return {dow, label:'Interval Run', tag:'RUN',
          exercises: warmup().concat(EX.runIntervals()).concat(cool())};
        return {dow, label:'Easy Run', tag:'RUN',
          exercises: warmup().concat(EX.runEasy(easyMiles(weekNum, goalType, weeks))).concat(cool())};
      });
    }

    phases.push(buildPhase(0, 'BASE BUILDING', 'BASE', 'Wks 1-'+p1, p1*7,
      'Build aerobic foundation. Every run at conversational pace.', makeRunWeek(1)));
    if (p2 > 0) phases.push(buildPhase(1, 'BUILD', 'BUILD', 'Wks '+(p1+1)+'-'+(p1+p2), p2*7,
      'Increase mileage and introduce quality work. Trust the process.', makeRunWeek(Math.round(p1+p2/2))));
    if (p3 > 0) phases.push(buildPhase(2, 'TAPER', 'TAPER', 'Wks '+(weeks-p3+1)+'-'+weeks, p3*7,
      'Reduce volume, keep intensity. Arrive to the start line fresh.', makeRunWeek(weeks)));
  } else if (isRow) {
    var dows2 = getDows(Math.min(days,5));
    var p1r = Math.ceil(weeks*0.4), p2r = weeks - p1r;
    function makeRowWeek(phase) {
      return dows2.map(function(dow,i) {
        var isInterval = i===1&&phase===2;
        var isXT = hasXT && i===0;
        if (isXT) return {dow, label:'Strength Cross-Training', tag:'IRON',
          exercises: warmup().concat(EX.pushDB.slice(0,2)).concat(EX.pullDB.slice(0,2)).concat(cool())};
        if (isInterval) return {dow, label:'Row Intervals', tag:'ROW',
          exercises: warmup().concat(EX.rowIntervals()).concat(cool())};
        return {dow, label:'Steady Row', tag:'ROW',
          exercises: warmup().concat(EX.rowEasy(phase===1?20:30)).concat(cool())};
      });
    }
    phases.push(buildPhase(0,'BASE','BASE','Wks 1-'+p1r,p1r*7,'Build aerobic base on the rower.',makeRowWeek(1)));
    if (p2r>0) phases.push(buildPhase(1,'BUILD','BUILD','Wks '+(p1r+1)+'-'+weeks,p2r*7,'Introduce intervals and push the pace.',makeRowWeek(2)));
  } else {
    // General / cycling / swimming / walking — use generic endurance structure
    var dows3 = getDows(Math.min(days,5));
    var p1g = Math.ceil(weeks*0.4), p2g = weeks-p1g;
    var actLabel = activity==='cycling'?'Ride':activity==='swimming'?'Swim':activity==='walking'?'Walk/Hike':'Cardio Session';
    function makeGenSessions(phase) {
      return dows3.map(function(dow,i) {
        var isXT = hasXT&&i===0;
        if (isXT) return {dow,label:'Strength Cross-Training',tag:'IRON',
          exercises:warmup().concat(EX.pushDB.slice(0,2)).concat(EX.pullDB.slice(0,2)).concat(cool())};
        return {dow,label:actLabel+(phase===2?' — Push':''),tag:'ENDURANCE',
          exercises:warmup().concat(EX.rowEasy(phase===1?30:45)).concat(cool())};
      });
    }
    phases.push(buildPhase(0,'BASE','BASE','Wks 1-'+p1g,p1g*7,'Build your aerobic foundation.',makeGenSessions(1)));
    if (p2g>0) phases.push(buildPhase(1,'BUILD','BUILD','Wks '+(p1g+1)+'-'+weeks,p2g*7,'Increase duration and effort.',makeGenSessions(2)));
  }

  var goalLabel = getGoalTypeLabel(goalType) || 'General Fitness';
  var actLabel2 = getActivityLabel(activity);
  return {title: actLabel2+' — '+goalLabel+' — '+weeks+' Weeks', summary: weeks+'-week '+actLabel2.toLowerCase()+' program targeting '+goalLabel+'.', phases};
}

// ---- FUNCTIONAL FITNESS PLAN ----
function buildFunctionalPlan(days, weeks, level, equip, crossTraining) {
  var dows = getDows(days);
  var hasXT = crossTraining.length > 0;
  var p1 = Math.ceil(weeks/2), p2 = weeks-p1;

  function makeWOD(phase, i) {
    var isXT = hasXT && i === dows.length-1;
    if (isXT) return {dow:dows[i],label:'Skill + Mobility',tag:'SKILL',
      exercises:warmup().concat(EX.mobFull).concat(cool())};
    var amrapMins = phase===1?12:15;
    var wods = [
      EX.wodAmrap(amrapMins,['10 push-ups','15 air squats','10 ring rows','200m run']),
      EX.wodForTime(['5 rounds','10 DB thrusters','10 burpees','200m run']),
      EX.wodAmrap(amrapMins,['8 DB push press','12 DB goblet squats','10 sit-ups']),
      EX.wodForTime(['3 rounds','15 DB deadlifts','12 push-ups','9 box jumps or step-ups']),
      EX.wodAmrap(amrapMins,['10 DB snatches each arm','12 reverse lunges','10 push-ups']),
      EX.wodForTime(['4 rounds','10 DB thrusters','15 V-ups','10 pull-ups or rows']),
    ];
    return {dow:dows[i],label:'WOD '+(i+1),tag:'FUNCTIONAL',
      exercises:warmup().concat(wods[i % wods.length]).concat(cool())};
  }

  var phase1 = buildPhase(0,'SKILL BUILDING','BASE','Wks 1-'+p1,p1*7,'Learn the movements. Intensity comes later.',dows.map((_,i)=>makeWOD(1,i)));
  var phases = [phase1];
  if (p2>0) {
    var phase2 = buildPhase(1,'INTENSITY','BUILD','Wks '+(p1+1)+'-'+weeks,p2*7,'Push output. Track your scores every session.',dows.map((_,i)=>makeWOD(2,i)));
    phases.push(phase2);
  }
  return {title:'Functional Fitness — '+weeks+' Weeks',summary:weeks+'-week functional fitness program with WODs and progressive intensity.',phases};
}

// ---- HIIT PLAN ----
function buildHIITPlan(days, weeks, level, equip, crossTraining) {
  var dows = getDows(days);
  var hasXT = crossTraining.length > 0;
  var p1=Math.ceil(weeks/2),p2=weeks-p1;

  function makeHIIT(phase,i) {
    var isXT = hasXT && i===0;
    var isMob = i===dows.length-1;
    if (isXT) return {dow:dows[i],label:'Cross-Training',tag:'ACTIVE',exercises:warmup().concat(EX.cardioXt).concat(cool())};
    if (isMob) return {dow:dows[i],label:'Active Recovery',tag:'RECOVERY',exercises:warmup().concat(EX.mobRecovery).concat(cool())};
    var session = i%2===0 ? EX.hiitTabata : EX.hiitIntervals;
    return {dow:dows[i],label:'HIIT Session',tag:'HIIT',exercises:warmup().concat(session).concat(core()).concat(cool())};
  }

  var phases=[buildPhase(0,'BASE HIIT','BASE','Wks 1-'+p1,p1*7,'Build work capacity. Controlled intensity.',dows.map((_,i)=>makeHIIT(1,i)))];
  if (p2>0) phases.push(buildPhase(1,'PEAK HIIT','PEAK','Wks '+(p1+1)+'-'+weeks,p2*7,'Maximum effort. Leave nothing in the tank.',dows.map((_,i)=>makeHIIT(2,i))));
  return {title:'HIIT — '+weeks+' Weeks',summary:weeks+'-week high-intensity interval program.',phases};
}

// ---- MOBILITY PLAN ----
function buildMobilityPlan(days, weeks, level, crossTraining) {
  var dows = getDows(Math.min(days,7));
  var hasXT = crossTraining.length>0;
  var p1=Math.ceil(weeks/2),p2=weeks-p1;

  function makeMob(i) {
    var isXT = hasXT && i===dows.length-1;
    if (isXT) return {dow:dows[i],label:'Light Strength',tag:'ACTIVE',exercises:warmup().concat(EX.lowerBW.slice(0,2)).concat(EX.core.slice(0,2)).concat(cool())};
    var isFull = i%3===1;
    return {dow:dows[i],label:isFull?'Full Mobility':'Recovery Flow',tag:'MOBILITY',
      exercises:isFull?EX.mobFull:EX.mobRecovery};
  }

  var phases=[buildPhase(0,'FOUNDATION','BASE','Wks 1-'+p1,p1*7,'Establish baseline mobility and body awareness.',dows.map((_,i)=>makeMob(i)))];
  if (p2>0) phases.push(buildPhase(1,'DEEPEN','DEEPEN','Wks '+(p1+1)+'-'+weeks,p2*7,'Increase range and hold dufuel.',dows.map((_,i)=>makeMob(i))));
  return {title:'Mobility — '+weeks+' Weeks',summary:weeks+'-week mobility and recovery program.',phases};
}

function saveStoredPlan(plan) {
  localStorage.setItem(USERPLAN_KEY, JSON.stringify(plan));
  syncPlanToSupabase(plan).catch(() => {});
}
function deletePlan() {
  localStorage.removeItem(USERPLAN_KEY);
}

// getActivePlan() — returns custom plan or falls back to built-in PHASES
function getActivePlan() {
  const stored = getStoredPlan();
  return stored ? stored.phases : null; // null = use PHASES
}
function hasCustomPlan() {
  return !!getStoredPlan();
}
function getPlanPhases() {
  return getActivePlan() || PHASES;
}
function getPlanPhaseLengths() {
  const plan = getActivePlan();
  if (!plan) return PHASE_LENGTHS;
  // Custom plans store durationDays per phase
  return plan.map(ph => ph.durationDays || 14);
}

// --- Workout Library ---
function getLibrary() {
  try { return JSON.parse(localStorage.getItem(LIBRARY_KEY) || '[]'); }
  catch(e) { return []; }
}
function saveToLibrary(workout) {
  const lib = getLibrary();
  const entry = {
    id: Date.now().toString(),
    name: workout.name || 'Saved Workout',
    exercises: workout.exercises,
    savedAt: new Date().toISOString(),
  };
  lib.unshift(entry);
  localStorage.setItem(LIBRARY_KEY, JSON.stringify(lib.slice(0, 50))); // max 50
  syncLibraryToSupabase(entry).catch(() => {});
  return entry.id;
}
function deleteFromLibrary(id) {
  const lib = getLibrary().filter(w => w.id !== id);
  localStorage.setItem(LIBRARY_KEY, JSON.stringify(lib));
}
function getLibraryItem(id) {
  return getLibrary().find(w => w.id === id) || null;
}

// --- Supabase sync (non-blocking) ---
async function syncPlanToSupabase(plan) {
  if (SUPABASE_URL === 'YOUR_SUPABASE_URL') return;
  const uid = getUserId();
  await supaFetch('user_plans?user_id=eq.' + uid, {
    method: 'DELETE', prefer: 'return=minimal',
  });
  await supaFetch('user_plans', {
    method: 'POST', prefer: 'return=minimal',
    body: JSON.stringify({
      user_id: uid,
      user_name: getUser()?.name || 'unknown',
      plan_data: JSON.stringify(plan),
    }),
  });
}
async function syncLibraryToSupabase(entry) {
  if (SUPABASE_URL === 'YOUR_SUPABASE_URL') return;
  await supaFetch('workout_library', {
    method: 'POST', prefer: 'return=minimal',
    body: JSON.stringify({
      user_id: getUserId(),
      workout_id: entry.id,
      workout_name: entry.name,
      workout_data: JSON.stringify(entry.exercises),
    }),
  });
}
async function loadPlanFromSupabase() {
  if (SUPABASE_URL === 'YOUR_SUPABASE_URL') return null;
  try {
    const uid = getUserId();
    const res = await supaFetch('user_plans?user_id=eq.' + uid + '&limit=1');
    if (!res.ok) return null;
    const rows = await res.json();
    if (!rows.length) return null;
    return JSON.parse(rows[0].plan_data);
  } catch(e) { return null; }
}

// --- Export / Import ---
function exportAllData() {
  const data = {
    goals: localStorage.getItem(GOALS_KEY),
    restDuration: localStorage.getItem('forge_rest_duration'),
    streakAcked: localStorage.getItem('forge_streak_acked'),
    version: 2,
    exportedAt: new Date().toISOString(),
    user: getUser(),
    plan: getStoredPlan(),
    logs: loadStore(),
    library: getLibrary(),
    checkins: getCheckinsRaw(),
    fuel: getFuelRaw(),
    ptTests: getPTTests(),
    metrics: getMetrics(),
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'forge-backup-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
}
function getCheckinsRaw() {
  try { return JSON.parse(localStorage.getItem(CHECKIN_KEY) || '{}'); }
  catch(e) { return {}; }
}
function getFuelRaw() {
  try { return JSON.parse(localStorage.getItem(FUEL_KEY) || '{}'); }
  catch(e) { return {}; }
}
function importData(jsonStr) {
  try {
    const data = JSON.parse(jsonStr);
    if (!data.version) throw new Error('Invalid backup file');
    if (data.user) saveUser(data.user);
    if (data.plan) localStorage.setItem(USERPLAN_KEY, JSON.stringify(data.plan));
    if (data.logs) localStorage.setItem(STORE_KEY, JSON.stringify(data.logs));
    if (data.library) localStorage.setItem(LIBRARY_KEY, JSON.stringify(data.library));
    if (data.checkins) localStorage.setItem(CHECKIN_KEY, JSON.stringify(data.checkins));
    if (data.fuel) localStorage.setItem(FUEL_KEY, JSON.stringify(data.fuel));
    if (data.ptTests) localStorage.setItem(PT_KEY, JSON.stringify(data.ptTests));
    if (data.metrics) localStorage.setItem(METRICS_KEY, JSON.stringify(data.metrics));
    return true;
  } catch(e) {
    console.error('Import failed:', e);
    return false;
  }
}

function renderExRow(ex, prefix){
 const tm=TM[ex.t||ex.type]||TM.bw;
 const name=ex.n||ex.name||'';
 const detail=ex.d||ex.detail||'';
 const note=ex.note||'';
 const key=(prefix||'')+name;
 const isOpen=!!S.expandedEx[key];
 const desc=EX_DESC[name];
 const pregAvoid=isPregnancyMode()&&PREGNANCY_AVOID.includes(name);
 const pregMod=isPregnancyMode()&&!pregAvoid&&PREGNANCY_MODIFY[name];
 const esc=key.replace(/'/g,"\\'");
 return `<div class="ex-row${desc?' has-desc':''}" ${desc?`onclick="toggleExDesc('${esc}')"`:''}>
  <span class="ex-tag" style="color:${tm.c};border-color:${tm.c}">${tm.label}</span>
  <div style="flex:1;min-width:0">
   <div class="ex-name">${name}</div>
   <div class="ex-detail">${detail}</div>
   ${note?`<div class="ex-note">${note}</div>`:''}
   ${pregAvoid?`<div style="font-family:var(--display);font-size:13px;color:var(--red);letter-spacing:1px;margin-top:4px">SKIP - NOT SAFE IN PREGNANCY</div>`:''}
   ${pregMod?`<div style="font-family:var(--display);font-size:13px;color:var(--accent);letter-spacing:1px;margin-top:4px">MODIFY: ${pregMod}</div>`:''}
  </div>
  ${desc?`<span class="ex-toggle${isOpen?' open':''}">${isOpen?'−':'+'}</span>`:''}
 </div>
 ${isOpen&&desc?`<div class="ex-desc">
  ${desc.split('\n').map(line=>line.startsWith('★')?`<span class="ex-desc-cue">${line}</span>`:`<div class="ex-desc-text">${line}</div>`).join('')}
 </div>`:''}`
}

async function buildAIPlan_unused(){
  PB.loading=true;PB.error=null;PB.generatedPlan=null;renderMain();
  const a=PB.answers;
  const prompt='Create a structured training plan. Requirements: Goal: '+a.goal+'. Days/week: '+a.days+'. Duration: '+a.duration+'. Equipment: '+a.equip+'. Level: '+a.level+'. Split: '+a.focus+'. Return ONLY valid JSON: {"title":"Plan name","summary":"One sentence","phases":[{"id":0,"title":"PHASE NAME","short":"SHORT","weeks":"Wks 1-4","durationDays":28,"color":"#80961F","tagline":"Focus","dowMap":{"1":0,"3":1,"5":2},"schedule":[{"day":"MON","label":"Session name","tag":"TYPE","exercises":[{"n":"Exercise","d":"3 x 10 cue","t":"lift","log":true}]}]}]}. Rules: dowMap maps JS day-of-week (0=Sun) to schedule index. t values: warmup|bw|lift|circuit|core|cardio|mob|cool. Add log:true to loggable exercises, ro:true for reps-only. durationDays = weeks*7. Use only '+a.equip+' appropriate exercises. Scale to '+a.level+'.';
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:4000,system:'You are a fitness coach. Output ONLY valid JSON. No markdown, no explanation.',messages:[{role:'user',content:prompt}]})});
    if(!res.ok) throw new Error('API '+res.status);
    const data=await res.json();
    const text=data.content?.find(b=>b.type==='text')?.text||'';
    const plan=JSON.parse(text.replace(/\`\`\`json|\`\`\`/g,'').trim());
    if(!plan.phases||!Array.isArray(plan.phases)) throw new Error('Invalid structure');
    plan.phases.forEach((ph,i)=>{ph.id=i;ph.color=ph.color||['#80961F','#80961F','#A6A9A6','#EF4444','#80961F'][i%5];ph.schedule=ph.schedule||[];});
    PB.generatedPlan=plan;PB.step='review';PB.loading=false;renderMain();
  }catch(e){
    PB.loading=false;PB.error='Could not generate. Check connection. ('+e.message+')';PB.step='questions';renderMain();
  }
}

function handleImportFile(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{const ok=importData(e.target.result);if(ok){announce('Backup restored');setTimeout(()=>location.reload(),500);}else{showConfirm('Import failed — invalid file.',()=>{},'OK','red');}};
  reader.readAsText(file);
}

function getSearchableExercises(){
  const names=new Set();
  PHASES.forEach(ph=>ph.schedule.forEach(day=>day.exercises.forEach(ex=>names.add(ex.n))));
  Object.keys(EX_DESC).forEach(n=>names.add(n));
  Object.values(EX_LIB).forEach(arr=>arr.forEach(ex=>names.add(ex.n)));
  return[...names].sort();
}
function customSearch(q){
  S.custom.search=q;
  if(!q||q.length<2){
    S.custom.searchResults=[];
    // Only update the results container, not the whole screen
    const el=document.getElementById('custom-search-results');
    if(el) el.innerHTML='';
    return;
  }
  const ql=q.toLowerCase();
  S.custom.searchResults=getSearchableExercises().filter(n=>n.toLowerCase().includes(ql)).slice(0,8);
  // Surgically update only the results dropdown — preserve input focus
  const el=document.getElementById('custom-search-results');
  if(el){
    el.innerHTML=S.custom.searchResults.map(function(name){
      var safeName = name.replace(/"/g,'&quot;');
      return '<button data-exname="'+safeName+'" onclick="customAddExercise(this.dataset.exname)" style="width:100%;padding:11px 14px;border-bottom:1px solid var(--border);font-family:var(--display);font-size:18px;letter-spacing:1.5px;color:var(--text2);cursor:pointer;display:flex;justify-content:space-between;align-items:center;background:none;border-left:none;border-right:none;text-align:left"><span>'+name+'</span><span style="color:var(--accent);font-size:14px">ADD +</span></button>';
    }).join('');
    // Show/hide freeform add option
    const freeform=document.getElementById('custom-search-freeform');
    if(freeform){
      freeform.style.display=q.trim()&&!S.custom.searchResults.find(n=>n.toLowerCase()===q.toLowerCase())?'block':'none';
    }
  } else {
    // Fallback if container not found — full render
    renderMain();
  }
}
function customAddExercise(name){
  if(S.custom.exercises.find(e=>e.name===name))return;
  let type='lift';
  PHASES.forEach(ph=>ph.schedule.forEach(day=>day.exercises.forEach(ex=>{if(ex.n===name)type=ex.t;})));
  Object.values(EX_LIB).forEach(arr=>arr.forEach(ex=>{if(ex.n===name)type=ex.t;}));
  const repsOnly=type==='cardio'||type==='mob'||type==='cool'||type==='warmup';
  S.custom.exercises.push({name,type,sets:[{reps:'',weight:'',done:false}],repsOnly});
  S.custom.search='';S.custom.searchResults=[];S.custom.activeEx=name;
  renderMain();
}
function customAddFreeform(){
  const name=S.custom.search.trim();if(!name)return;
  if(S.custom.exercises.find(e=>e.name===name)){S.custom.search='';S.custom.searchResults=[];renderMain();return;}
  S.custom.exercises.push({name,type:'lift',sets:[{reps:'',weight:'',done:false}],repsOnly:false});
  S.custom.search='';S.custom.searchResults=[];S.custom.activeEx=name;
  renderMain();
}
function customRemoveExercise(name){
  S.custom.exercises=S.custom.exercises.filter(e=>e.name!==name);
  if(S.custom.activeEx===name)S.custom.activeEx=null;
  renderMain();
}
function customAddSet(name){const ex=S.custom.exercises.find(e=>e.name===name);if(ex){ex.sets.push({reps:'',weight:'',done:false});renderMain();}}
function customRemoveSet(name,i){const ex=S.custom.exercises.find(e=>e.name===name);if(ex&&ex.sets.length>1){ex.sets.splice(i,1);renderMain();}}
function customUpdateSet(name,i,f,v){const ex=S.custom.exercises.find(e=>e.name===name);if(ex)ex.sets[i][f]=v;}
function customToggleDone(name,i){
  const ex=S.custom.exercises.find(e=>e.name===name);
  if(!ex) return;
  const wasDone = ex.sets[i].done;
  ex.sets[i].done = !wasDone;
  if(!wasDone) {
    // Start workout stopwatch on first completion if not running
    if(!S.timer || !S.timer.active || S.timer.mode !== 'stopwatch') {
      if(!S.workoutTimerRunning) {
        S.workoutTimerRunning = true;
        S.workoutElapsed = 0;
        if(!window._forgeStopwatch) {
          window._forgeStopwatch = setInterval(()=>{S.workoutElapsed=(S.workoutElapsed||0)+1;},1000);
        }
      }
    }
    if(S.restDuration > 0) {
      timerStart('rest', {duration: S.restDuration});
    }
  } else if(wasDone && S.timer && S.timer.active && S.timer.mode === 'rest') {
    timerStop();
  }
  renderMain();
}
function customToggleDoneOnly(name){const ex=S.custom.exercises.find(e=>e.name===name);if(ex){ex.sets[0].done=!ex.sets[0].done;renderMain();}}

function saveCurrentToLibrary(){
  const exs=S.custom.exercises;
  if(!exs.length) return;
  const name=S.custom.workoutTitle||('Workout '+new Date().toLocaleDateString());
  const id=saveToLibrary({name, exercises:exs.map(ex=>({name:ex.name,type:ex.type,repsOnly:ex.repsOnly}))});
  announce('Saved to library');

function loadFromLibrary(id){
  const item=getLibraryItem(id);
  if(!item) return;
  S.custom.exercises=item.exercises.map(ex=>({
    name:ex.name,type:ex.type||'lift',
    sets:[{reps:'',weight:'',done:false}],

  }));

}
function saveCustomWorkout(){
  if(!S.custom.exercises.length)return;
  const sets={};S.custom.exercises.forEach(ex=>{sets[ex.name]=ex.sets;});
  // Check for streak milestone
  const _metrics = getForgeMetrics();
  const _hit = checkStreakMilestone(_metrics.streak);
  if (_hit) { S.showStreakModal = _hit; }

  // Stop stopwatch
  if(window._forgeStopwatch){clearInterval(window._forgeStopwatch);window._forgeStopwatch=null;}
  if(S.timer&&S.timer.active&&S.timer.mode==='rest') timerStop();
  S.workoutTimerRunning=false;
  const title=S.custom.workoutTitle||'Custom Workout';
  saveLogEntry(S.logDate,-1,-1,sets,S.logNotes,title);
  S.squadShareShown=false;S.squadShareOk=false;S.squadShareCopied=false;
  S.lastSavedDate=S.logDate||todayStr();
  announce('Workout saved');
  renderMain();
}
function saveAndShareCustomWorkout(){
  if(!S.custom.exercises.length)return;
  const sets={};S.custom.exercises.forEach(ex=>{sets[ex.name]=ex.sets;});
  const title=S.custom.workoutTitle||'Custom Workout';
  saveLogEntry(S.logDate,-1,-1,sets,S.logNotes,title);
  const exPairs=S.custom.exercises.map(ex=>[ex.name,ex.sets]);
  sendToSquad(title,null,null,exPairs,S.logNotes);
}

function getLastLoggedWeight(exName){
  // Scan log history (newest first) for the last recorded weight for this exercise
  const store = loadStore();
  const dates = Object.keys(store).sort().reverse();
  for(const date of dates){
    const entry = store[date];
    if(entry && entry.sets && entry.sets[exName]){
      const doneSets = entry.sets[exName].filter(s => s.done && s.weight && s.weight !== '0' && s.weight !== '');
      if(doneSets.length) return doneSets[doneSets.length-1].weight;
    }
  }
  return '';
}

function getLastLoggedReps(exName){
  const store = loadStore();
  const dates = Object.keys(store).sort().reverse();
  for(const date of dates){
    const entry = store[date];
    if(entry && entry.sets && entry.sets[exName]){
      const doneSets = entry.sets[exName].filter(s => s.done && s.reps && s.reps !== '');
      if(doneSets.length) return doneSets[0].reps; // first set reps as default
    }
  }
  return '';
}
function initLogSets(pi,di){
  const phases=getActivePlanPhases();
  if(pi<0||pi>=phases.length)return;
  const day=(phases[pi].schedule||[])[di];
  if(!day)return;
  const sets={};
  (day.exercises||[]).forEach(ex=>{
    if(!ex.log)return;
    const lastWeight=getLastLoggedWeight(ex.n);
    const lastReps=getLastLoggedReps(ex.n);
    // Pre-fill all sets with last known weight (reps left blank — user should confirm)
    const setCount=ex.sets||3;
    sets[ex.n]=Array.from({length:setCount},()=>({
      reps:lastReps||'',
      weight:lastWeight,
      done:false
    }));
  });
  S.logSets=sets;
  S.logNotes='';
}
function changeLogDate(v){S.logDate=v;const ex=getLogEntry(v);if(ex&&ex.phaseId>=0){S.logPhase=ex.phaseId;S.logDay=ex.dayIdx;S.logSets=ex.sets;S.logNotes=ex.notes||'';}else{const pi=getPhaseForDate(v);const di=getDayIdxForDate(v,pi>=0?pi:0);if(pi>=0)S.logPhase=pi;if(di>=0)S.logDay=di;initLogSets(S.logPhase,S.logDay);}renderMain();}
function changeLogPhase(v){S.logPhase=parseInt(v);S.logDay=0;if(S.logPhase<getActivePlanPhases().length){initLogSets(S.logPhase,S.logDay);}renderMain();}
function changeLogDay(v){S.logDay=parseInt(v);initLogSets(S.logPhase,S.logDay);renderMain();}
function saveWorkout(){
  if(window._forgeStopwatch){clearInterval(window._forgeStopwatch);window._forgeStopwatch=null;}
  if(S.timer&&S.timer.active&&S.timer.mode==='rest') timerStop();
  S.workoutTimerRunning=false;
  saveLogEntry(S.logDate,S.logPhase,S.logDay,S.logSets,S.logNotes,null);
  S.lastSavedDate=S.logDate||todayStr();
  S.squadShareShown=false;S.squadShareOk=false;S.squadShareCopied=false;
  const _metrics=getForgeMetrics();
  const _hit=checkStreakMilestone(_metrics.streak);
  if(_hit){S.showStreakModal=_hit;}
  announce('Workout saved');
  renderMain();
}
function saveAndShareWorkout(){
  const ph=getActivePlanPhases()[S.logPhase]||getActivePlanPhases()[0];const day=(ph.schedule||[])[S.logDay]||ph.schedule[0];
  const exPairs=Object.entries(S.logSets);
  // Don't save again — workout already saved by saveWorkout()
  // Just send to squad
  sendToSquad(day.label,ph.title+' · '+day.tag,getDayEst(day.label),exPairs,S.logNotes);
}

// Pick N random unique items from array
function pickN(arr, n) {
 const shuffled = [...arr].sort(() => Math.random() - 0.5);
 return shuffled.slice(0, Math.min(n, arr.length));
}

function buildWorkout(location, equipment, focus, duration, experience) {
 experience = experience || 'intermediate';
 const hasDB = location === 'home' || equipment.includes('dumbbells') || equipment.includes('hotel');
 const hasBands = equipment.includes('bands') || equipment.includes('hotel');
 const hasMachines = location === 'home' || equipment.includes('hotel');
 const bwOnly = !hasDB && !hasBands && !hasMachines;

 // Duration-based exercise counts
 const counts = {
  20: { warmup: 2, main: 4, finisher: 1, cool: 1 },
  30: { warmup: 3, main: 6, finisher: 1, cool: 2 },
  45: { warmup: 3, main: 8, finisher: 2, cool: 2 },
  60: { warmup: 4, main: 10, finisher: 2, cool: 3 },
 }[duration];

 // Scale by experience level
 if (experience === 'beginner') { counts.finisher = Math.max(0, counts.finisher - 1); counts.main = Math.max(3, counts.main - 1); }
 else if (experience === 'advanced') { counts.finisher = counts.finisher + 1; counts.main = counts.main + 1; }

 let exercises = [];
 let title = '';
 let coachNote = '';

 // RECOVERY is special — all mobility
 if (focus === 'recovery') {
  title = `${duration}-Minute Recovery`;
  coachNote = "Recovery is not a soft session. It's injury prevention. Breathe through every stretch, move slow, respect the hold times.";
  exercises = [
   ...pickN(EX_LIB.warmup.filter(e => /cat-cow|hip circles|shoulder/i.test(e.n)), 2),
   ...pickN(EX_LIB.recovery, counts.main + 2),
   ...pickN(EX_LIB.cooldown, 1),
  ];
  return { title, coachNote, exercises, experience };
 }

 // Warmup
 exercises.push(...pickN(EX_LIB.warmup, counts.warmup));

 // Main work based on focus + equipment
 let mainPool = [];
 if (focus === 'upper') {
  if (hasDB) mainPool.push(...EX_LIB.upper_db);
  if (hasBands) mainPool.push(...EX_LIB.upper_bands);
  mainPool.push(...EX_LIB.upper_bw);
  title = bwOnly ? 'Bodyweight Upper' : hasDB ? 'Dumbbell Upper' : 'Banded Upper';
  coachNote = bwOnly ? "No iron, no problem. Push every set to 2 reps shy of failure. Bodyweight still builds." : "Pick weights you can control with crisp form. Push the last 2 reps.";
 } else if (focus === 'lower') {
  if (hasDB) mainPool.push(...EX_LIB.lower_db);
  if (hasBands) mainPool.push(...EX_LIB.lower_bands);
  mainPool.push(...EX_LIB.lower_bw);
  title = bwOnly ? 'Bodyweight Lower' : hasDB ? 'Dumbbell Lower' : 'Banded Lower';
  coachNote = "Legs built mine, they'll build yours. Full range on every rep — no half squats.";
 } else if (focus === 'full') {
  const upperP = hasDB ? EX_LIB.upper_db : hasBands ? EX_LIB.upper_bands : EX_LIB.upper_bw;
  const lowerP = hasDB ? EX_LIB.lower_db : hasBands ? EX_LIB.lower_bands : EX_LIB.lower_bw;
  const upperCount = Math.ceil(counts.main / 2);
  const lowerCount = Math.floor(counts.main / 2);
  exercises.push(...pickN(upperP, upperCount));
  exercises.push(...pickN(lowerP, lowerCount));
  exercises.push(...pickN(EX_LIB.core, 2));
  title = 'Full Body';
  coachNote = "Compound sessions build the most in the least time. Rest 60 sec between sets — keep moving.";
 } else if (focus === 'cardio') {
  if (hasMachines) {
   exercises.push(...pickN(EX_LIB.cardio_machine, 1));
  }
  exercises.push(...pickN(EX_LIB.cardio_bw, counts.main - (hasMachines ? 1 : 0)));
  exercises.push(...pickN(EX_LIB.core, 2));
  title = hasMachines ? 'Mixed Cardio' : 'Bodyweight Conditioning';
  coachNote = "Cardio builds the base that makes every lift feel easier. Push hard, recover fast, repeat.";
 }

 // For upper/lower, add main work from pool
 if (focus === 'upper' || focus === 'lower') {
  exercises.push(...pickN(mainPool, counts.main));
  // Add core if time allows
  if (counts.main >= 6) exercises.push(...pickN(EX_LIB.core, 2));
 }

 // Finisher for longer workouts
 if (counts.finisher > 0 && focus !== 'cardio') {
  const finisherPool = bwOnly ? EX_LIB.cardio_bw : [...EX_LIB.cardio_bw, ...EX_LIB.cardio_machine.slice(0, 2)];
  exercises.push(...pickN(finisherPool, counts.finisher));
 }

 // Cooldown
 exercises.push(...pickN(EX_LIB.cooldown.concat(EX_LIB.recovery.slice(0, 3)), counts.cool));

 return { title: `${duration}-Min ${title}`, coachNote, exercises };
}

function generateWorkout() {
 G.loading = true;
 G.result = null;
 G.error = null;
 renderMain();
 setTimeout(() => {
  try {
   if (isPregnancyMode()) {
     G.result = buildPregnancyWorkout(G.focus, G.duration);
   } else {
     G.result = buildWorkout(G.location, G.equipment, G.focus, G.duration, (getUser()&&getUser().experience)||'intermediate');
   }
   G.loading = false;
   renderMain();
  } catch (err) {
   G.loading = false;
   G.error = 'Could not generate. Please try different options.';
   renderMain();
  }
 }, 400);
}
function logGeneratedWorkout(){
 if(!G.result)return;
 const sets={};(G.result.exercises||[]).forEach(ex=>{if(ex.t!=='warmup'&&ex.t!=='cool'&&ex.t!=='mob')sets[ex.n]=[{reps:'',weight:'',done:false}];});
 S.logDate=todayStr();S.logPhase=Math.max(0,getPhaseForDate(todayStr()));S.logDay=0;S.logSets=sets;S.logNotes=`Generated: ${G.result.title} (${G.location==='home'?'home':'away'}, ${G.focus}, ${G.duration}min)`;
 setTab('log');setTimeout(initLogSwipe,100);
}

function renderHistoryBlock(){
  const store = loadStore();
  const skips = getSkips();
  const moves = getMoves();
  const allDates = new Set([...Object.keys(store),...Object.keys(skips),...Object.keys(moves)]);
  const sorted = [...allDates].sort((a,b) => b.localeCompare(a));
  if (sorted.length === 0) return `<div style="padding:30px 0;text-align:center;font-family:var(--display);font-size:22px;letter-spacing:2px;color:var(--text2);line-height:2">NO WORKOUTS LOGGED YET.<br><br>START TODAY.</div>`;

  return sorted.map(date => {
    const {dow, full} = fmtDate(date);
    const move = moves[date];
    const skip = skips[date];

    // Skipped/moved days — no log
    const dayEntries = store[date] ? (Array.isArray(store[date]) ? store[date] : [store[date]]) : [];
    if (skip && !dayEntries.length) {
      const ph = (skip.phaseId >= 0 ? getPlanPhases()[skip.phaseId] : null);
      const day = ph?.schedule?.[skip.dayIdx];
      const isOpen = S.histOpen[date + '_skip'];
      return `<div class="hist-entry" style="border-color:${skip.type==='skipped'?'var(--red-border)':'var(--accent-border)'}">
        <div class="hist-head" onclick="S.histOpen['${date}_skip']=!S.histOpen['${date}_skip'];renderMain()">
          <div><div class="hist-date">${dow} · ${full}</div><div class="hist-sub">${day?day.label:''} <span class="${skip.type==='skipped'?'skipped-pill':'moved-pill'}">${skip.type==='skipped'?'SKIPPED':'MOVED'}</span>${skip.movedTo?` → ${fmtDate(skip.movedTo).short}`:''}</div></div>
          <div class="hist-chevron ${isOpen?'open':''}">▼</div>
        </div>
        <div class="hist-body ${isOpen?'open':''}">${skip.type==='skipped'?`<div style="font-family:var(--body);font-size:17px;color:var(--red);margin-bottom:8px">Session skipped.</div>`:`<div style="font-family:var(--body);font-size:17px;color:var(--accent);margin-bottom:8px">Moved to ${fmtDate(skip.movedTo||date).short}.</div>`}<button class="action-btn secondary" style="padding:8px;font-size:17px" onclick="undoSkip('${date}')">UNDO</button></div>
      </div>`;
    }

    // One card per log entry that day
    return dayEntries.map((log, entryIdx) => {
      const entryKey = date + '_' + (log.id || entryIdx);
      const isOpen = S.histOpen[entryKey];
      const ph = (log.phaseId >= 0 ? getPlanPhases()[log.phaseId] : null);
      const day = ph?.schedule?.[log.dayIdx];
      const allSets = Object.values(log.sets||{}).flat();
      const done = allSets.filter(s => s.done).length;
      const sessionLabel = log.title || (day ? day.label : 'Custom Workout');
      const multiLabel = dayEntries.length > 1 ? ` <span style="font-family:var(--display);font-size:11px;letter-spacing:1px;color:var(--accent);background:var(--accent-bg);border:1px solid var(--accent-border);border-radius:100px;padding:2px 7px">${entryIdx+1} of ${dayEntries.length}</span>` : '';
      return `<div class="hist-entry">
        <div class="hist-head" onclick="S.histOpen['${entryKey}']=!S.histOpen['${entryKey}'];renderMain()">
          <div><div class="hist-date">${dow} · ${full}${multiLabel}</div><div class="hist-sub">${sessionLabel} · ${done}/${allSets.length} sets${move?` <span class="moved-pill">MOVED IN</span>`:''}</div></div>
          <div class="hist-chevron ${isOpen?'open':''}">▼</div>
        </div>
        <div class="hist-body ${isOpen?'open':''}">${Object.entries(log.sets||{}).map(([exName,sets])=>`<div style="margin-bottom:8px"><div class="hist-ex-name">${exName}</div>${sets.map((s,i)=>`<div class="hist-set ${s.done?'done-set':''}">Set ${i+1}:${s.reps?' '+s.reps+' reps':''}${s.weight&&s.weight!='0'?' @ '+s.weight+'lbs':''}${s.done?' ✓':''}</div>`).join('')}</div>`).join('')}${log.notes?`<div class="hist-notes-text">"${log.notes}"</div>`:''}<div style="display:flex;gap:8px;margin-top:8px">
            <button class="action-btn secondary" style="padding:8px;font-size:17px;margin-top:0;flex:1" onclick="editLog('${date}',${log.phaseId},${log.dayIdx})">EDIT</button>
            <button class="action-btn red" style="padding:8px;font-size:17px;margin-top:0;flex:1" onclick="deleteLogEntry('${date}','${log.id||''}')">DELETE</button>
          </div></div>
      </div>`;
    }).join('');
  }).join('');
}

}

// ============================================================
// FORGE TIMER ENGINE
// Single shared interval — all timing modes use this
// ============================================================

// Timer state — lives in S.timer
// Modes: 'rest' | 'work' | 'stopwatch' | 'tabata' | 'emom'

function timerInit() {
  if (!S.timer) {
    S.timer = {
      active: false,
      paused: false,
      mode: 'rest',
      remaining: 0,   // seconds left (countdown modes)
      elapsed: 0,     // seconds elapsed (stopwatch)
      total: 0,       // original duration for progress bar
      label: '',      // display label e.g. "REST" / "WORK" / "PLANK"
      // Tabata state
      tabataRound: 0,
      tabataPhase: 'work', // 'work' | 'rest'
      tabataRounds: 8,
      tabataWork: 20,
      tabataRest: 10,
      // EMOM state
      emomMinute: 0,
      emomTotal: 0,
      // Stopwatch
      workoutStart: null,
    };
  }
}

function timerTick() {
  timerInit();
  const t = S.timer;
  if (!t.active || t.paused) return;

  if (t.mode === 'stopwatch') {
    t.elapsed++;
    timerUpdateUI();
    return;
  }

  if (t.mode === 'tabata') {
    t.remaining--;
    if (t.remaining <= 0) {
      if (t.tabataPhase === 'work') {
        // Switch to rest
        t.tabataPhase = 'rest';
        t.remaining = t.tabataRest;
        t.total = t.tabataRest;
        t.label = 'REST';
        timerVibrate('short');
      } else {
        // Next round
        t.tabataRound++;
        if (t.tabataRound >= t.tabataRounds) {
          timerComplete();
          return;
        }
        t.tabataPhase = 'work';
        t.remaining = t.tabataWork;
        t.total = t.tabataWork;
        t.label = 'WORK · R' + (t.tabataRound + 1);
        timerVibrate('short');
      }
    }
    timerUpdateUI();
    return;
  }

  if (t.mode === 'emom') {
    t.remaining--;
    t.elapsed++;
    if (t.remaining <= 0) {
      t.emomMinute++;
      if (t.emomMinute >= t.emomTotal) {
        timerComplete();
        return;
      }
      t.remaining = 60;
      t.total = 60;
      t.label = 'EMOM · MIN ' + (t.emomMinute + 1);
      timerVibrate('short');
    }
    timerUpdateUI();
    return;
  }

  // rest / work countdown
  t.remaining--;
  if (t.remaining <= 0) {
    timerComplete();
    return;
  }
  if (t.remaining <= 3) timerVibrate('tick');
  timerUpdateUI();
}

function timerComplete() {
  const t = S.timer;
  timerVibrate('done');
  t.active = false;
  t.remaining = 0;
  timerUpdateUI();
  announce(t.label + ' timer done');
}

function timerVibrate(type) {
  if (!navigator.vibrate) return;
  if (type === 'tick') navigator.vibrate(40);
  else if (type === 'short') navigator.vibrate([60, 40, 60]);
  else if (type === 'done') navigator.vibrate([100, 50, 100, 50, 200]);
}

function timerFmt(secs) {
  const m = Math.floor(Math.abs(secs) / 60);
  const s = Math.abs(secs) % 60;
  return (m > 0 ? m + ':' + String(s).padStart(2,'0') : String(s) + 's');
}

function timerStart(mode, opts) {
  timerInit();
  const t = S.timer;

  // Clear existing interval
  if (window._forgeTimerInterval) clearInterval(window._forgeTimerInterval);

  t.mode = mode;
  t.active = true;
  t.paused = false;

  if (mode === 'rest') {
    const dur = opts.duration || S.restDuration || 90;
    t.remaining = dur;
    t.total = dur;
    t.label = 'REST';
    t.elapsed = 0;
  } else if (mode === 'work') {
    t.remaining = opts.duration;
    t.total = opts.duration;
    t.label = opts.label || 'WORK';
    t.elapsed = 0;
  } else if (mode === 'stopwatch') {
    t.elapsed = 0;
    t.workoutStart = Date.now();
    t.label = 'WORKOUT';
  } else if (mode === 'tabata') {
    t.tabataRound = 0;
    t.tabataPhase = 'work';
    t.tabataWork = opts.work || 20;
    t.tabataRest = opts.rest || 10;
    t.tabataRounds = opts.rounds || 8;
    t.remaining = t.tabataWork;
    t.total = t.tabataWork;
    t.label = 'WORK · R1';
    t.elapsed = 0;
  } else if (mode === 'emom') {
    t.emomMinute = 0;
    t.emomTotal = opts.minutes || 10;
    t.remaining = 60;
    t.total = 60;
    t.label = 'EMOM · MIN 1';
    t.elapsed = 0;
  }

  window._forgeTimerInterval = setInterval(timerTick, 1000);
  timerUpdateUI();
}

function timerPause() {
  timerInit();
  S.timer.paused = !S.timer.paused;
  timerUpdateUI();
}

function timerStop() {
  timerInit();
  S.timer.active = false;
  S.timer.paused = false;
  if (window._forgeTimerInterval) clearInterval(window._forgeTimerInterval);
  timerUpdateUI();
}

function timerSkip() {
  timerInit();
  S.timer.remaining = 0;
  timerComplete();
}

function timerSetRest(secs) {
  S.restDuration = secs;
  if (S.timer && S.timer.active && S.timer.mode === 'rest') {
    S.timer.remaining = secs;
    S.timer.total = secs;
  }
  timerUpdateUI();
}

// Surgical DOM update — never calls renderMain
function timerUpdateUI() {
  const el = document.getElementById('forge-timer-bar');
  if (!el) return;

  const t = S.timer;
  if (!t || !t.active) {
    el.style.display = 'none';
    return;
  }

  el.style.display = 'flex';

  const isRest = t.mode === 'rest';
  const isStopwatch = t.mode === 'stopwatch';
  const isTabata = t.mode === 'tabata';
  const accentColor = isRest ? 'var(--accent)' : t.tabataPhase === 'rest' ? 'var(--accent)' : 'var(--red)';

  const timeStr = isStopwatch ? timerFmt(t.elapsed) : timerFmt(t.remaining);
  const pct = isStopwatch ? 100 : Math.round((t.remaining / t.total) * 100);
  const labelStr = t.label;

  // Tabata round indicator
  let roundDots = '';
  if (isTabata) {
    roundDots = Array.from({length: t.tabataRounds}, (_,i) =>
      `<div style="width:6px;height:6px;border-radius:50%;background:${i < t.tabataRound ? accentColor : 'rgba(255,255,255,.15)'}"></div>`
    ).join('');
  }

  el.innerHTML = `
    <div style="flex:1;min-width:0">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="font-family:var(--display);font-size:11px;letter-spacing:2px;color:${accentColor};flex-shrink:0">${labelStr}</div>
        ${isTabata ? `<div style="display:flex;gap:3px;flex-wrap:nowrap">${roundDots}</div>` : ''}
      </div>
      <div style="font-family:var(--display);font-size:32px;line-height:1;letter-spacing:2px;color:var(--text);margin-top:2px">${timeStr}</div>
      <div style="height:3px;background:rgba(255,255,255,.1);border-radius:2px;margin-top:6px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${accentColor};border-radius:2px;transition:width 0.9s linear"></div>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;margin-left:12px;flex-shrink:0">
      <button onclick="timerPause()" style="font-family:var(--display);font-size:11px;letter-spacing:1px;padding:6px 10px;background:rgba(255,255,255,.06);border:none;color:var(--text2);cursor:pointer;border-radius:8px;min-width:48px">${t.paused ? 'RESUME' : 'PAUSE'}</button>
      <button onclick="timerStop()" style="font-family:var(--display);font-size:11px;letter-spacing:1px;padding:6px 10px;background:rgba(255,255,255,.04);border:none;color:var(--text3);cursor:pointer;border-radius:8px">STOP</button>
    </div>
  `;
}

// REST DURATION SETTING — persisted in localStorage
// ============================================================

function parseDuration(dStr) {
  if (!dStr) return null;
  const s = String(dStr).toLowerCase();
  const minMatch = s.match(/(\d+)\s*min/);
  const secMatch = s.match(/(\d+)\s*sec/);
  if (minMatch) return parseInt(minMatch[1]) * 60;
  if (secMatch) return parseInt(secMatch[1]);

const STREAK_MILESTONES = [1, 4, 10, 13, 20, 26, 39, 52, 100];

function getAckedMilestones() {
  try { return JSON.parse(localStorage.getItem('forge_streak_acked') || '[]'); }
  catch(e) { return []; }
}

function ackMilestone(n) {
  const acked = getAckedMilestones();
  if (!acked.includes(n)) {
    acked.push(n);
    localStorage.setItem('forge_streak_acked', JSON.stringify(acked));
  }
}


function getNextMilestone(streak) {
  const next = STREAK_MILESTONES.find(m => m > streak);
  if (!next) return null;
  const msgs = {
    1:'FIRST WEEK', 4:'ONE MONTH', 10:'TEN WEEKS', 13:'THREE MONTHS',
    20:'FIVE MONTHS', 26:'SIX MONTHS', 39:'NINE MONTHS', 52:'ONE YEAR', 100:'HALL OF FAME'
  };
  return { weeks: next, label: msgs[next] || next + ' WEEKS', gap: next - streak };
}

function checkStreakMilestone(streak) {
  if (!streak || streak < 3) return null;
  const acked = getAckedMilestones();
  // Find highest unacknowledged milestone hit
  const hit = [...STREAK_MILESTONES].reverse().find(m => streak >= m && !acked.includes(m));
  return hit || null;
}

function initSquadPTR() {
  const main = document.getElementById('main');
  if (!main || main._ptrAttached) return;
  main._ptrAttached = true;
  let startY = 0;
  main.addEventListener('touchstart', function(e) {
    if (main.scrollTop === 0) startY = e.touches[0].clientY;
  }, { passive: true });
  main.addEventListener('touchend', function(e) {
    const dy = e.changedTouches[0].clientY - startY;
    if (dy > 60 && S.tab === 'squad') {
      loadSquadFeed();
      announce('Refreshing squad feed');
    }
  }, { passive: true });
}

// ============================================================
// SWIPE BETWEEN LOG SUB-TABS
// ============================================================
function initLogSwipe() {
  const main = document.getElementById('main');
  if (!main || main._swipeAttached) return;
  main._swipeAttached = true;
  const LOG_TABS = ['plan','custom','generate'];
  let startX = 0, startY = 0;
  main.addEventListener('touchstart', function(e) {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
  }, { passive: true });
  main.addEventListener('touchend', function(e) {
    if (S.tab !== 'log') return;
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    if (Math.abs(dx) < 50 || Math.abs(dx) < Math.abs(dy) * 1.5) return;
    const cur = LOG_TABS.indexOf(S.logMode || 'plan');
    if (dx < 0 && cur < LOG_TABS.length - 1) {
      S.logMode = LOG_TABS[cur + 1]; renderMain();
    } else if (dx > 0 && cur > 0) {
      S.logMode = LOG_TABS[cur - 1]; renderMain();
    }
  }, { passive: true });
}

function getSessionDateInPlan(pi, di) {
 // Find the next future date (or today) when this phase+day lands on the right DOW
 const ph = getPlanPhases()[pi];
 const targetDow = Object.entries(ph.dowMap).find(([dow, idx]) => parseInt(idx) === di)?.[0];
 if (targetDow === undefined) return null;
 const dow = parseInt(targetDow);
 // Walk from phase start to phase end, find first matching DOW from today onward
 const today = parseDate(todayStr());
 const phStart = getPhaseStart(pi);
 const phEnd = getPhaseEnd(pi);
 const walkFrom = phStart > today ? phStart : today;
 const d = new Date(walkFrom);
 for (let i = 0; i < 14; i++) {
  if (d.getDay() === dow && d <= phEnd) return dateStr(d);
  d.setDate(d.getDate() + 1);
 }
 return null;
}

function dismissLanding() {
  S.landingDismissed = true;
  const el = document.getElementById('landing');
  if (el) {
    el.style.transition = 'opacity 0.3s';
    el.style.opacity = '0';
    setTimeout(() => {
      el.remove();
      // Re-render the app now that the landing is gone
      renderNav();
      renderMain();
    }, 300);
  } else {
    renderNav();
    renderMain();
  }
}


// ============================================================
// MODEL B MIGRATION — run once on app init
// Extracts embedded planData from goals into forge_programs
// ============================================================
function migrateLegacyStore() {
  if (localStorage.getItem('forge_store_v2_migrated')) return;
  try {
    const s = loadStore();
    let changed = false;
    Object.keys(s).forEach(date => {
      if (s[date] && !Array.isArray(s[date])) {
        // Legacy single entry — wrap in array, add id if missing
        const entry = s[date];
        if (!entry.id) entry.id = date + '_legacy';
        s[date] = [entry];
        changed = true;
      }
    });
    if (changed) localStorage.setItem(STORE_KEY, JSON.stringify(s));
    localStorage.setItem('forge_store_v2_migrated', '1');
    console.log('Forge: store migration complete');
  } catch(e) { console.warn('Forge: store migration failed', e); }
}

function migrateToModelB() {
  if (localStorage.getItem('forge_model_b_migrated')) return;
  try {
    const goals = getGoals();
    const programs = getPrograms();
    let changed = false;

    goals.forEach(goal => {
      // Already migrated or no plan data
      if (goal.programId || !goal.planData || !goal.planData.phases) return;

      // Create a program from the embedded planData
      const progId = makeProgramId();
      const prog = {
        id: progId,
        name: goal.label || 'Training Program',
        phases: goal.planData.phases,
        planType: goal.planType || 'app',
        discipline: goal.discipline || null,
        goalType: goal.goalType || null,
        createdAt: goal.createdAt || new Date().toISOString(),
        sourceGoalId: goal.id,
      };
      programs[progId] = prog;

      // Update the goal — add programId, keep planData briefly for safety
      goal.programId = progId;
      changed = true;
    });

    if (changed) {
      savePrograms(programs);
      saveGoals(goals);
    }

    localStorage.setItem('forge_model_b_migrated', '1');
    console.log('Forge: Model B migration complete');
  } catch(e) {
    console.warn('Forge: Model B migration failed', e);
    // Don't set the flag — will retry next load
  }
}

function init(){
  migrateLegacyStore();
  migrateToModelB();
  setupManifest();
  S.restDuration=getRestDuration();
  initOfflineDetection();

  // LANDING PAGE GATE — browser visitors only, never installed users
  // isStandalone() is true when launched from home screen → skip landing entirely
  if (!isStandalone() && !S.landingDismissed) {
    // Show landing as an overlay; app still initializes underneath
    setTimeout(() => {
      if (!document.getElementById('landing') && !S.landingDismissed) {
        document.body.insertAdjacentHTML('beforeend', renderLanding());
      }
    }, 0);
  }
const pi=getPhaseForDate(todayStr());const di=getDayIdxForDate(todayStr(),pi>=0?pi:0);S.logPhase=pi>=0?pi:0;S.logDay=di>=0?di:0;const ex=getLogEntry(todayStr());if(ex){S.logSets=ex.sets;S.logNotes=ex.notes||'';}else initLogSets(S.logPhase,S.logDay);renderNav();renderMain();if(document.getElementById('main')){document.getElementById('main')._swipeAttached=false;document.getElementById('main')._ptrAttached=false;}}
init();
</script>
