<title>GRIND</title>
<link id="pwa-manifest" rel="manifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Barlow+Condensed:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
/* ============================================================
   GRIND — INDUSTRIAL EDITION
   Colors: PURE BLACK / ELECTRIC YELLOW / CLEAN GREEN / ASH GRAY
   ============================================================ */
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;500;600;700&display=swap');

:root{
  /* BACKGROUNDS */
  --bg:#111111;
  --bg2:#1a1a1a;
  --bg3:#161616;
  --bg4:#222222;
  /* BORDERS */
  --border:#252525;
  --border2:#333333;
  /* TYPOGRAPHY */
  --text:#ffffff;
  --text2:#b0b0b0;
  --text3:#555555;
  --text4:#333333;
  /* YELLOW — primary action */
  --amber:#F5C518;
  --amber-bg:#1a1600;
  --amber-border:#7a6010;
  /* GREEN — logged / success */
  --green:#5BAD4E;
  --green-bg:#0d1a0a;
  --green-border:#2d6628;
  /* RED — alert */
  --red:#E84040;
  --red-bg:#1a0808;
  --red-border:#7a2020;
  /* PURPLE */
  --purple:#8a70c0;
  --purple-bg:#100c1c;
  --purple-border:#4a3880;
  /* BLUE */
  --blue:#4a7aaa;
  --blue-bg:#080e18;
  --blue-border:#28486a;
  /* FONTS */
  --display:'Bebas Neue',cursive;
  --mono:'Share Tech Mono',monospace;
  --body:'Barlow Condensed',sans-serif;
  /* GOLD alias for any remaining references */
  --gold:#F5C518;
  --gold-dim:#7a6010;
  /* SYSTEM */
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-t:env(safe-area-inset-top,0px);
}

/* Force dark color-scheme on all form controls — prevents iOS white bg */
input,select,textarea{color-scheme:dark}

/* ---- RESET ---- */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;background:var(--bg);overscroll-behavior:none}
body{
  height:100%;overflow:hidden;
  background:var(--bg);
  color:var(--text);
  font-family:var(--body);
  -webkit-font-smoothing:antialiased;
}

/* ---- LAYOUT ---- */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:540px;margin:0 auto}
#safe-top{height:var(--safe-t);background:#111111;flex-shrink:0}
#main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;background:var(--bg)}

/* ---- NAV — tactical bottom strip ---- */
#nav{
  flex-shrink:0;
  background:#111111;
  border-top:2px solid var(--amber);
  display:flex;
  padding-bottom:var(--safe-b);
  position:relative;
}
/* nav tick strip removed */
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:9px 2px 7px;border:none;background:none;
  color:var(--text3);
  font-family:var(--mono);font-size:9px;letter-spacing:1px;
  cursor:pointer;gap:3px;transition:all 0.15s;
  position:relative;
}
.nav-btn svg{width:17px;height:17px;stroke-width:1.5}
.nav-btn.active{color:var(--amber)}
.nav-btn.active svg{stroke:var(--amber)}
.nav-btn.active::after{
  content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;
  background:var(--amber);
}

/* ---- SHARED COMPONENTS ---- */
.section-label{
  font-family:var(--mono);font-size:18px;letter-spacing:4px;
  color:var(--amber);
  margin-bottom:10px;
  text-transform:uppercase;
  display:flex;align-items:center;gap:8px;
}
.section-label::before{content:'▸';color:var(--amber);font-size:9px}

.card{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:0;
  position:relative;
}

/* ---- EXERCISE DESCRIPTION (collapsible) ---- */
.ex-row{cursor:default}
.ex-row.has-desc{cursor:pointer}
.ex-row.has-desc:active{background:rgba(255,255,255,.03)}
.ex-toggle{
  font-size:22px;line-height:1;
  color:var(--amber);
  flex-shrink:0;
  font-family:var(--mono);font-weight:300;
  margin-left:auto;padding-left:12px;
  align-self:center;
  user-select:none;
}
.ex-toggle.open{color:var(--text2)}
.ex-desc{
  padding:12px 16px 14px 16px;
  background:rgba(212,168,32,.04);
  border-top:1px solid rgba(212,168,32,.15);
  animation:fadeIn 0.15s ease both;
}
.ex-desc-text{
  font-family:var(--body);font-weight:400;font-size:15px;
  color:var(--text2);line-height:1.65;margin-bottom:2px;
}
.ex-desc-cue{
  font-family:var(--mono);font-size:11px;letter-spacing:1.5px;
  color:var(--amber);margin-top:10px;
  display:block;
}

/* ---- EXERCISE LIST ---- */
.ex-list{border-top:1px solid var(--border)}
.ex-row{
  display:flex;gap:10px;padding:11px 16px;
  border-bottom:1px solid var(--border);
  align-items:flex-start;
}
.ex-row:last-child{border-bottom:none}
.ex-tag{
  font-family:var(--mono);font-size:8px;letter-spacing:1px;
  padding:3px 6px;min-width:52px;text-align:center;
  flex-shrink:0;margin-top:1px;
  border:1px solid currentColor;
  text-transform:uppercase;
}
.ex-name{
  font-family:var(--body);font-weight:700;font-size:17px;
  color:var(--text);margin-bottom:2px;
  text-transform:uppercase;letter-spacing:.5px;
}
.ex-detail{
  font-family:var(--body);font-weight:400;font-size:17px;
  color:var(--text2);line-height:1.45;
}
.ex-note{
  font-family:var(--mono);font-size:9px;
  color:var(--amber);letter-spacing:.5px;margin-top:4px;
}

/* ---- BUTTONS ---- */
.action-btn{
  display:block;width:100%;padding:14px;
  background:#F5C518;
  border:2px solid #F5C518;
  color:#111111;
  font-family:var(--mono);font-size:11px;letter-spacing:3px;
  cursor:pointer;transition:all 0.1s;margin-top:12px;
  text-transform:uppercase;font-weight:700;
}
.action-btn:active{background:#d4aa10;border-color:#d4aa10;}
.action-btn.secondary{background:none;border:1px solid var(--border2);color:var(--text2);font-weight:400;}
.action-btn.secondary:active{background:var(--bg2);}
.action-btn.amber{background:none;border:1px solid var(--amber-border);color:var(--amber);font-weight:400;}
.action-btn.amber:active{background:var(--amber-bg);}
.action-btn.red{background:none;border:1px solid var(--red-border);color:var(--red);font-weight:400;}
.action-btn.red:active{background:var(--red-bg);}
.action-btn.blue{background:none;border:1px solid var(--blue-border);color:var(--blue);font-weight:400;}

/* ---- PILLS ---- */
.pills{display:flex;gap:6px;flex-wrap:wrap}
.pill{
  font-family:var(--mono);font-size:9px;letter-spacing:1.5px;
  padding:6px 11px;border:1px solid var(--border);
  background:none;color:var(--text3);cursor:pointer;transition:all 0.1s;
}
.pill.active{background:var(--amber);color:#111111;border-color:var(--amber);font-weight:700;}

/* ---- TODAY HEADER — Mission Briefing style ---- */
.today-head{
  padding:calc(18px + var(--safe-t)) 16px 14px;
  border-bottom:2px solid var(--amber);
  background:var(--bg);
  position:relative;
  overflow:hidden;
}

.today-dayname{
  font-family:var(--mono);font-size:18px;letter-spacing:4px;
  color:var(--amber);margin-bottom:4px;
}
.today-date{
  font-family:var(--display);
  font-size:42px;letter-spacing:3px;line-height:1;
  color:var(--text);
  text-shadow:0 0 30px rgba(212,168,32,.15);
}
.phase-dot{width:6px;height:6px;flex-shrink:0;display:inline-block;margin-right:6px}
.today-rest{
  padding:36px 24px;text-align:center;
  font-family:var(--mono);font-size:17px;letter-spacing:3px;
  color:var(--text);line-height:2;
}
.logged-pill{
  display:inline-block;font-family:var(--mono);font-size:8px;letter-spacing:2px;
  background:var(--green);border:1px solid var(--green);
  color:#111111;padding:2px 8px;vertical-align:middle;font-weight:700;
}
.moved-pill{
  display:inline-block;font-family:var(--mono);font-size:8px;letter-spacing:2px;
  background:var(--amber-bg);border:1px solid var(--amber-border);
  color:var(--amber);padding:2px 8px;vertical-align:middle;
}
.skipped-pill{
  display:inline-block;font-family:var(--mono);font-size:8px;letter-spacing:2px;
  background:var(--red-bg);border:1px solid var(--red-border);
  color:var(--red);padding:2px 8px;vertical-align:middle;
}

/* ---- CHECK-IN STRIP ---- */
.checkin-strip{
  padding:12px 16px;
  background:#111111;
  border-bottom:1px solid var(--border);
  cursor:pointer;
  border-left:3px solid var(--green);
}
.checkin-strip-header{display:flex;justify-content:space-between;align-items:flex-start;gap:16px}
.checkin-title{font-family:var(--mono);font-size:13px;letter-spacing:3px;color:var(--amber);flex-shrink:0}
.checkin-summary{font-family:var(--mono);font-size:13px;color:var(--text2);letter-spacing:1px;text-align:right;line-height:1.6}
.checkin-prompt{
  font-family:var(--mono);font-size:13px;color:var(--green);letter-spacing:2px;
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.checkin-expanded{
  padding:14px 16px 4px;
  background:#111111;
  border-bottom:1px solid var(--amber-border);
  border-left:3px solid var(--amber);
}
.checkin-row{margin-bottom:14px}
.checkin-row-label{
  font-family:var(--mono);font-size:9px;letter-spacing:3px;
  color:var(--text2);margin-bottom:6px;
}
.num-pills{display:flex;gap:4px}
.num-pill{
  flex:1;padding:10px 0;
  background:var(--bg3);border:1px solid var(--border);
  color:var(--text2);font-family:var(--mono);font-size:17px;
  cursor:pointer;text-align:center;transition:all 0.1s;
}
.num-pill.selected{
  background:var(--amber);border-color:var(--amber);
  color:#111111;font-weight:700;
}
.pain-pills{display:flex;gap:6px}
.pain-pill{
  flex:1;padding:10px 0;
  background:var(--bg3);border:1px solid var(--border);
  color:var(--text2);font-family:var(--mono);font-size:17px;
  letter-spacing:1px;cursor:pointer;text-align:center;
}
.pain-pill.selected-ok{background:var(--green-bg);border-color:var(--green-border);color:var(--green)}
.pain-pill.selected-bad{background:var(--red-bg);border-color:var(--red-border);color:var(--red)}

/* ---- WEEK BRIEFING — classified document ---- */
.briefing-card{
  margin:14px 16px 0;
  border:1px solid var(--amber-border);
  background:var(--amber-bg);
  position:relative;
  overflow:hidden;
}
.briefing-card::before{display:none;}
.briefing-head{
  padding:10px 14px;background:rgba(212,168,32,.08);
  cursor:pointer;display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid var(--amber-border);
  margin-top:3px;
}
.briefing-label{font-family:var(--mono);font-size:18px;letter-spacing:3px;color:var(--amber)}
.briefing-label::before{display:none}
.briefing-body{padding:14px}
.briefing-title{
  font-family:var(--display);font-size:24px;letter-spacing:3px;
  color:var(--text);line-height:1;margin-bottom:6px;
}
.briefing-sub{font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--amber);margin-bottom:12px}
.briefing-bullet{
  font-family:var(--body);font-weight:500;font-size:18px;
  color:var(--text2);line-height:1.5;
  padding:7px 0 7px 18px;position:relative;
  border-bottom:1px solid rgba(212,168,32,.1);
}
.briefing-bullet:last-child{border-bottom:none}
.briefing-bullet::before{
  content:'★';position:absolute;left:0;
  color:var(--amber);font-size:8px;top:11px;
}

/* ---- CANT DO PANEL ---- */
.cant-do-panel{
  margin:0 16px;
  border:1px solid var(--red-border);
  border-left:4px solid var(--red);
  background:var(--bg2);
}
.cant-do-header{
  padding:14px 16px;background:var(--red-bg);
  border-bottom:1px solid var(--red-border);
}
.cant-do-title{font-family:var(--display);font-size:24px;letter-spacing:3px;color:var(--text)}
.accountability-box{
  padding:14px 16px;border-bottom:1px solid var(--border);
  background:var(--bg);
}
.accountability-text{
  font-family:var(--body);font-weight:500;font-size:18px;
  color:var(--text2);line-height:1.6;
}
.phase-context{
  font-family:var(--mono);font-size:18px;letter-spacing:1px;
  color:var(--text2);margin-top:8px;padding-top:8px;
  border-top:1px solid var(--border);
}
.option-section{padding:14px 16px;border-bottom:1px solid var(--border)}
.option-label{
  font-family:var(--mono);font-size:9px;letter-spacing:3px;
  color:var(--amber);margin-bottom:8px;
}
.conflict-box{padding:9px 12px;margin-bottom:8px;border-left:3px solid currentColor}
.conflict-box.ok{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.conflict-box.warn{background:var(--amber-bg);border-color:var(--amber);color:var(--amber)}
.conflict-box.bad{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.conflict-text{font-family:var(--body);font-weight:400;font-size:17px;line-height:1.5;color:inherit}
.move-alt-dates{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.move-alt-btn{
  font-family:var(--mono);font-size:18px;letter-spacing:1px;
  padding:7px 12px;border:1px solid var(--border);
  background:none;color:var(--text2);cursor:pointer;
}
.move-alt-btn.selected{border-color:var(--amber-border);color:var(--amber);background:var(--amber-bg)}
.skip-accountability{
  font-family:var(--body);font-weight:500;font-size:17px;
  color:var(--red);line-height:1.6;margin-bottom:10px;
}
.never-mind-btn{
  display:block;width:100%;padding:16px;
  background:var(--green-bg);border:none;
  border-top:2px solid var(--green);
  color:var(--green);font-family:var(--mono);
  font-size:17px;letter-spacing:3px;cursor:pointer;
}
.never-mind-btn:active{background:var(--green-bg)}

/* ---- PROTEIN BAR ---- */
.protein-card{
  margin:14px 16px 0;
  background:var(--bg2);
  border:1px solid var(--border);
  border-left:3px solid var(--amber);
  padding:14px;
  position:relative;
}
.protein-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
.protein-title{font-family:var(--mono);font-size:18px;letter-spacing:3px;color:var(--amber)}
.protein-numbers{display:flex;align-items:baseline;gap:6px;margin-bottom:10px}
.protein-current{font-family:var(--display);font-size:40px;letter-spacing:2px;color:var(--text);line-height:1}
.protein-target{font-family:var(--mono);font-size:17px;color:var(--text2);letter-spacing:1px}
.protein-unit{font-family:var(--mono);font-size:17px;color:var(--text2);letter-spacing:1px;margin-left:4px}
.protein-bar{height:6px;background:#111111;margin-bottom:8px;position:relative}
.protein-bar::before{content:'';position:absolute;top:0;left:0;bottom:0;width:100%;
  background:repeating-linear-gradient(90deg,var(--border) 0,var(--border) 1px,transparent 1px,transparent 10px);
}
.protein-bar-fill{
  height:100%;position:relative;z-index:1;
  background:linear-gradient(90deg,#5BAD4E 0%,var(--amber) 100%);
  transition:width 0.4s;
}
.protein-meta{display:flex;justify-content:space-between;font-family:var(--mono);font-size:18px;color:var(--text2);letter-spacing:1px}

/* ---- PLAN PHASE CARDS ---- */
.phase-card{
  margin:0 16px 10px;
  border:1px solid var(--border);
  background:var(--bg2);
  position:relative;
}
.phase-card::before{display:none;}
.phase-card-stripe{width:4px;flex-shrink:0;align-self:stretch}
.day-tabs{
  display:flex;gap:0;
  border-bottom:1px solid var(--border);
  padding:0;
  overflow-x:auto;scrollbar-width:none;
  background:var(--bg3);
}
.day-tabs::-webkit-scrollbar{display:none}
.day-tab{
  flex-shrink:0;padding:9px 14px;
  font-family:var(--mono);font-size:18px;letter-spacing:2px;
  border:none;border-right:1px solid var(--border);
  background:none;color:var(--text3);cursor:pointer;
  border-bottom:3px solid transparent;transition:all 0.1s;
  white-space:nowrap;position:relative;
}
.day-tab.active{
  color:var(--amber);background:var(--bg2);
  border-bottom-color:var(--amber);
}

/* ---- LOG ---- */
.log-ex{
  background:var(--bg2);border:1px solid var(--border);
  margin-bottom:8px;border-left:3px solid var(--border2);
}
.log-ex-head{
  padding:11px 14px 9px;
  display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid var(--border);
  background:var(--bg3);
}
.log-ex-title{
  font-family:var(--body);font-weight:700;font-size:17px;
  color:var(--text);text-transform:uppercase;letter-spacing:.5px;
}
.log-ex-type{font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--text2)}
.set-row{
  display:flex;align-items:center;gap:7px;
  padding:7px 14px;border-bottom:1px solid #111111;
}
.set-num{
  font-family:var(--mono);font-size:17px;color:var(--amber);
  width:22px;flex-shrink:0;text-align:right;
}
.num-input{
  background:#111111;border:1px solid var(--border);
  color:var(--text);font-family:var(--mono);font-size:18px;
  padding:6px 4px;width:58px;text-align:center;
  -webkit-appearance:none;-moz-appearance:textfield;
}
.num-input::-webkit-outer-spin-button,.num-input::-webkit-inner-spin-button{-webkit-appearance:none}
.num-input:focus{outline:none;border-color:var(--amber-border);background:#101408}
.check-btn{
  margin-left:auto;width:32px;height:32px;
  border:1px solid var(--border);background:none;
  color:var(--text2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all 0.12s;font-size:18px;
}
.check-btn.done{background:var(--green);border-color:var(--green);color:#111111;font-weight:700;}
.del-btn{
  width:22px;height:22px;border:none;background:none;
  color:var(--text3);cursor:pointer;font-size:18px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.add-set-btn{
  font-family:var(--mono);font-size:18px;letter-spacing:2px;
  color:var(--text2);background:none;border:none;
  padding:9px 14px;cursor:pointer;width:100%;text-align:left;
  border-top:1px solid var(--border);
}
.done-only{display:flex;align-items:center;gap:10px;padding:10px 14px}
.big-check{
  width:34px;height:34px;border:1px solid var(--border);
  background:none;color:var(--text2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;transition:all 0.12s;
}
.big-check.done{background:var(--green);border-color:var(--green);color:#111111;font-weight:700;}
.save-btn{
  width:100%;padding:16px;background:#5BAD4E;
  border:2px solid #5BAD4E;
  color:#111111;font-family:var(--mono);
  font-size:12px;letter-spacing:4px;
  cursor:pointer;transition:all 0.1s;margin-top:16px;
  text-transform:uppercase;font-weight:700;
}
.save-btn:active,.save-btn.saved{background:#4a9a3e;border-color:#4a9a3e;}
textarea.notes{
  width:100%;background:var(--bg2);
  border:1px solid var(--border);border-left:3px solid var(--border2);
  color:var(--text2);font-family:var(--body);
  font-size:18px;font-weight:400;
  padding:11px 12px;resize:none;height:78px;margin-top:14px;
}
textarea.notes:focus{outline:none;border-left-color:var(--amber)}
textarea.notes::placeholder{color:var(--text3)}
.log-select{
  background:var(--bg3);border:1px solid var(--border);
  color:var(--text2);font-family:var(--mono);font-size:18px;
  padding:7px 10px;-webkit-appearance:none;cursor:pointer;
  letter-spacing:.5px;
}

/* ---- GENERATOR ---- */
.gen-option{
  display:block;width:100%;
  padding:16px 18px;
  background:var(--bg2);
  border:1px solid var(--border);
  border-left:3px solid var(--border2);
  color:var(--text2);font-family:var(--mono);
  font-size:18px;letter-spacing:2px;
  cursor:pointer;margin-bottom:8px;text-align:left;
  transition:all 0.12s;
}
.gen-option:active,.gen-option.selected{
  background:var(--bg3);border-color:var(--green-border);
  border-left-color:var(--green);color:var(--text);
}
.gen-option-sub{
  font-family:var(--body);font-weight:400;font-size:18px;
  color:var(--text2);margin-top:5px;letter-spacing:0;display:block;
}
.gen-back{
  font-family:var(--mono);font-size:18px;letter-spacing:3px;
  color:var(--text2);background:none;border:none;
  cursor:pointer;padding:0 0 16px;display:block;
}
.spinner{
  width:36px;height:36px;
  border:2px solid var(--border);border-top-color:var(--amber);
  border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto;
}
@keyframes spin{to{transform:rotate(360deg)}}
.equip-check{
  display:flex;align-items:center;gap:12px;
  padding:12px 14px;
  background:var(--bg2);border:1px solid var(--border);
  cursor:pointer;margin-bottom:6px;transition:all 0.1s;
}
.equip-check.selected{border-color:var(--green-border);border-left:3px solid var(--green);background:var(--bg3)}
.equip-check-box{
  width:20px;height:20px;
  border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:17px;color:var(--green);flex-shrink:0;
}
.equip-check.selected .equip-check-box{background:var(--green-bg);border-color:var(--green-border)}

/* ---- CHOW / RATIONS ---- */
.fuel-main{padding:20px 16px 30px;background:var(--bg)}
.fuel-hero{
  text-align:center;padding:14px 0 16px;
  background:var(--bg);
  border-bottom:1px solid var(--amber-border);
  margin-bottom:18px;
  position:relative;
}
.fuel-hero::before{
  content:'NUTRITION';
  position:absolute;top:0;left:0;right:0;
  font-family:var(--mono);font-size:8px;letter-spacing:4px;
  color:var(--amber);opacity:0.4;
}
.fuel-big-number{
  font-family:var(--display);font-size:80px;letter-spacing:3px;
  color:var(--text);line-height:1;
  text-shadow:0 0 40px rgba(212,168,32,.2);
}
.fuel-target{font-family:var(--mono);font-size:17px;color:var(--text2);letter-spacing:2px;margin-top:4px}
.fuel-bar{height:8px;background:#111111;margin:14px 0 8px;position:relative}
.fuel-bar-fill{
  height:100%;
  background:repeating-linear-gradient(90deg,var(--green) 0,var(--green) 6px,var(--amber) 6px,var(--amber) 7px,var(--green) 7px,var(--green) 14px);
  transition:width 0.4s;
}
.fuel-status{
  font-family:var(--mono);font-size:17px;letter-spacing:3px;
  color:var(--text2);text-align:center;
}
.fuel-section-label{
  font-family:var(--mono);font-size:18px;letter-spacing:4px;
  color:var(--amber);margin:18px 0 10px;
  display:flex;align-items:center;gap:8px;
}
.fuel-section-label::before{content:'▸';color:var(--green)}
.food-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px}
.food-tile{
  background:var(--bg2);border:1px solid var(--border);
  padding:10px 11px;cursor:pointer;text-align:left;
  transition:all 0.1s;position:relative;
}
.food-tile:active{background:var(--bg3);border-color:var(--green-border)}
.food-name{
  font-family:var(--body);font-weight:700;font-size:18px;
  color:var(--text);margin-bottom:1px;
  line-height:1.2;text-transform:uppercase;
}
.food-portion{
  font-family:var(--body);font-weight:400;font-size:17px;
  color:var(--text2);line-height:1.2;
}
.food-grams{
  font-family:var(--mono);font-size:18px;
  color:var(--green);letter-spacing:.5px;margin-top:5px;
}
.fuel-entry{
  background:var(--bg2);border:1px solid var(--border);
  border-left:3px solid var(--green);
  padding:9px 12px;
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:5px;
}
.fuel-entry-main{flex:1;min-width:0}
.fuel-entry-name{
  font-family:var(--body);font-weight:700;font-size:17px;
  color:var(--text);text-transform:uppercase;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.fuel-entry-time{font-family:var(--mono);font-size:9px;color:var(--text2);letter-spacing:.5px;margin-top:1px}
.fuel-entry-grams{font-family:var(--mono);font-size:18px;color:var(--green);letter-spacing:.5px;margin-left:8px;flex-shrink:0}
.fuel-remove{color:var(--text3);background:none;border:none;font-size:18px;cursor:pointer;margin-left:4px;padding:0 4px}
.custom-input-row{display:flex;gap:6px;margin-bottom:10px}
.custom-input{
  flex:1;background:var(--bg3);
  border:1px solid var(--border);border-bottom:2px solid var(--border2);
  color:var(--text);font-family:var(--body);font-size:18px;
  padding:9px 10px;
}
.custom-input:focus{outline:none;border-bottom-color:var(--amber)}
.custom-input.small{flex:0 0 80px;font-family:var(--mono);text-align:center}
.timing-card{
  background:var(--bg2);border:1px solid var(--border);
  border-left:3px solid var(--amber);
  padding:12px;margin-bottom:8px;
}
.timing-title{font-family:var(--mono);font-size:18px;letter-spacing:2px;color:var(--amber);margin-bottom:6px}
.timing-text{font-family:var(--body);font-weight:400;font-size:17px;color:var(--text2);line-height:1.5}

/* ---- INTEL ---- */
.intel-tabs{
  display:flex;gap:4px;
  border-bottom:2px solid var(--amber-border);
  margin-bottom:16px;
  overflow-x:auto;scrollbar-width:none;
}
.intel-tabs::-webkit-scrollbar{display:none}
.intel-tab{
  flex-shrink:0;padding:10px 14px;
  font-family:var(--mono);font-size:17px;letter-spacing:2px;
  border:1px solid var(--border);border-bottom:none;
  background:var(--bg2);color:var(--text2);cursor:pointer;
  transition:all 0.1s;
}
.intel-tab.active{
  color:#111111;background:var(--amber);
  border-color:var(--amber);
  border-bottom:2px solid var(--amber);
  font-weight:700;
  margin-bottom:-2px;
}
.pt-input-row{
  display:flex;align-items:center;gap:10px;
  padding:10px 0;border-bottom:1px solid var(--border);
}
.pt-input-label{
  flex:1;font-family:var(--body);font-weight:600;font-size:18px;
  color:var(--text2);text-transform:uppercase;
}
.pt-input-unit{
  font-family:var(--mono);font-size:18px;color:var(--amber);
  letter-spacing:2px;min-width:40px;text-align:left;
}
.pt-record{
  background:var(--bg2);border:1px solid var(--border);
  border-left:4px solid var(--amber);
  padding:10px 14px;margin-bottom:8px;
}
.pt-record-date{
  font-family:var(--mono);font-size:17px;
  color:var(--amber);letter-spacing:1px;margin-bottom:6px;
}
.pt-record-data{
  display:grid;grid-template-columns:1fr 1fr;
  gap:4px;font-family:var(--mono);font-size:17px;
  color:var(--text2);letter-spacing:.5px;
}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.stat-tile{
  background:var(--bg2);border:1px solid var(--border);
  padding:14px 12px;text-align:center;
  position:relative;
}
.stat-tile::before{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:var(--amber);opacity:.3;
}
.stat-label{
  font-family:var(--mono);font-size:9px;letter-spacing:3px;
  color:var(--amber);margin-bottom:6px;
}
.stat-value{
  font-family:var(--display);font-size:34px;
  letter-spacing:2px;color:var(--text);line-height:1;
}
.stat-unit{font-family:var(--mono);font-size:17px;color:var(--text2);letter-spacing:1px;margin-top:3px}

/* ---- HISTORY ---- */
.hist-entry{
  background:var(--bg2);border:1px solid var(--border);
  margin-bottom:8px;overflow:hidden;
}
.hist-head{
  padding:12px 16px;
  display:flex;justify-content:space-between;align-items:center;
  cursor:pointer;border-left:3px solid var(--border2);
}
.hist-date{font-family:var(--mono);font-size:18px;color:var(--text);letter-spacing:1px}
.hist-sub{font-family:var(--mono);font-size:18px;color:var(--text2);letter-spacing:.5px;margin-top:2px}
.hist-chevron{font-size:17px;color:var(--text3);transition:transform 0.15s}
.hist-chevron.open{transform:rotate(180deg)}
.hist-body{display:none;padding:10px 16px 14px;border-top:1px solid var(--border)}
.hist-body.open{display:block}
.hist-ex-name{
  font-family:var(--body);font-weight:700;font-size:17px;
  color:var(--text2);text-transform:uppercase;margin:8px 0 3px;
}
.hist-set{font-family:var(--mono);font-size:17px;color:var(--text2);margin-bottom:2px}
.hist-set.done-set{color:var(--green)}
.hist-notes-text{
  font-family:var(--body);font-weight:400;font-size:17px;
  color:var(--text2);font-style:italic;
  margin-top:8px;padding-top:8px;border-top:1px solid var(--border);
}
.date-input{
  background:var(--bg3);border:1px solid var(--border);
  color:var(--text2);font-family:var(--mono);font-size:17px;
  padding:6px 8px;
}
.date-input:focus{outline:none;border-color:var(--amber-border)}

/* ---- PLAN MOVE PANEL ---- */
.plan-move-panel-inner{
  margin:10px 0 0;
  border:1px solid var(--amber-border);
  border-left:4px solid var(--amber);
  background:var(--bg);
}

/* ---- ANIMATIONS ---- */
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn 0.2s ease both}
.tab-safe{padding-top:var(--safe-t)}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.slide-down{animation:slideDown 0.2s ease both}
</style>
</head>
<body>
<div id="app">
  <div id="safe-top"></div>
  <main id="main"></main>
  <nav id="nav">
    <button class="nav-btn" id="nav-today" onclick="setTab('today')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>TODAY</button>
    <button class="nav-btn" id="nav-plan" onclick="setTab('plan')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>PLAN</button>
    <button class="nav-btn" id="nav-log" onclick="setTab(\"log\")"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>LOG</button>
    <button class="nav-btn" id="nav-fuel" onclick="setTab('fuel')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 10h18M5 10V6a2 2 0 012-2h10a2 2 0 012 2v4M5 10v8a2 2 0 002 2h10a2 2 0 002-2v-8"/><path d="M8 14h8"/></svg>FUEL</button>
    <button class="nav-btn" id="nav-gen" onclick="setTab('gen')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>BUILD</button>
    <button class="nav-btn" id="nav-squad" onclick="setTab('squad')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>SQUAD</button>
    <button class="nav-btn" id="nav-stats" onclick="setTab('stats')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>STATS</button>
  </nav>
</div>
<script>
// ============================================================
// PHASE DATA
// ============================================================
const PHASE_LENGTHS=[14,21,21,14,28];
const PHASES=[
 {id:0,title:"REACTIVATION",short:"REACT.",weeks:"Wks 1–2",color:"#5BAD4E",tagline:"Wake the body up. Don't crush it.",dowMap:{1:0,2:1,4:2,6:3},schedule:[
  {day:"MON",label:"Upper Body",tag:"BODYWEIGHT",exercises:[

   {n:"Push-Ups",d:"3 × 10",t:"bw",log:true,ro:true},
   {n:"Pike Push-Ups",d:"3 × 8",t:"bw",log:true,ro:true},
   {n:"Bench-Assisted Rows",d:"3 × 10",t:"bw",log:true,ro:true},
   {n:"Plank",d:"3 × 30 sec",t:"core",log:true,ro:true},
   {n:"Dead Hang",d:"2 × 20 sec",t:"mob",log:false},
   {n:"Cool Down",d:"5 min — pec, lat, thoracic",t:"cool",log:false},
  ]},

const SETTINGS_KEY='grind_cfg';
const STORE_KEY='grind_v2';
const SKIPS_KEY='grind_skips';
const MOVES_KEY='grind_moves';
const CHECKIN_KEY='grind_checkin';
const RATIONS_KEY='grind_rations';
const PT_KEY='grind_pt';
const METRICS_KEY='grind_metrics';

function getSettings(){try{return JSON.parse(localStorage.getItem(SETTINGS_KEY)||'{}')}catch(e){return{}}}
function saveSettings(o){localStorage.setItem(SETTINGS_KEY,JSON.stringify({...getSettings(),...o}))}
function getStartDate(){return getSettings().startDate||'2026-04-22'}
function getProteinTarget(){return getSettings().proteinTarget||170}
function loadStore(){try{return JSON.parse(localStorage.getItem(STORE_KEY)||'{}')}catch(e){return{}}}
function saveLogEntry(date,phaseId,dayIdx,sets,notes){const s=loadStore();s[date]={phaseId,dayIdx,sets,notes,savedAt:new Date().toISOString()};localStorage.setItem(STORE_KEY,JSON.stringify(s));}
function getLogEntry(date){return loadStore()[date]||null}
function getAllLogs(){return Object.entries(loadStore()).sort((a,b)=>b[0].localeCompare(a[0]))}
function getSkips(){try{return JSON.parse(localStorage.getItem(SKIPS_KEY)||'{}')}catch(e){return{}}}
function saveSkipEntry(date,type,phaseId,dayIdx,movedTo){const s=getSkips();s[date]={type,phaseId,dayIdx,movedTo:movedTo||null,savedAt:new Date().toISOString()};localStorage.setItem(SKIPS_KEY,JSON.stringify(s));}
function getMoves(){try{return JSON.parse(localStorage.getItem(MOVES_KEY)||'{}')}catch(e){return{}}}
function saveMoveEntry(targetDate,phaseId,dayIdx,originalDate){const m=getMoves();m[targetDate]={phaseId,dayIdx,originalDate,savedAt:new Date().toISOString()};localStorage.setItem(MOVES_KEY,JSON.stringify(m));}

function getCheckins(){try{return JSON.parse(localStorage.getItem(CHECKIN_KEY)||'{}')}catch(e){return{}}}
function getCheckin(date){return getCheckins()[date]||null}
function saveCheckin(date,data){const s=getCheckins();s[date]={...data,savedAt:new Date().toISOString()};localStorage.setItem(CHECKIN_KEY,JSON.stringify(s));}

function getAllRations(){try{return JSON.parse(localStorage.getItem(RATIONS_KEY)||'{}')}catch(e){return{}}}
function getRations(date){return getAllRations()[date]||{entries:[]}}
function addRation(date,food,grams){const all=getAllRations();if(!all[date])all[date]={entries:[]};all[date].entries.push({food,grams:Number(grams),time:new Date().toISOString()});localStorage.setItem(RATIONS_KEY,JSON.stringify(all));}
function removeRation(date,idx){const all=getAllRations();if(!all[date])return;all[date].entries.splice(idx,1);localStorage.setItem(RATIONS_KEY,JSON.stringify(all));}
function getProteinTotal(date){return getRations(date).entries.reduce((s,e)=>s+e.grams,0)}
function getProteinWeekAvg(){let total=0,days=0;for(let i=0;i<7;i++){const d=addDays(todayStr(),-i);const t=getProteinTotal(d);if(t>0){total+=t;days++;}}return days>0?Math.round(total/days):0}

function getPTTests(){try{return JSON.parse(localStorage.getItem(PT_KEY)||'{}')}catch(e){return{}}}
function savePTTest(date,data){const t=getPTTests();t[date]={...data,savedAt:new Date().toISOString()};localStorage.setItem(PT_KEY,JSON.stringify(t));}
function deletePTTest(date){const t=getPTTests();delete t[date];localStorage.setItem(PT_KEY,JSON.stringify(t));}
function getAllPTSorted(){return Object.entries(getPTTests()).sort((a,b)=>b[0].localeCompare(a[0]))}

function getMetrics(){try{return JSON.parse(localStorage.getItem(METRICS_KEY)||'{}')}catch(e){return{}}}
function saveMetric(date,data){const m=getMetrics();m[date]={...data,savedAt:new Date().toISOString()};localStorage.setItem(METRICS_KEY,JSON.stringify(m));}
function deleteMetric(date){const m=getMetrics();delete m[date];localStorage.setItem(METRICS_KEY,JSON.stringify(m));}
function getAllMetricsSorted(){return Object.entries(getMetrics()).sort((a,b)=>b[0].localeCompare(a[0]))}

// DATE HELPERS
// ============================================================
function parseDate(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d)}
function dateStr(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function todayStr(){return dateStr(new Date())}
function fmtDate(ds){const d=parseDate(ds);const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return{dow:days[d.getDay()],full:`${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`,short:`${days[d.getDay()]} ${months[d.getMonth()]} ${d.getDate()}`}}
function addDays(ds,n){const d=parseDate(ds);d.setDate(d.getDate()+n);return dateStr(d)}
function getPhaseStart(pi){const s=parseDate(getStartDate());const lens=getPlanPhaseLengths();for(let i=0;i<pi;i++)s.setDate(s.getDate()+(lens[i]||14));return s}
function getPhaseEnd(pi){const s=getPhaseStart(pi);const lens=getPlanPhaseLengths();s.setDate(s.getDate()+(lens[pi]||14)-1);return s}
function getPhaseDates(pi){const s=getPhaseStart(pi),e=getPhaseEnd(pi);const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return`${months[s.getMonth()]} ${s.getDate()} – ${months[e.getMonth()]} ${e.getDate()}`}
function getPhaseForDate(ds){const d=parseDate(ds);for(let i=0;i<PHASES.length;i++){if(d>=getPhaseStart(i)&&d<=getPhaseEnd(i))return i;}return -1}
function getDayIdxForDate(ds,pi){if(pi<0)return -1;const dow=parseDate(ds).getDay();const m=PHASES[pi].dowMap;return m[dow]!==undefined?m[dow]:-1}
function getWeekNum(ds){const start=parseDate(getStartDate());const d=parseDate(ds);return Math.max(1,Math.floor((d-start)/(7*86400000))+1)}
function isMonday(ds){return parseDate(ds).getDay()===1}
function isProgramWeekStart(ds){const sd=getStartDate();const startDow=parseDate(sd).getDay();return ds===sd||parseDate(ds).getDay()===startDow;}

// ============================================================
function sessionIntensity(pi,di){
 if(pi<0||di<0)return'rest';
 const tag=PHASES[pi].schedule[di].tag;
 if(/MOBILITY|RECOVERY/.test(tag))return'easy';
 if(/^CARDIO ONLY/.test(tag)||/^CARDIO$/.test(tag))return'medium';
 if(/^BODYWEIGHT$/.test(tag))return'medium';
 return'hard';
}
function analyzeConflict(targetDate,movingPi,movingDi){
 const movingInt=sessionIntensity(movingPi,movingDi);
 const prevDate=addDays(targetDate,-1),nextDate=addDays(targetDate,1);
 const prevPi=getPhaseForDate(prevDate),prevDi=getDayIdxForDate(prevDate,prevPi);
 const nextPi=getPhaseForDate(nextDate),nextDi=getDayIdxForDate(nextDate,nextPi);
 const moves=getMoves();const prevMoved=moves[prevDate],nextMoved=moves[nextDate];
 const prevInt=prevMoved?sessionIntensity(prevMoved.phaseId,prevMoved.dayIdx):(prevDi>=0?sessionIntensity(prevPi,prevDi):'rest');
 const nextInt=nextMoved?sessionIntensity(nextMoved.phaseId,nextMoved.dayIdx):(nextDi>=0?sessionIntensity(nextPi,nextDi):'rest');
 const prevDay=prevDi>=0?PHASES[prevPi].schedule[prevDi]:null,nextDay=nextDi>=0?PHASES[nextPi].schedule[nextDi]:null;
 if(movingInt==='hard'&&prevInt==='hard')return{level:'bad',text:`The day before (${fmtDate(prevDate).dow}) already has a hard session: ${prevDay?prevDay.label:'a workout'}. Back-to-back heavy days will wreck your performance and spike injury risk.`};
 if(movingInt==='hard'&&nextInt==='hard')return{level:'bad',text:`The day after (${fmtDate(nextDate).dow}) has a hard session: ${nextDay?nextDay.label:'a workout'}. Running two heavy sessions back to back degrades the second — less weight, worse form, slower recovery.`};
 if(movingInt==='hard'&&(prevInt==='medium'||nextInt==='medium'))return{level:'warn',text:`Adjacent to a moderate session. Manageable, but make sure you're eating and sleeping well.`};
 return{level:'ok',text:`No conflict. Clean fit — performance won't be compromised.`};
}
function findMoveDates(fromDate,phaseId,dayIdx){
 const results=[];
 for(let i=1;i<=7;i++){
  const ds=addDays(fromDate,i);
  const pi=getPhaseForDate(ds),di=getDayIdxForDate(ds,pi);
  const moves=getMoves(),skips=getSkips();
  if(di>=0||moves[ds])continue;
  if(skips[ds]&&skips[ds].type==='moved')continue;
  results.push({date:ds,conflict:analyzeConflict(ds,phaseId,dayIdx)});
  if(results.length>=3)break;
 }
 return results;
}
function getSessionType(pi,di){
 const day=(getPlanPhases()[pi]||PHASES[0]).schedule[di]||{};const l=day.label.toLowerCase(),t=day.tag;
 if(/lower|leg/i.test(l))return'leg';
 if(/push/i.test(l))return'push';
 if(/pull/i.test(l))return'pull';
 if(/conditioning|hero/i.test(l))return'conditioning';
 if(/recovery|mobility/i.test(t))return'recovery';
 if(/benchmark|test/i.test(t))return'benchmark';
 if(/circuit/i.test(l)||/circuit/i.test(t))return'circuit';
 return'general';
}
function getPhaseContext(pi){
 if(hasCustomPlan()&&getActivePlan()&&getActivePlan()[pi]){const p=getActivePlan()[pi];return`You're in ${p.title||'Phase '+(pi+1)}. Stay consistent.`;}
 if(pi===0)return"You're in the first two weeks. The habit isn't formed yet — every skip now teaches your brain that the workout is negotiable. It isn't.";
 if(pi===1)return"You're building the foundation right now. Every session you complete compounds. Every one you don't leaves a crack.";
 if(pi===2)return"This is the Build phase — where the program gets harder and where the physique change starts to show. Missing sessions now costs double.";
 if(pi===3)return"You've built eight weeks of work to get here. Phase 4 is where you cash in. Don't hand it back.";
 return"You're in the final push. July 31 is the deadline you set. Every session between now and then matters.";
}

function buildPregnancyWorkout(focus,duration){
  const counts={20:{warmup:2,main:4,cool:1},30:{warmup:3,main:5,cool:2},45:{warmup:3,main:7,cool:2},60:{warmup:4,main:9,cool:3}}[duration]||{warmup:3,main:5,cool:2};
  function pick(arr,n){return[...arr].sort(()=>Math.random()-.5).slice(0,Math.min(n,arr.length));}
  let exercises=[...pick(PREGNANCY_EXERCISES.warmup,counts.warmup)];
  let title='',coachNote='';
  if(focus==='upper'){exercises.push(...pick(PREGNANCY_EXERCISES.upper,counts.main));title='Pregnancy Safe Upper';coachNote='Strength work is healthy during pregnancy. Listen to your body.';}
  else if(focus==='lower'){exercises.push(...pick(PREGNANCY_EXERCISES.lower,counts.main-1));exercises.push(...pick(PREGNANCY_EXERCISES.core,1));title='Pregnancy Safe Lower';coachNote='Lower body work keeps you strong for labor. Include pelvic floor every session.';}
  else if(focus==='full'){exercises.push(...pick(PREGNANCY_EXERCISES.upper,Math.floor(counts.main/2)));exercises.push(...pick(PREGNANCY_EXERCISES.lower,Math.ceil(counts.main/2)-1));exercises.push(...pick(PREGNANCY_EXERCISES.core,1));title='Pregnancy Safe Full Body';coachNote='Always include pelvic floor work.';}
  else if(focus==='cardio'){exercises.push(...pick(PREGNANCY_EXERCISES.cardio,counts.main));title='Pregnancy Safe Cardio';coachNote='Aim for RPE 4-5 — hold a full conversation throughout.';}
  else{exercises.push(...pick(PREGNANCY_EXERCISES.recovery,counts.main+1));title='Prenatal Recovery';coachNote='Mobility reduces discomfort, prepares for labor, and improves sleep.';}
  exercises.push(...pick(PREGNANCY_EXERCISES.recovery.slice(0,3),counts.cool));
  return{title:`${duration}-Min ${title}`,coachNote,exercises};
}

function timeAgo(isoStr){
  const diff=(Date.now()-new Date(isoStr))/1000;
  if(diff<60)return'just now';
  if(diff<3600)return Math.floor(diff/60)+'m ago';
  if(diff<86400)return Math.floor(diff/3600)+'h ago';
  if(diff<604800)return Math.floor(diff/86400)+'d ago';
  const d=new Date(isoStr);return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

function buildShareText(workoutTitle,phaseName,durationEst,notes){
  const user=getUser();const emoji=user?getUserEmoji():'🏋🏻‍♂️';const name=user?user.name:'Someone';
  const dur=durationEst?' · ~'+durationEst+' min':'';
  let text=emoji+'✅ '+name+' logged '+workoutTitle;
  if(phaseName)text+='\n'+phaseName+dur;
  if(notes)text+='\n"'+notes+'"';
  text+='\n'+APP_URL;
  return text;
}
async function sendToSquad(workoutTitle,phaseName,durationEst,exercises,notes){
  const user=getUser();if(!user)return;
  const exSummary=exercises.map(([name,sets])=>({name,summary:sets.filter(s=>s.done).length+'/'+sets.length+' sets'+(sets.find(s=>s.done&&s.weight&&s.weight!=='0')?' · '+sets.filter(s=>s.done&&s.weight).map(s=>s.weight+'lb').filter((v,i,a)=>a.indexOf(v)===i).join(', '):'')}));
  const payload={user_name:user.name,user_gender:user.gender,workout_title:workoutTitle,phase_name:phaseName||null,duration_est:durationEst||null,exercises:JSON.stringify(exSummary),notes:notes||null};
  const ok=await postWorkoutToSquad(payload);
  try{await navigator.clipboard.writeText(buildShareText(workoutTitle,phaseName,durationEst,notes));S.squadShareCopied=true;}
  catch(e){S.squadShareCopied=false;}
  S.squadShareOk=ok;S.squadShareShown=true;renderMain();
}

// Get today's scheduled session for a goal with an app plan
function getTodayGoalSession(goal) {
  if (!goal.planData || !goal.planData.phases) return null;
  var today = new Date();
  var dow = today.getDay();
  var phases = goal.planData.phases;

  // Find which phase we're in based on goal start date (use settings startDate or goal createdAt)
  var startDate = parseDate(getStartDate());
  var daysSinceStart = Math.floor((today - startDate) / 86400000);
  if (daysSinceStart < 0) daysSinceStart = 0;

  var daysAccum = 0;
  for (var pi = 0; pi < phases.length; pi++) {
    var ph = phases[pi];
    daysAccum += ph.durationDays || 14;
    if (daysSinceStart < daysAccum) {
      var dowMap = ph.dowMap || {};
      var sessionIdx = dowMap[String(dow)];
      if (sessionIdx === undefined) return null;
      var session = ph.schedule[sessionIdx];
      if (!session) return null;
      return {
        label: session.label,
        tag: session.tag,
        est: getDayEst ? getDayEst(session.label) : null,
        exercises: session.exercises,
        phaseIdx: pi,
        sessionIdx: sessionIdx,
      };
    }
  }
  return null;
}

const GOALS_KEY = 'grind_goals';

function getGoals(status) {
  try {
    const all = JSON.parse(localStorage.getItem(GOALS_KEY) || '[]');
    return status ? all.filter(g => g.status === status) : all;
  } catch(e) { return []; }
}

function getActiveGoals() { return getGoals('active'); }

function saveGoals(goals) {
  localStorage.setItem(GOALS_KEY, JSON.stringify(goals));
  syncGoalsToSupabase(goals).catch(() => {});
}

function upsertGoal(goal) {
  const all = getGoals();
  const idx = all.findIndex(g => g.id === goal.id);
  if (idx >= 0) all[idx] = {...all[idx], ...goal, updatedAt: new Date().toISOString()};
  else all.unshift({...goal, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString()});
  saveGoals(all);
}

function archiveGoal(id) {
  const all = getGoals();
  const g = all.find(g => g.id === id);
  if (g) { g.status = 'archived'; g.updatedAt = new Date().toISOString(); }
  saveGoals(all);
}

function completeGoal(id) {
  const all = getGoals();
  const g = all.find(g => g.id === id);
  if (g) { g.status = 'completed'; g.completedAt = new Date().toISOString(); g.updatedAt = new Date().toISOString(); }
  saveGoals(all);
}

function makeGoalId() {
  return 'g_' + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
}

function getDisciplineLabel(d) {
  return {weight_training:'Weight Training', endurance:'Endurance', functional:'Functional Fitness', hiit:'HIIT', mobility:'Mobility'}[d] || d;
}

function getActivityLabel(a) {
  return {running:'Running', cycling:'Cycling', rowing:'Rowing', swimming:'Swimming', walking:'Walking / Hiking', general:'General Cardio'}[a] || a;
}

function getGoalTypeLabel(t) {
  return {
    '5k':'5K', '10k':'10K', 'half_marathon':'Half Marathon', 'full_marathon':'Full Marathon',
    'century':'Century / Gran Fondo', 'sportive':'Sportive', 'general':'General Fitness',
    '2k_race':'2K Race', '5k_race':'5K Race', 'open_water':'Open Water Event',
    'pool_distance':'Pool Distance', 'event':'Specific Event'
  }[t] || t;
}

function goalCountdown(targetDate) {
  if (!targetDate) return null;
  const days = Math.ceil((new Date(targetDate) - new Date().setHours(0,0,0,0)) / 86400000);
  if (days < 0) return 'RACE DAY PAST';
  if (days === 0) return 'RACE DAY';
  if (days === 1) return '1 DAY OUT';
  return days + ' DAYS';
}

function goalSubLabel(goal) {
  if (goal.discipline === 'endurance') {
    const parts = [getActivityLabel(goal.activity)];
    if (goal.goalType && goal.goalType !== 'general') parts.push(getGoalTypeLabel(goal.goalType));
    return parts.join(' — ');
  }
  return getDisciplineLabel(goal.discipline);
}

async function syncGoalsToSupabase(goals) {
  if (SUPABASE_URL === 'YOUR_SUPABASE_URL') return;
  // Goals are personal — sync under user_plans table using a goals prefix
  const uid = getUserId();
  const active = goals.filter(g => g.status === 'active');
  await supaFetch('user_plans?user_id=eq.' + uid + '&plan_data->>type=eq.goals', {
    method: 'DELETE', prefer: 'return=minimal'
  });
  if (active.length) {
    await supaFetch('user_plans', {
      method: 'POST', prefer: 'return=minimal',
      body: JSON.stringify({user_id: uid, user_name: getUser()?.name, plan_data: JSON.stringify({type:'goals', goals: active})})
    });
  }
}

// Duration options per discipline/goal type
function gbDurationOptions(discipline, goalType) {
  if (discipline === 'endurance') {
    if (goalType === 'full_marathon') return ['16 weeks','18 weeks','20 weeks'];
    if (goalType === 'half_marathon') return ['12 weeks','14 weeks','16 weeks'];
    if (goalType === '10k') return ['10 weeks','12 weeks','14 weeks'];
    if (goalType === '5k') return ['8 weeks','10 weeks','12 weeks'];
    return ['8 weeks','12 weeks','16 weeks','20 weeks'];
  }
  if (discipline === 'functional' || discipline === 'hiit') return ['4 weeks','6 weeks','8 weeks'];
  if (discipline === 'mobility') return ['4 weeks','6 weeks','8 weeks','12 weeks'];
  return ['4 weeks','6 weeks','8 weeks','12 weeks']; // weight training default
}

// Builder questions per discipline
function gbBuilderQuestions(discipline, goalType) {
  const durationOpts = gbDurationOptions(discipline, goalType);
  const base = [
    {id:'days', label:'DAYS PER WEEK?', opts:['2 days','3 days','4 days','5 days','6 days']},
    {id:'duration', label:'PROGRAM LENGTH?', opts: durationOpts},
    {id:'experience', label:'EXPERIENCE LEVEL?', opts:['Beginner','Intermediate','Advanced']},
  ];
  if (discipline === 'endurance') {
    // Running/endurance doesn't need equipment in the same way
    return base;
  }
  if (discipline === 'mobility') {
    return [
      {id:'days', label:'DAYS PER WEEK?', opts:['3 days','4 days','5 days','6 days','Every day']},
      {id:'duration', label:'PROGRAM LENGTH?', opts: durationOpts},
      {id:'experience', label:'EXPERIENCE LEVEL?', opts:['Beginner','Intermediate','Advanced']},
    ];
  }
  return [
    ...base,
    {id:'equipment', label:'EQUIPMENT AVAILABLE?', opts:['Bodyweight only','Resistance bands','Dumbbells','Dumbbells + bench','Full home gym','Commercial gym']},
  ];
}

function gbBuilderBack(){const k=Object.keys(GB.builderAnswers);if(k.length){delete GB.builderAnswers[k[k.length-1]];renderMain();}else{GB.step=5;renderMain();}}
function gbBuilderAnswer(k,v){GB.builderAnswers[k]=v;renderMain();}

function gbSaveGoal() {
  GB.loading = true; GB.error = null; renderMain();
  try {
    const d = GB.draft;
    const id = d.id || makeGoalId();
    let planData = null;

    if (d.planType === 'app' && Object.keys(GB.builderAnswers).length) {
      planData = buildOfflinePlan({
        discipline: d.discipline,
        activity: d.activity,
        goalType: d.goalType,
        crossTraining: d.crossTraining,
        ...GB.builderAnswers,
      });
      if (!planData) { GB.loading = false; GB.error = 'Could not generate plan. Try different options.'; renderMain(); return; }
    }

    // Validate active goal count
    const existing = getGoals();
    const activeCount = existing.filter(g => g.status === 'active' && g.id !== id).length;
    if (activeCount >= 3 && !GB.editingId) {
      GB.loading = false;
      GB.error = 'You have 3 active goals. Archive one before adding another.';
      renderMain(); return;
    }

    upsertGoal({id, label:d.label, targetDate:d.targetDate||null, discipline:d.discipline,
      activity:d.activity||null, goalType:d.goalType||null, crossTraining:d.crossTraining,
      planType:d.planType, planData, status:'active'});

    // If first goal with an app plan, set as active goal and update start date
    if (planData) saveSettings({startDate: todayStr()});

    GB.loading = false;
    gbReset();
    S.showGoalCreator = false;
    S.activeGoalId = id;
    renderMain();
  } catch(e) {
    GB.loading = false;
    GB.error = 'Something went wrong. ' + e.message;
    renderMain();
  }
}

// Mid-goal discipline change
function goalChangeDisc(goalId) {
  const goal = getGoals().find(g => g.id === goalId);
  if (!goal) return;
  GB.editingId = goalId;
  GB.draft = {...goal};
  GB.draft.id = goalId;
  GB.builderAnswers = {};
  GB.step = 2; // start at discipline selection
  S.showGoalCreator = true;
  renderMain();
}

// Adapt plan (keeps discipline, rebuilds plan)
function goalAdaptPlan(goalId) {
  const goal = getGoals().find(g => g.id === goalId);
  if (!goal) return;
  // Archive old plan data under a history key
  if (goal.planData) {
    const history = JSON.parse(localStorage.getItem('grind_plan_history') || '[]');
    history.unshift({goalId, archivedAt: new Date().toISOString(), planData: goal.planData});
    localStorage.setItem('grind_plan_history', JSON.stringify(history.slice(0, 10)));
  }
  GB.editingId = goalId;
  GB.draft = {...goal};
  GB.draft.id = goalId;
  GB.builderAnswers = {};
  GB.step = 6; // go straight to builder questions
  S.showGoalCreator = true;
  renderMain();
}

// OFFLINE PLAN TEMPLATE ENGINE
// ============================================================

function buildOfflinePlan(opts) {
  const { discipline, activity, goalType, crossTraining = [],
          days = '4 days', duration = '8 weeks', experience = 'Intermediate', equipment = 'Dumbbells' } = opts;

  const daysNum  = parseInt(days)  || 4;
  const weeksNum = parseInt(duration) || 8;
  const level    = experience.toLowerCase().includes('begin') ? 'beginner' :
                   experience.toLowerCase().includes('adv')   ? 'advanced' : 'intermediate';
  const equip    = equipment.toLowerCase();

  if (discipline === 'endurance') return buildEndurancePlan(activity, goalType, daysNum, weeksNum, level, crossTraining);
  if (discipline === 'functional') return buildFunctionalPlan(daysNum, weeksNum, level, equip, crossTraining);
  if (discipline === 'hiit')       return buildHIITPlan(daysNum, weeksNum, level, equip, crossTraining);
  if (discipline === 'mobility')   return buildMobilityPlan(daysNum, weeksNum, level, crossTraining);
  return buildWeightTrainingPlan(daysNum, weeksNum, level, equip, crossTraining);
}

// ---- HELPERS ----
function makePlanId() { return 'p_' + Date.now().toString(36); }

function phaseColor(i) {
  return ['#5BAD4E','#c8a020','#a06020','#c04040','#d4a820'][i % 5];
}

function dowLabel(dow) {
  return ['SUN','MON','TUE','WED','THU','FRI','SAT'][dow];
}

// Build a dowMap and schedule from an array of day-of-week numbers
// sessions = [{dow:1, label:'Upper Body', tag:'IRON', exercises:[...]}, ...]
function buildPhase(id, title, short, weeksStr, durationDays, tagline, sessions) {
  const dowMap = {};
  sessions.forEach((s, i) => { dowMap[String(s.dow)] = i; });
  const schedule = sessions.map(function(s) {
    return { day: dowLabel(s.dow), label: s.label, tag: s.tag, exercises: s.exercises };
  });
  return { id, title, short, weeks: weeksStr, durationDays, color: phaseColor(id), tagline, dowMap, schedule };
}

// Standard day-of-week assignments by days/week count
function getDows(count) {
  const patterns = {
    2: [1,4],           // Mon Thu
    3: [1,3,5],         // Mon Wed Fri
    4: [1,2,4,6],       // Mon Tue Thu Sat
    5: [1,2,3,4,6],     // Mon-Thu Sat
    6: [1,2,3,4,5,6],   // Mon-Sat
  };
  return patterns[count] || patterns[4];
}

function warmup() { return [EX.warmup[0]]; }
function cool()   { return [EX.cool[0]]; }
function core()   { return EX.core.slice(0,2); }

function pickEquip(equip, dbExs, bwExs) {
  return (equip.includes('dumbbell') || equip.includes('gym') || equip.includes('home')) ? dbExs : bwExs;
}

// ---- WEIGHT TRAINING PLAN ----
function buildWeightTrainingPlan(days, weeks, level, equip, crossTraining) {
  const hasXtrain = crossTraining.length > 0;
  const dows = getDows(days);
  const phases = [];

  // Determine split based on days
  let split = 'fullbody';
  if (days >= 4) split = 'upperlower';
  if (days >= 5) split = 'ppl';

  // Phase 1: Foundation (weeks 1 - half)
  const p1weeks = Math.ceil(weeks / 2);
  const p2weeks = weeks - p1weeks;

  function makeWeightSessions(phase) {
    const mult = phase === 2 ? ' — add weight' : '';
    if (split === 'fullbody') {
      return dows.map(function(dow, i) {
        var isXt = hasXtrain && i === dows.length - 1;
        if (isXt) return {dow, label:'Active Recovery', tag:'RECOVERY', exercises: warmup().concat(EX.mobFull).concat(cool())};
        var exs = pickEquip(equip, warmup().concat(EX.pushDB.slice(0,2)).concat(EX.pullDB.slice(0,2)).concat(EX.lowerDB.slice(0,2)).concat(core()).concat(cool()),
                                   warmup().concat(EX.fullBW).concat(core()).concat(cool()));
        return {dow, label:'Full Body'+(phase===2?' — Load':''), tag: equip.includes('body')?'BODYWEIGHT':'IRON', exercises: exs};
      });
    }
    if (split === 'upperlower') {
      return dows.map(function(dow, i) {
        var isXt = hasXtrain && (i === 1 || i === dows.length - 1);
        if (isXt) return {dow, label:'Cross-Training', tag:'ACTIVE', exercises: warmup().concat(EX.cardioXt).concat(cool())};
        if (i % 2 === 0) {
          return {dow, label:'Upper Body'+mult, tag:'IRON', exercises: warmup().concat(EX.pushDB.slice(0,3)).concat(EX.pullDB.slice(0,2)).concat(cool())};
        } else {
          return {dow, label:'Lower Body'+mult, tag:'IRON', exercises: warmup().concat(EX.lowerDB).concat(core()).concat(cool())};
        }
      });
    }
    // PPL
    return dows.map(function(dow, i) {
      var t = i % 3;
      if (t === 0) return {dow, label:'Push'+mult, tag:'IRON', exercises: warmup().concat(EX.pushDB).concat(cool())};
      if (t === 1) return {dow, label:'Pull'+mult, tag:'IRON', exercises: warmup().concat(EX.pullDB).concat(cool())};
      return {dow, label:'Legs'+mult, tag:'IRON', exercises: warmup().concat(EX.lowerDB).concat(core()).concat(cool())};
    });
  }

  phases.push(buildPhase(0, 'FOUNDATION', 'BASE', 'Wks 1-'+p1weeks, p1weeks*7,
    'Establish movement patterns and baseline strength.', makeWeightSessions(1)));
  if (p2weeks > 0) {
    phases.push(buildPhase(1, 'BUILD', 'BUILD', 'Wks '+(p1weeks+1)+'-'+weeks, p2weeks*7,
      'Progressive overload. Add weight each week where possible.', makeWeightSessions(2)));
  }
  return {title:'Weight Training — '+weeks+' Weeks', summary:'Progressive '+split.replace('ppl','Push/Pull/Legs').replace('upperlower','Upper/Lower')+' program, '+weeks+' weeks.', phases};
}

// ---- ENDURANCE PLAN ----
function buildEndurancePlan(activity, goalType, days, weeks, level, crossTraining) {
  const isRun = activity === 'running';
  const isRow = activity === 'rowing';
  const hasXT = crossTraining.includes('weight_training') || crossTraining.includes('functional');
  const phases = [];

  if (isRun) {
    // Long run distance targets by goal type and week
    function longRunTarget(week, goalType, weeks) {
      var pct = week / weeks;
      var peak = goalType === 'full_marathon' ? 20 : goalType === 'half_marathon' ? 12 :
                 goalType === '10k' ? 8 : 5;
      if (pct > 0.85) return Math.round(peak * 0.7); // taper
      return Math.round(peak * Math.min(pct * 1.2, 0.95));
    }

    function easyMiles(week, goalType, weeks) {
      return Math.max(2, Math.round(longRunTarget(week, goalType, weeks) * 0.5));
    }

    function tempoMiles(week, goalType, weeks) {
      return Math.max(2, Math.round(longRunTarget(week, goalType, weeks) * 0.4));
    }

    var dows = getDows(Math.min(days, 5));
    var runDows = dows.slice(0, isRow ? dows.length : dows.length);

    // Split weeks into phases
    var p1 = Math.ceil(weeks * 0.3); // base
    var p3 = Math.min(3, Math.ceil(weeks * 0.15)); // taper
    var p2 = weeks - p1 - p3; // build

    function makeRunWeek(weekNum) {
      return dows.map(function(dow, i) {
        var isLong = i === dows.length - 1;
        var isTempo = !isLong && i === 1 && weekNum > p1;
        var isIntervals = !isLong && !isTempo && i === 2 && weekNum > p1 + 2;
        var isXT = hasXT && (i === 0);

        if (isXT) return {dow, label:'Strength Cross-Training', tag:'IRON',
          exercises: warmup().concat(EX.pushDB.slice(0,2)).concat(EX.pullDB.slice(0,2)).concat(EX.lowerDB.slice(0,2)).concat(cool())};
        if (isLong) return {dow, label:'Long Run', tag:'RUN',
          exercises: warmup().concat(EX.runLong(longRunTarget(weekNum, goalType, weeks))).concat(cool())};
        if (isTempo) return {dow, label:'Tempo Run', tag:'RUN',
          exercises: warmup().concat(EX.runTempo(tempoMiles(weekNum, goalType, weeks))).concat(cool())};
        if (isIntervals) return {dow, label:'Interval Run', tag:'RUN',
          exercises: warmup().concat(EX.runIntervals()).concat(cool())};
        return {dow, label:'Easy Run', tag:'RUN',
          exercises: warmup().concat(EX.runEasy(easyMiles(weekNum, goalType, weeks))).concat(cool())};
      });
    }

    phases.push(buildPhase(0, 'BASE BUILDING', 'BASE', 'Wks 1-'+p1, p1*7,
      'Build aerobic foundation. Every run at conversational pace.', makeRunWeek(1)));
    if (p2 > 0) phases.push(buildPhase(1, 'BUILD', 'BUILD', 'Wks '+(p1+1)+'-'+(p1+p2), p2*7,
      'Increase mileage and introduce quality work. Trust the process.', makeRunWeek(Math.round(p1+p2/2))));
    if (p3 > 0) phases.push(buildPhase(2, 'TAPER', 'TAPER', 'Wks '+(weeks-p3+1)+'-'+weeks, p3*7,
      'Reduce volume, keep intensity. Arrive to the start line fresh.', makeRunWeek(weeks)));
  } else if (isRow) {
    var dows2 = getDows(Math.min(days,5));
    var p1r = Math.ceil(weeks*0.4), p2r = weeks - p1r;
    function makeRowWeek(phase) {
      return dows2.map(function(dow,i) {
        var isInterval = i===1&&phase===2;
        var isXT = hasXT && i===0;
        if (isXT) return {dow, label:'Strength Cross-Training', tag:'IRON',
          exercises: warmup().concat(EX.pushDB.slice(0,2)).concat(EX.pullDB.slice(0,2)).concat(cool())};
        if (isInterval) return {dow, label:'Row Intervals', tag:'ROW',
          exercises: warmup().concat(EX.rowIntervals()).concat(cool())};
        return {dow, label:'Steady Row', tag:'ROW',
          exercises: warmup().concat(EX.rowEasy(phase===1?20:30)).concat(cool())};
      });
    }
    phases.push(buildPhase(0,'BASE','BASE','Wks 1-'+p1r,p1r*7,'Build aerobic base on the rower.',makeRowWeek(1)));
    if (p2r>0) phases.push(buildPhase(1,'BUILD','BUILD','Wks '+(p1r+1)+'-'+weeks,p2r*7,'Introduce intervals and push the pace.',makeRowWeek(2)));
  } else {
    // General / cycling / swimming / walking — use generic endurance structure
    var dows3 = getDows(Math.min(days,5));
    var p1g = Math.ceil(weeks*0.4), p2g = weeks-p1g;
    var actLabel = activity==='cycling'?'Ride':activity==='swimming'?'Swim':activity==='walking'?'Walk/Hike':'Cardio Session';
    function makeGenSessions(phase) {
      return dows3.map(function(dow,i) {
        var isXT = hasXT&&i===0;
        if (isXT) return {dow,label:'Strength Cross-Training',tag:'IRON',
          exercises:warmup().concat(EX.pushDB.slice(0,2)).concat(EX.pullDB.slice(0,2)).concat(cool())};
        return {dow,label:actLabel+(phase===2?' — Push':''),tag:'ENDURANCE',
          exercises:warmup().concat(EX.rowEasy(phase===1?30:45)).concat(cool())};
      });
    }
    phases.push(buildPhase(0,'BASE','BASE','Wks 1-'+p1g,p1g*7,'Build your aerobic foundation.',makeGenSessions(1)));
    if (p2g>0) phases.push(buildPhase(1,'BUILD','BUILD','Wks '+(p1g+1)+'-'+weeks,p2g*7,'Increase duration and effort.',makeGenSessions(2)));
  }

  var goalLabel = getGoalTypeLabel(goalType) || 'General Fitness';
  var actLabel2 = getActivityLabel(activity);
  return {title: actLabel2+' — '+goalLabel+' — '+weeks+' Weeks', summary: weeks+'-week '+actLabel2.toLowerCase()+' program targeting '+goalLabel+'.', phases};
}

// ---- FUNCTIONAL FITNESS PLAN ----
function buildFunctionalPlan(days, weeks, level, equip, crossTraining) {
  var dows = getDows(days);
  var hasXT = crossTraining.length > 0;
  var p1 = Math.ceil(weeks/2), p2 = weeks-p1;

  function makeWOD(phase, i) {
    var isXT = hasXT && i === dows.length-1;
    if (isXT) return {dow:dows[i],label:'Skill + Mobility',tag:'SKILL',
      exercises:warmup().concat(EX.mobFull).concat(cool())};
    var amrapMins = phase===1?12:15;
    var wods = [
      EX.wodAmrap(amrapMins,['10 push-ups','15 air squats','10 ring rows','200m run']),
      EX.wodForTime(['5 rounds','10 DB thrusters','10 burpees','200m run']),
      EX.wodAmrap(amrapMins,['8 DB push press','12 DB goblet squats','10 sit-ups']),
      EX.wodForTime(['3 rounds','15 DB deadlifts','12 push-ups','9 box jumps or step-ups']),
      EX.wodAmrap(amrapMins,['10 DB snatches each arm','12 reverse lunges','10 push-ups']),
      EX.wodForTime(['4 rounds','10 DB thrusters','15 V-ups','10 pull-ups or rows']),
    ];
    return {dow:dows[i],label:'WOD '+(i+1),tag:'FUNCTIONAL',
      exercises:warmup().concat(wods[i % wods.length]).concat(cool())};
  }

  var phase1 = buildPhase(0,'SKILL BUILDING','BASE','Wks 1-'+p1,p1*7,'Learn the movements. Intensity comes later.',dows.map((_,i)=>makeWOD(1,i)));
  var phases = [phase1];
  if (p2>0) {
    var phase2 = buildPhase(1,'INTENSITY','BUILD','Wks '+(p1+1)+'-'+weeks,p2*7,'Push output. Track your scores every session.',dows.map((_,i)=>makeWOD(2,i)));
    phases.push(phase2);
  }
  return {title:'Functional Fitness — '+weeks+' Weeks',summary:weeks+'-week functional fitness program with WODs and progressive intensity.',phases};
}

// ---- HIIT PLAN ----
function buildHIITPlan(days, weeks, level, equip, crossTraining) {
  var dows = getDows(days);
  var hasXT = crossTraining.length > 0;
  var p1=Math.ceil(weeks/2),p2=weeks-p1;

  function makeHIIT(phase,i) {
    var isXT = hasXT && i===0;
    var isMob = i===dows.length-1;
    if (isXT) return {dow:dows[i],label:'Cross-Training',tag:'ACTIVE',exercises:warmup().concat(EX.cardioXt).concat(cool())};
    if (isMob) return {dow:dows[i],label:'Active Recovery',tag:'RECOVERY',exercises:warmup().concat(EX.mobRecovery).concat(cool())};
    var session = i%2===0 ? EX.hiitTabata : EX.hiitIntervals;
    return {dow:dows[i],label:'HIIT Session',tag:'HIIT',exercises:warmup().concat(session).concat(core()).concat(cool())};
  }

  var phases=[buildPhase(0,'BASE HIIT','BASE','Wks 1-'+p1,p1*7,'Build work capacity. Controlled intensity.',dows.map((_,i)=>makeHIIT(1,i)))];
  if (p2>0) phases.push(buildPhase(1,'PEAK HIIT','PEAK','Wks '+(p1+1)+'-'+weeks,p2*7,'Maximum effort. Leave nothing in the tank.',dows.map((_,i)=>makeHIIT(2,i))));
  return {title:'HIIT — '+weeks+' Weeks',summary:weeks+'-week high-intensity interval program.',phases};
}

// ---- MOBILITY PLAN ----
function buildMobilityPlan(days, weeks, level, crossTraining) {
  var dows = getDows(Math.min(days,7));
  var hasXT = crossTraining.length>0;
  var p1=Math.ceil(weeks/2),p2=weeks-p1;

  function makeMob(i) {
    var isXT = hasXT && i===dows.length-1;
    if (isXT) return {dow:dows[i],label:'Light Strength',tag:'ACTIVE',exercises:warmup().concat(EX.lowerBW.slice(0,2)).concat(EX.core.slice(0,2)).concat(cool())};
    var isFull = i%3===1;
    return {dow:dows[i],label:isFull?'Full Mobility':'Recovery Flow',tag:'MOBILITY',
      exercises:isFull?EX.mobFull:EX.mobRecovery};
  }

  var phases=[buildPhase(0,'FOUNDATION','BASE','Wks 1-'+p1,p1*7,'Establish baseline mobility and body awareness.',dows.map((_,i)=>makeMob(i)))];
  if (p2>0) phases.push(buildPhase(1,'DEEPEN','DEEPEN','Wks '+(p1+1)+'-'+weeks,p2*7,'Increase range and hold durations.',dows.map((_,i)=>makeMob(i))));
  return {title:'Mobility — '+weeks+' Weeks',summary:weeks+'-week mobility and recovery program.',phases};
}

// PLAN STORAGE SYSTEM
// ============================================================
const USERPLAN_KEY  = 'grind_userplan';
const LIBRARY_KEY   = 'grind_library';
const BACKUP_KEY    = 'grind_backup';

// --- UUID ---
function getUserId() {
  const u = getUser();
  if (u && u.uuid) return u.uuid;
  // Generate one and persist it
  const uuid = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
  saveUser({...(u||{}), uuid});
  return uuid;
}

// --- Plan storage ---
function getStoredPlan() {
  try { return JSON.parse(localStorage.getItem(USERPLAN_KEY) || 'null'); }
  catch(e) { return null; }
}
function saveStoredPlan(plan) {
  localStorage.setItem(USERPLAN_KEY, JSON.stringify(plan));
  syncPlanToSupabase(plan).catch(() => {});
}
function deletePlan() {
  localStorage.removeItem(USERPLAN_KEY);
}

// getActivePlan() — returns custom plan or falls back to built-in PHASES
function getActivePlan() {
  const stored = getStoredPlan();
  return stored ? stored.phases : null; // null = use PHASES
}
function hasCustomPlan() {
  return !!getStoredPlan();
}
function getPlanPhases() {
  return getActivePlan() || PHASES;
}
function getPlanPhaseLengths() {
  const plan = getActivePlan();
  if (!plan) return PHASE_LENGTHS;
  // Custom plans store durationDays per phase
  return plan.map(ph => ph.durationDays || 14);
}

// --- Workout Library ---
function getLibrary() {
  try { return JSON.parse(localStorage.getItem(LIBRARY_KEY) || '[]'); }
  catch(e) { return []; }
}
function saveToLibrary(workout) {
  const lib = getLibrary();
  const entry = {
    id: Date.now().toString(),
    name: workout.name || 'Saved Workout',
    exercises: workout.exercises,
    savedAt: new Date().toISOString(),
  };
  lib.unshift(entry);
  localStorage.setItem(LIBRARY_KEY, JSON.stringify(lib.slice(0, 50))); // max 50
  syncLibraryToSupabase(entry).catch(() => {});
  return entry.id;
}
function deleteFromLibrary(id) {
  const lib = getLibrary().filter(w => w.id !== id);
  localStorage.setItem(LIBRARY_KEY, JSON.stringify(lib));
}
function getLibraryItem(id) {
  return getLibrary().find(w => w.id === id) || null;
}

// --- Supabase sync (non-blocking) ---
async function syncPlanToSupabase(plan) {
  if (SUPABASE_URL === 'YOUR_SUPABASE_URL') return;
  const uid = getUserId();
  await supaFetch('user_plans?user_id=eq.' + uid, {
    method: 'DELETE', prefer: 'return=minimal',
  });
  await supaFetch('user_plans', {
    method: 'POST', prefer: 'return=minimal',
    body: JSON.stringify({
      user_id: uid,
      user_name: getUser()?.name || 'unknown',
      plan_data: JSON.stringify(plan),
    }),
  });
}
async function syncLibraryToSupabase(entry) {
  if (SUPABASE_URL === 'YOUR_SUPABASE_URL') return;
  await supaFetch('workout_library', {
    method: 'POST', prefer: 'return=minimal',
    body: JSON.stringify({
      user_id: getUserId(),
      workout_id: entry.id,
      workout_name: entry.name,
      workout_data: JSON.stringify(entry.exercises),
    }),
  });
}
async function loadPlanFromSupabase() {
  if (SUPABASE_URL === 'YOUR_SUPABASE_URL') return null;
  try {
    const uid = getUserId();
    const res = await supaFetch('user_plans?user_id=eq.' + uid + '&limit=1');
    if (!res.ok) return null;
    const rows = await res.json();
    if (!rows.length) return null;
    return JSON.parse(rows[0].plan_data);
  } catch(e) { return null; }
}

// --- Export / Import ---
function exportAllData() {
  const data = {
    version: 2,
    exportedAt: new Date().toISOString(),
    user: getUser(),
    plan: getStoredPlan(),
    logs: loadStore(),
    library: getLibrary(),
    checkins: getSitrepsRaw(),
    rations: getRationsRaw(),
    ptTests: getPTTests(),
    metrics: getMetrics(),
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'grind-backup-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
}
function getSitrepsRaw() {
  try { return JSON.parse(localStorage.getItem(CHECKIN_KEY) || '{}'); }
  catch(e) { return {}; }
}
function getRationsRaw() {
  try { return JSON.parse(localStorage.getItem(RATIONS_KEY) || '{}'); }
  catch(e) { return {}; }
}
function importData(jsonStr) {
  try {
    const data = JSON.parse(jsonStr);
    if (!data.version) throw new Error('Invalid backup file');
    if (data.user) saveUser(data.user);
    if (data.plan) localStorage.setItem(USERPLAN_KEY, JSON.stringify(data.plan));
    if (data.logs) localStorage.setItem(STORE_KEY, JSON.stringify(data.logs));
    if (data.library) localStorage.setItem(LIBRARY_KEY, JSON.stringify(data.library));
    if (data.checkins) localStorage.setItem(CHECKIN_KEY, JSON.stringify(data.checkins));
    if (data.rations) localStorage.setItem(RATIONS_KEY, JSON.stringify(data.rations));
    if (data.ptTests) localStorage.setItem(PT_KEY, JSON.stringify(data.ptTests));
    if (data.metrics) localStorage.setItem(METRICS_KEY, JSON.stringify(data.metrics));
    return true;
  } catch(e) {
    console.error('Import failed:', e);
    return false;
  }
}
