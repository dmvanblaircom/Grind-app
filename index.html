<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FORGE">
<meta name="theme-color" content="#0B0D0B">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<title>FORGE</title>
<link rel="manifest" href="./manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@900,700,500,400&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
/* ============================================================
   FORGE
   Design: Ladder-inspired · Satoshi + Bebas Neue · Forge Lime #A6CB2A
   ============================================================ */
@import url('https://api.fontshare.com/v2/css?f[]=satoshi@900,700,500,400&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');

:root{
  /* FORGE brand palette */
  --forge-bg:#0B0D0B;
  --forge-elevated:#141714;
  --forge-card:#1E2120;
  --forge-lime:#A6CB2A;
  --forge-glow:#A6CB2A;
  --forge-muted-lime:#80961F;
  --forge-text:#FFFFFF;
  --forge-text-secondary:#A6A9A6;
  --forge-text-tertiary:#A6A9A6;
  --forge-border:rgba(255,255,255,.06);
  --success:#A6CB2A;
  --warning:#A6CB2A;
  --error:#EF4444;
  /* BACKGROUNDS — elevation via bg steps */
  --bg:var(--forge-bg);
  --bg2:var(--forge-elevated);
  --bg3:var(--forge-card);
  --bg4:var(--forge-card);
  /* BORDERS */
  --border:var(--forge-border);
  --border2:rgba(255,255,255,.1);
  /* TYPOGRAPHY */
  --text:var(--forge-text);
  --text2:var(--forge-text-secondary);
  --text3:var(--forge-text-tertiary);
  --text4:var(--forge-text-tertiary);
  /* LIME — primary accent (10.1:1 contrast on bg) */
  --accent:var(--forge-lime);
  --accent-bg:rgba(166,203,42,.1);
  --accent-border:rgba(166,203,42,.34);
  /* aliases for backward compat */
  --amber:var(--forge-lime);
  --amber-bg:rgba(166,203,42,.1);
  --amber-border:rgba(166,203,42,.34);
  --gold:var(--forge-lime);
  --gold-dim:var(--forge-muted-lime);
  /* GREEN — logged/success (8.7:1 contrast) */
  --green:var(--success);
  --green-bg:rgba(166,203,42,.1);
  --green-border:rgba(166,203,42,.28);
  /* RED — alert (5.3:1 contrast) */
  --red:var(--error);
  --red-bg:rgba(239,68,68,.1);
  --red-border:rgba(239,68,68,.34);
  /* BLUE — info */
  --blue:var(--forge-text-secondary);
  --blue-bg:#141714;
  --blue-border:rgba(255,255,255,.1);
  /* PURPLE */
  --purple:var(--forge-muted-lime);
  --purple-bg:rgba(166,203,42,.1);
  --purple-border:rgba(166,203,42,.34);
  /* FONTS */
  --display:'Bebas Neue',cursive;  /* headers, titles, stats, badges */
  --body:'Satoshi',sans-serif;      /* UI, body, labels, inputs */
  --mono:'Satoshi',sans-serif;      /* data, monospace contexts */
  /* RADIUS */
  --radius:8px;
  --radius-sm:4px;
  --radius-lg:12px;
  /* SYSTEM */
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-t:env(safe-area-inset-top,0px);
}
/* ---- PREMIUM TYPOGRAPHY BALANCE ---- */

.hist-sub,
.fuel-target,


/* Force dark color-scheme on all form controls — prevents iOS white bg */
input,select,textarea{color-scheme:dark}

/* ---- RESET ---- */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;background:var(--bg);overscroll-behavior:none}
body{
  height:100%;overflow:hidden;
  background:var(--bg);
  color:var(--text);
  font-family:var(--body);
  -webkit-font-smoothing:antialiased;
}

/* ---- LAYOUT ---- */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:540px;margin:0 auto}
#safe-top{height:var(--safe-t);background:var(--bg);flex-shrink:0}
#main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;background:var(--bg)}

/* ---- NAV ---- */
#nav{
  flex-shrink:0;
  background:var(--bg);
  border-top:2px solid var(--accent);
  display:flex;
  padding-bottom:var(--safe-b);
  position:relative;
}
/* nav tick strip removed */
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:9px 2px 7px;border:none;background:none;
  color:var(--text3);
  font-family:var(--display);font-size:11px;letter-spacing:2px;
  cursor:pointer;gap:2px;transition:all 0.15s;
  position:relative;
}
.nav-btn svg{width:17px;height:17px;stroke-width:1.5}
.nav-btn.active{color:var(--accent)}
.nav-btn.active svg{stroke:var(--accent)}
.nav-btn.active::after{
  content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;
  background:var(--accent);
}

/* ---- SHARED COMPONENTS ---- */
.section-label{
  font-family:var(--display);font-size:16px;letter-spacing:4px;
  color:var(--text3);
  margin-bottom:12px;
  text-transform:uppercase;
}
.section-label::before{content:'▸';color:var(--accent);font-size:9px}

.card{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:0;
  position:relative;
}

/* ---- EXERCISE DESCRIPTION (collapsible) ---- */
.ex-row{cursor:default}
.ex-row.has-desc{cursor:pointer}
.ex-row.has-desc:active{background:rgba(255,255,255,.03)}
.ex-toggle{
  font-size:22px;line-height:1;
  color:var(--accent);
  flex-shrink:0;
  font-family:var(--display);font-weight:400;
  margin-left:auto;padding-left:12px;
  align-self:center;
  user-select:none;
}
.ex-toggle.open{color:var(--text2)}
.ex-desc{
  padding:12px 16px 14px 16px;
  background:rgba(166,203,42,.04);
  border-top:1px solid rgba(166,203,42,.14);
  animation:fadeIn 0.15s ease both;
}
.ex-desc-text{
  font-family:var(--body);font-weight:400;font-size:15px;
  color:var(--text2);line-height:1.65;margin-bottom:2px;
}
.ex-desc-cue{
  font-family:var(--display);font-size:16px;letter-spacing:1.5px;
  color:var(--accent);margin-top:10px;
  display:block;
}

/* ---- EXERCISE LIST ---- */
.ex-list{border-top:1px solid var(--border)}
.ex-row{
  display:flex;gap:10px;padding:11px 16px;
  border-bottom:1px solid var(--border);
  align-items:flex-start;
}
.ex-row:last-child{border-bottom:none}
.ex-tag{
  font-family:var(--display);font-size:13px;letter-spacing:1px;
  padding:3px 6px;min-width:52px;text-align:center;
  flex-shrink:0;margin-top:1px;
  border:1px solid currentColor;
  text-transform:uppercase;
}
.ex-name{
  font-family:var(--body);font-weight:700;font-size:17px;
  color:var(--text);margin-bottom:2px;
  text-transform:uppercase;letter-spacing:.5px;
}
.ex-detail{
  font-family:var(--body);font-weight:400;font-size:17px;
  color:var(--text2);line-height:1.45;
}
.ex-note{
  font-family:var(--body);font-size:9px;
  color:var(--accent);letter-spacing:.5px;margin-top:4px;
}

/* ---- BUTTONS ---- */
.action-btn{
  display:block;width:100%;padding:14px;
  background:var(--accent);
  border:2px solid var(--accent);
  color:var(--bg);
  font-family:var(--display);font-size:16px;letter-spacing:3px;
  cursor:pointer;transition:all 0.1s;margin-top:12px;
  text-transform:uppercase;font-weight:700;
}
.action-btn:active{background:#80961F;border-color:#80961F;}
.action-btn.secondary{background:none;border:1px solid var(--border2);color:var(--text2);font-weight:400;}
.action-btn.secondary:active{background:var(--bg2);}
.action-btn.amber{background:none;border:1px solid var(--accent-border);color:var(--accent);font-weight:400;}
.action-btn.amber:active{background:var(--accent-bg);}
.action-btn.red{background:none;border:1px solid var(--red-border);color:var(--red);font-weight:400;}
.action-btn.red:active{background:var(--red-bg);}
.action-btn.blue{background:none;border:1px solid var(--blue-border);color:var(--blue);font-weight:400;}

/* ---- PILLS ---- */
.pills{display:flex;gap:6px;flex-wrap:wrap}
.pill{
  font-family:var(--display);font-size:14px;letter-spacing:1.5px;
  padding:6px 11px;border:1px solid var(--border);
  background:none;color:var(--text3);cursor:pointer;transition:all 0.1s;
}
.pill.active{background:var(--accent);color:var(--bg);border-color:var(--accent);font-weight:700;}

/* ---- TODAY HEADER ---- */
.today-head{
  padding:calc(18px + var(--safe-t)) 16px 14px;
  border-bottom:2px solid var(--accent);
  background:var(--bg);
  position:relative;
  overflow:hidden;
}

.today-dayname{
  font-family:var(--display);font-size:22px;letter-spacing:1px;letter-spacing:4px;
  color:var(--accent);margin-bottom:4px;
}
.today-date{
  font-family:var(--display);
  font-size:62px;letter-spacing:3px;line-height:0.95;
  color:var(--text);
}
.phase-dot{width:6px;height:6px;flex-shrink:0;display:inline-block;margin-right:6px}
.today-rest{
  padding:36px 24px;text-align:center;
  font-family:var(--display);font-size:22px;letter-spacing:3px;
  color:var(--text);line-height:2;
}
.logged-pill{
  display:inline-block;font-family:var(--display);font-size:12px;letter-spacing:1.5px;
  background:var(--green);border:1px solid var(--green);
  color:var(--bg);padding:2px 8px;vertical-align:middle;font-weight:700;
}
.moved-pill{
  display:inline-block;font-family:var(--display);font-size:12px;letter-spacing:1.5px;
  background:var(--accent-bg);border:1px solid var(--accent-border);
  color:var(--accent);padding:2px 8px;vertical-align:middle;
}
.skipped-pill{
  display:inline-block;font-family:var(--display);font-size:12px;letter-spacing:1.5px;
  background:var(--red-bg);border:1px solid var(--red-border);
  color:var(--red);padding:2px 8px;vertical-align:middle;
}

/* ---- CHECK-IN STRIP ---- */
/* checkin-strip replaced by forge-checkin-card */


.checkin-summary{font-family:var(--body);font-size:13px;color:var(--text2);letter-spacing:1px;text-align:right;line-height:1.6}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

.checkin-row{margin-bottom:14px}
.checkin-row-label{
  font-family:var(--display);font-size:14px;letter-spacing:3px;
  color:var(--text2);margin-bottom:6px;
}
.num-pills{display:flex;gap:4px}
.num-pill{
  flex:1;padding:10px 0;
  background:var(--bg3);border:1px solid var(--border);
  color:var(--text2);font-family:var(--display);font-size:22px;
  cursor:pointer;text-align:center;transition:all 0.1s;
}
.num-pill.selected{
  background:var(--accent);border-color:var(--accent);
  color:var(--bg);font-weight:700;
}
.pain-pills{display:flex;gap:6px}
.pain-pill{
  flex:1;padding:10px 0;
  background:var(--bg3);border:1px solid var(--border);
  color:var(--text2);font-family:var(--display);font-size:22px;
  letter-spacing:1px;cursor:pointer;text-align:center;
}
.pain-pill.selected-ok{background:var(--green-bg);border-color:var(--green-border);color:var(--green)}
.pain-pill.selected-bad{background:var(--red-bg);border-color:var(--red-border);color:var(--red)}

/* ---- WEEK BRIEFING ---- */
.briefing-card{
  margin:14px 16px 0;
  border:1px solid var(--accent-border);
  background:var(--accent-bg);
  position:relative;
  overflow:hidden;
}
.briefing-card::before{display:none;}
.briefing-head{
  padding:10px 14px;background:rgba(166,203,42,.08);
  cursor:pointer;display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid var(--border);
  margin-top:3px;
}
.briefing-label{font-family:var(--display);font-size:22px;letter-spacing:1px;letter-spacing:3px;color:var(--accent)}
.briefing-label::before{display:none}
.briefing-body{padding:14px}
.briefing-title{
  font-family:var(--display);font-size:24px;letter-spacing:3px;
  color:var(--text);line-height:1;margin-bottom:6px;
}
.briefing-sub{font-family:var(--display);font-size:13px;letter-spacing:2px;color:var(--accent);margin-bottom:12px}
.briefing-bullet{
  font-family:var(--body);font-weight:500;font-size:18px;
  color:var(--text2);line-height:1.5;
  padding:7px 0 7px 18px;position:relative;
  border-bottom:1px solid rgba(166,203,42,.1);
}
.briefing-bullet:last-child{border-bottom:none}
.briefing-bullet::before{
  content:'★';position:absolute;left:0;
  color:var(--accent);font-size:8px;top:11px;
}

/* ---- CANT DO PANEL ---- */
.cant-do-panel{
  margin:0 16px;
  border:1px solid var(--red-border);
  border-left:4px solid var(--red);
  background:var(--bg2);
}
.cant-do-header{
  padding:14px 16px;background:var(--red-bg);
  border-bottom:1px solid var(--red-border);
}
.cant-do-title{font-family:var(--display);font-size:24px;letter-spacing:3px;color:var(--text)}
.accountability-box{
  padding:14px 16px;border-bottom:1px solid var(--border);
  background:var(--bg);
}
.accountability-text{
  font-family:var(--body);font-weight:500;font-size:18px;
  color:var(--text2);line-height:1.6;
}
.phase-context{
  font-family:var(--display);font-size:22px;letter-spacing:1px;letter-spacing:1px;
  color:var(--text2);margin-top:8px;padding-top:8px;
  border-top:1px solid var(--border);
}
.option-section{padding:14px 16px;border-bottom:1px solid var(--border)}
.option-label{
  font-family:var(--display);font-size:14px;letter-spacing:3px;
  color:var(--accent);margin-bottom:8px;
}
.conflict-box{padding:9px 12px;margin-bottom:8px;border-left:3px solid currentColor}
.conflict-box.ok{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.conflict-box.warn{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}
.conflict-box.bad{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.conflict-text{font-family:var(--body);font-weight:400;font-size:17px;line-height:1.5;color:inherit}
.move-alt-dates{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.move-alt-btn{
  font-family:var(--display);font-size:22px;letter-spacing:1px;letter-spacing:1px;
  padding:7px 12px;border:1px solid var(--border);
  background:none;color:var(--text2);cursor:pointer;
}
.move-alt-btn.selected{border-color:var(--accent-border);color:var(--accent);background:var(--accent-bg)}
.skip-accountability{
  font-family:var(--body);font-weight:500;font-size:17px;
  color:var(--red);line-height:1.6;margin-bottom:10px;
}
.never-mind-btn{
  display:block;width:100%;padding:16px;
  background:var(--green-bg);border:none;
  border-top:2px solid var(--green);
  color:var(--green);font-family:var(--display);
  font-size:22px;letter-spacing:3px;cursor:pointer;
}
.never-mind-btn:active{background:var(--green-bg)}

/* ---- PROTEIN BAR ---- */
.protein-card{
  margin:14px 16px 0;
  background:var(--bg2);
  border:1px solid var(--border);
  border-left:3px solid var(--accent);
  padding:14px;
  position:relative;
}
.protein-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
.protein-title{font-family:var(--display);font-size:22px;letter-spacing:1px;letter-spacing:3px;color:var(--accent)}
.protein-numbers{display:flex;align-items:baseline;gap:6px;margin-bottom:10px}
.protein-current{font-family:var(--display);font-size:40px;letter-spacing:2px;color:var(--text);line-height:1}
.protein-target{font-family:var(--display);font-size:22px;color:var(--text2);letter-spacing:1px}
.protein-unit{font-family:var(--display);font-size:22px;color:var(--text2);letter-spacing:1px;margin-left:4px}
.protein-bar{height:6px;background:var(--bg);margin-bottom:8px;position:relative}
.protein-bar::before{content:'';position:absolute;top:0;left:0;bottom:0;width:100%;
  background:repeating-linear-gradient(90deg,var(--border) 0,var(--border) 1px,transparent 1px,transparent 10px);
}
.protein-bar-fill{
  height:100%;position:relative;z-index:1;
  background:linear-gradient(90deg,var(--green) 0%,var(--accent) 100%);
  transition:width 0.4s;
}
.protein-meta{display:flex;justify-content:space-between;font-family:var(--display);font-size:22px;letter-spacing:1px;color:var(--text2);letter-spacing:1px}

/* ---- PLAN PHASE CARDS ---- */
.phase-card{
  margin:0 16px 10px;
  border:1px solid var(--border);
  background:var(--bg2);
  position:relative;
}
.phase-card::before{display:none;}
.phase-card-stripe{width:4px;flex-shrink:0;align-self:stretch}
.day-tabs{
  display:flex;
  gap:8px;

  padding:8px;

  overflow-x:auto;
  scrollbar-width:none;

  background:rgba(255,255,255,.02);

  border-bottom:1px solid rgba(255,255,255,.04);
}

.day-tabs::-webkit-scrollbar{
  display:none;
}

.day-tab{
  flex-shrink:0;

  padding:10px 16px;

  font-family:var(--display);
  font-size:20px;
  letter-spacing:2px;

  background:transparent;

  color:var(--text3);

  cursor:pointer;

  white-space:nowrap;

  position:relative;

  border:none;

  border-radius:14px;

  transition:
    background .16s ease,
    color .16s ease,
    box-shadow .16s ease,
    opacity .16s ease;
}

.day-tab:hover{
  background:rgba(255,255,255,.03);
}

.day-tab.active{
  color:#0B0D0B;

  background:
    linear-gradient(
      180deg,
      rgba(166,203,42,1),
      rgba(166,203,42,1)
    );

  border:1px solid rgba(255,255,255,.06);

  box-shadow:
    0 6px 18px rgba(166,203,42,.18);

  font-weight:700;
}

/* ---- LOG ---- */
.log-ex{
  background:var(--bg2);border:1px solid var(--border);
  margin-bottom:12px;border-left:3px solid var(--border2);
}
.log-ex-head{
  padding:11px 14px 9px;
  display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid var(--border);
  background:var(--bg3);
}
.log-ex-title{
  font-family:var(--body);font-weight:700;font-size:17px;
  color:var(--text);text-transform:uppercase;letter-spacing:.5px;
}
.log-ex-type{font-family:var(--display);font-size:14px;letter-spacing:2px;color:var(--text2)}
.set-row{
  display:flex;align-items:center;gap:7px;
  padding:7px 14px;border-bottom:1px solid var(--bg);
;overflow-x:hidden;max-width:100%}
.set-num{
  font-family:var(--display);font-size:22px;color:var(--accent);
  width:22px;flex-shrink:0;text-align:right;
}
.num-input{
  background:var(--bg);border:1px solid var(--border);
  color:var(--text);font-family:var(--display);font-size:22px;letter-spacing:1px;
  padding:6px 4px;width:58px;text-align:center;
  -webkit-appearance:none;-moz-appearance:textfield;
}
.num-input::-webkit-outer-spin-button,.num-input::-webkit-inner-spin-button{-webkit-appearance:none}
.num-input:focus{outline:none;border-color:var(--accent-border);background:#141714}
.check-btn{
  margin-left:auto;width:32px;height:32px;
  border:1px solid var(--border);background:none;
  color:var(--text2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all 0.12s;font-size:18px;
}
.check-btn.done{background:var(--green);border-color:var(--green);color:var(--bg);font-weight:700;}
.del-btn{
  width:22px;height:22px;border:none;background:none;
  color:var(--text3);cursor:pointer;font-size:18px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.add-set-btn{
  font-family:var(--display);font-size:22px;letter-spacing:1px;letter-spacing:2px;
  color:var(--text2);background:none;border:none;
  padding:9px 14px;cursor:pointer;width:100%;text-align:left;
  border-top:1px solid var(--border);
}
.done-only{display:flex;align-items:center;gap:10px;padding:10px 14px}
.big-check{
  width:34px;height:34px;border:1px solid var(--border);
  background:none;color:var(--text2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;transition:all 0.12s;
}
.big-check.done{background:var(--green);border-color:var(--green);color:var(--bg);font-weight:700;}
.save-btn{
  width:100%;padding:16px;background:var(--green);
  border:2px solid var(--green);
  color:var(--bg);font-family:var(--display);
  font-size:16px;letter-spacing:4px;
  cursor:pointer;transition:all 0.1s;margin-top:16px;
  text-transform:uppercase;font-weight:700;
}
.save-btn:active,.save-btn.saved{background:#A6CB2A;border-color:#A6CB2A;}
textarea.notes{
  width:100%;background:var(--bg2);
  border:1px solid var(--border);border-left:3px solid var(--border2);
  color:var(--text2);font-family:var(--body);
  font-size:18px;font-weight:400;
  padding:11px 12px;resize:none;height:78px;margin-top:14px;
}
textarea.notes:focus{outline:none;border-left-color:var(--accent)}
textarea.notes::placeholder{color:var(--text3)}
.log-select{
  background:var(--bg3);border:1px solid var(--border);
  color:var(--text2);font-family:var(--display);font-size:22px;letter-spacing:1px;
  padding:7px 10px;-webkit-appearance:none;cursor:pointer;
  letter-spacing:.5px;
}

/* ---- GENERATOR ---- */
.gen-option{
  display:block;width:100%;
  padding:16px 18px;
  background:var(--bg2);
  border:1px solid var(--border);
  border-left:3px solid var(--border2);
  color:var(--text2);font-family:var(--display);
  font-size:23px;letter-spacing:2px;
  cursor:pointer;margin-bottom:8px;text-align:left;
  transition:all 0.12s;
}
.gen-option:active,.gen-option.selected{
  background:var(--bg3);border-color:var(--green-border);
  border-left-color:var(--green);color:var(--text);
}
.gen-option-sub{
  font-family:var(--body);font-weight:400;font-size:18px;
  color:var(--text2);margin-top:5px;letter-spacing:0;display:block;
}
.gen-back{
  font-family:var(--display);font-size:22px;letter-spacing:1px;letter-spacing:3px;
  color:var(--text2);background:none;border:none;
  cursor:pointer;padding:0 0 16px;display:block;
}
.spinner{
  width:36px;height:36px;
  border:2px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto;
}
@keyframes spin{to{transform:rotate(360deg)}}
.equip-check{
  display:flex;align-items:center;gap:12px;
  padding:12px 14px;
  background:var(--bg2);border:1px solid var(--border);
  cursor:pointer;margin-bottom:6px;transition:all 0.1s;
}
.equip-check.selected{border-color:var(--green-border);border-left:3px solid var(--green);background:var(--bg3)}
.equip-check-box{
  width:20px;height:20px;
  border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:17px;color:var(--green);flex-shrink:0;
}
.equip-check.selected .equip-check-box{background:var(--green-bg);border-color:var(--green-border)}

/* ---- FUEL / NUTRITION ---- */
.fuel-main{padding:20px 16px 30px;background:var(--bg)}
.fuel-hero{
  text-align:center;padding:14px 0 16px;
  background:var(--bg);
  border-bottom:1px solid var(--border);
  margin-bottom:18px;
  position:relative;
}
.fuel-hero::before{
  content:'NUTRITION';
  position:absolute;top:0;left:0;right:0;
  font-family:var(--display);font-size:13px;letter-spacing:4px;
  color:var(--accent);opacity:0.4;
}
.fuel-big-number{
  font-family:var(--display);
  font-size:96px;letter-spacing:4px;line-height:0.9;
  color:var(--text);
}
.fuel-target{font-family:var(--display);font-size:22px;color:var(--text2);letter-spacing:2px;margin-top:4px}
.fuel-bar{height:8px;background:var(--bg);margin:14px 0 8px;position:relative}
.fuel-bar-fill{
  height:100%;
  background:repeating-linear-gradient(90deg,var(--green) 0,var(--green) 6px,var(--accent) 6px,var(--accent) 7px,var(--green) 7px,var(--green) 14px);
  transition:width 0.4s;
}
.fuel-status{
  font-family:var(--display);font-size:22px;letter-spacing:3px;
  color:var(--text2);text-align:center;
}
.fuel-section-label{
  font-family:var(--display);font-size:22px;letter-spacing:1px;letter-spacing:4px;
  color:var(--accent);margin:18px 0 10px;
  display:flex;align-items:center;gap:8px;
}
.fuel-section-label::before{content:'▸';color:var(--green)}
.food-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px}
.food-tile{
  background:var(--bg2);border:1px solid var(--border);
  padding:12px 11px;cursor:pointer;text-align:left;
  transition:all 0.1s;position:relative;
}
.food-tile:active{background:var(--bg3);border-color:var(--green-border)}
.food-name{
  font-family:var(--body);font-weight:700;font-size:18px;
  color:var(--text);margin-bottom:1px;
  line-height:1.2;text-transform:uppercase;
}
.food-portion{
  font-family:var(--body);font-weight:400;font-size:17px;
  color:var(--text2);line-height:1.2;
}
.food-grams{
  font-family:var(--display);font-size:22px;letter-spacing:1px;
  color:var(--green);letter-spacing:.5px;margin-top:5px;
}
.fuel-entry{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);
  padding:9px 12px;
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:12px;
}
.fuel-entry-main{flex:1;min-width:0}
.fuel-entry-name{
  font-family:var(--body);font-weight:700;font-size:17px;
  color:var(--text);text-transform:uppercase;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.fuel-entry-time{font-family:var(--display);font-size:13px;color:var(--text2);letter-spacing:.5px;margin-top:1px}
.fuel-entry-grams{font-family:var(--display);font-size:22px;letter-spacing:1px;color:var(--green);letter-spacing:.5px;margin-left:8px;flex-shrink:0}
.fuel-remove{color:var(--text3);background:none;border:none;font-size:18px;cursor:pointer;margin-left:4px;padding:0 4px}
.custom-input-row{display:flex;gap:6px;margin-bottom:10px}
.custom-input{
  flex:1;background:var(--bg3);
  border:1px solid var(--border);border-bottom:2px solid var(--border2);
  color:var(--text);font-family:var(--body);font-size:18px;
  padding:9px 10px;
}
.custom-input:focus{outline:none;border-bottom-color:var(--accent)}
.custom-input.small{flex:0 0 80px;font-family:var(--body);text-align:center;font-weight:600}
.timing-card{
  background:var(--bg2);border:1px solid var(--border);
  border-left:3px solid var(--accent);
  padding:12px;margin-bottom:12px;
}
.timing-title{font-family:var(--display);font-size:22px;letter-spacing:1px;letter-spacing:2px;color:var(--accent);margin-bottom:6px}
.timing-text{font-family:var(--body);font-weight:400;font-size:17px;color:var(--text2);line-height:1.5}

/* ---- STATS ---- */
.intel-tabs{
  display:flex;gap:4px;
  border-bottom:2px solid var(--accent-border);
  margin-bottom:16px;
  overflow-x:auto;scrollbar-width:none;
}
.intel-tabs::-webkit-scrollbar{display:none}
.intel-tab{
  flex-shrink:0;padding:10px 14px;
  font-family:var(--display);font-size:22px;letter-spacing:2px;
  border:1px solid var(--border);border-bottom:none;
  background:var(--bg2);color:var(--text2);cursor:pointer;
  transition:all 0.1s;
}
.intel-tab.active{
  color:var(--bg);background:var(--accent);
  border-color:var(--accent);
  border-bottom:2px solid var(--accent);
  font-weight:700;
  margin-bottom:-2px;
}
.pt-input-row{
  display:flex;align-items:center;gap:10px;
  padding:10px 0;border-bottom:1px solid var(--border);
}
.pt-input-label{
  flex:1;font-family:var(--body);font-weight:600;font-size:18px;
  color:var(--text2);text-transform:uppercase;
}
.pt-input-unit{
  font-family:var(--display);font-size:22px;letter-spacing:1px;color:var(--accent);
  letter-spacing:2px;min-width:40px;text-align:left;
}
.pt-record{
  background:var(--bg2);border:1px solid var(--border);
  border-left:4px solid var(--accent);
  padding:10px 14px;margin-bottom:8px;
}
.pt-record-date{
  font-family:var(--display);font-size:22px;
  color:var(--accent);letter-spacing:1px;margin-bottom:6px;
}
.pt-record-data{
  display:grid;grid-template-columns:1fr 1fr;
  gap:4px;font-family:var(--display);font-size:22px;
  color:var(--text2);letter-spacing:.5px;
}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.stat-tile{
  background:var(--bg2);border:1px solid var(--border);
  padding:14px 12px;text-align:center;
  position:relative;
}
.stat-tile::before{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:var(--accent);opacity:.3;
}
.stat-label{
  font-family:var(--display);font-size:14px;letter-spacing:3px;
  color:var(--accent);margin-bottom:6px;
}
.stat-value{
  font-family:var(--display);font-size:34px;
  letter-spacing:2px;color:var(--text);line-height:1;
}
.stat-unit{font-family:var(--display);font-size:22px;color:var(--text2);letter-spacing:1px;margin-top:3px}

/* ---- HISTORY ---- */
.hist-entry{
  background:var(--bg2);border:1px solid var(--border);
  margin-bottom:12px;overflow:hidden;
}
.hist-head{
  padding:12px 16px;
  display:flex;justify-content:space-between;align-items:center;
  cursor:pointer;border-left:3px solid var(--border2);
}
.hist-date{font-family:var(--display);font-size:22px;letter-spacing:1px;color:var(--text);letter-spacing:1px}
.hist-sub{font-family:var(--display);font-size:22px;letter-spacing:1px;color:var(--text2);letter-spacing:.5px;margin-top:2px}
.hist-chevron{font-size:17px;color:var(--text3);transition:transform 0.15s}
.hist-chevron.open{transform:rotate(180deg)}
.hist-body{display:none;padding:10px 16px 14px;border-top:1px solid var(--border)}
.hist-body.open{display:block}
.hist-ex-name{
  font-family:var(--body);font-weight:700;font-size:17px;
  color:var(--text2);text-transform:uppercase;margin:8px 0 3px;
}
.hist-set{font-family:var(--display);font-size:22px;color:var(--text2);margin-bottom:2px}
.hist-set.done-set{color:var(--green)}
.hist-notes-text{
  font-family:var(--body);font-weight:400;font-size:17px;
  color:var(--text2);font-style:italic;
  margin-top:8px;padding-top:8px;border-top:1px solid var(--border);
}
.date-input{
  background:var(--bg3);border:1px solid var(--border);
  color:var(--text2);font-family:var(--display);font-size:22px;
  padding:6px 8px;
}
.date-input:focus{outline:none;border-color:var(--accent-border)}

/* ---- PLAN MOVE PANEL ---- */
.plan-move-panel-inner{
  margin:10px 0 0;
  border:1px solid var(--accent-border);
  border-left:4px solid var(--accent);
  background:var(--bg);
}

/* ---- ANIMATIONS ---- */
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn 0.2s ease both}
.tab-safe{padding-top:var(--safe-t)}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.slide-down{animation:slideDown 0.2s ease both}

/* ============================================================
   ACCESSIBILITY
   ============================================================ */

/* Focus rings — visible keyboard focus, hidden on mouse/touch */
:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}
:focus:not(:focus-visible) {
  outline: none;
}

/* Touch targets — all interactive elements min 44×44px */
button, [role="button"], a, input, select, textarea {
  min-height: 44px;
  min-width: 44px;
}
/* Override for inline/small buttons where min-height would break layout */
.pill, .num-pill, .pain-pill, .intel-tab, .nav-btn, .check-btn {
  min-height: 44px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
.nav-btn {
  min-height: 56px; /* nav taller on mobile */
}

/* Skip navigation link */
.skip-nav {
  position: absolute;
  top: -100%;
  left: 8px;
  background: var(--accent);
  color: #0B0D0B;
  padding: 8px 16px;
  font-family: var(--display);
  font-size: 14px;
  letter-spacing: 2px;
  z-index: 9999;
  border-radius: 0 0 4px 4px;
  text-decoration: none;
  font-weight: 700;
}
.skip-nav:focus {
  top: 0;
}

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
  .fade-in { animation: none; }
  .spinner { animation: none; border: 3px solid var(--accent); }
}

/* High contrast mode support */
@media (forced-colors: active) {
  :root {
    --amber: ButtonText;
    --green: ButtonText;
    --red: ButtonText;
    --bg: Canvas;
    --text: CanvasText;
  }
  button { border: 1px solid ButtonText; }
}

/* Input styling for accessibility */
input, textarea, select {
  font-size: 16px; /* prevent iOS zoom on focus */
}
input::placeholder, textarea::placeholder {
  color: var(--text3);
  opacity: 1; /* Firefox */
}

/* Error states */
[aria-invalid="true"] {
  border-color: var(--red) !important;
  outline: 2px solid var(--red);
}

/* Announce dynamic content */
[aria-live] {
  position: relative;
}

/* ============================================================
   BEBAS NEUE — accent/display usage
   workout titles, section headers, stat callouts,
   timers, hero numbers, badges
   ============================================================ */

/* Today tab header */
.today-date {
  font-family: var(--display);
  font-size: 52px;
  font-weight: 400; /* Bebas only has one weight */
  letter-spacing: 2px;
}
.today-dayname {
  font-family: var(--display);
  font-size: 13px;
  letter-spacing: 4px;
  color: var(--text3);
}

/* Section headers throughout app */
.section-label {
  font-family: var(--display);
  font-size: 18px;
  letter-spacing: 2px;
}

/* Fuel hero stat callout */
.fuel-big-number {
  font-family: var(--display);
  font-size: 96px;
  font-weight: 400;
  letter-spacing: 4px;
}
.fuel-target {
  font-family: var(--display);
  font-size: 20px;
  letter-spacing: 3px;
  color: var(--text3);
}
.fuel-status {
  font-family: var(--display);
  font-size: 18px;
  letter-spacing: 2px;
  color: var(--text2);
}

/* Plan phase headers */
.phase-title {
  font-family: var(--display);
  font-size: 28px;
  letter-spacing: 3px;
  line-height: 1;
}
.phase-week {
  font-family: var(--display);
  font-size: 14px;
  letter-spacing: 2px;
}

/* Session/workout titles in plan */
.session-title {
  font-family: var(--display);
  font-size: 26px;
  letter-spacing: 2px;
  line-height: 1;
}

/* Log exercise header */
.log-ex-title {
  font-family: var(--display);
  font-size: 22px;
  letter-spacing: 2px;
  line-height: 1;
}

/* Stats/PT numbers */
.stat-number {
  font-family: var(--display);
  font-size: 48px;
  letter-spacing: 2px;
  line-height: 1;
}
.pt-score {
  font-family: var(--display);
  font-size: 52px;
  letter-spacing: 2px;
  line-height: 1;
}

/* Badges / tags / pills that are labels */
.tag-pill {
  font-family: var(--display);
  font-size: 12px;
  letter-spacing: 2px;
  border-radius: var(--radius-sm);
  padding: 2px 8px;
}

/* Timer and countdown displays */
.countdown-number {
  font-family: var(--display);
  letter-spacing: 2px;
}

/* Nav labels — CAPS + Bebas = perfect fit */
.nav-btn {
  font-family: var(--display);
  font-size: 11px;
  letter-spacing: 2px;
}

/* Check-in title */
.checkin-title {
  font-family: var(--display);
  font-size: 14px;
  letter-spacing: 3px;
}

/* Briefing card title */
.briefing-title {
  font-family: var(--display);
  font-size: 24px;
  letter-spacing: 2px;
  line-height: 1;
}

/* Squad section */
.squad-wod-title {
  font-family: var(--display);
  font-size: 18px;
  letter-spacing: 1.5px;
}

/* Modal title */
#modal-title {
  font-family: var(--display);
  font-size: 22px;
  letter-spacing: 1.5px;
}

/* ============================================================
   FORGE REFINEMENT LAYER
   ============================================================ */

:root{
  --radius:20px;
  --radius-lg:28px;

  --bg2:var(--forge-elevated);
  --bg3:var(--forge-card);

  --border:var(--forge-border);
  --border2:rgba(255,255,255,.1);

  --accent:#A6CB2A;
  --accent-border:#80961F;

  --shadow-soft:
    0 8px 30px rgba(0,0,0,.28);

  --shadow-glow:
    0 0 30px rgba(166,203,42,.12);
}

/* PREMIUM SURFACES */

.card,
.phase-card,
.log-ex,
.food-tile,
.stat-tile,
.hist-entry,
.timing-card,
.protein-card,
.briefing-card{
  border-radius:var(--radius);

  box-shadow:
    0 8px 30px rgba(0,0,0,.28);

  border:1px solid rgba(255,255,255,.05);

  background:
    linear-gradient(
      180deg,
      rgba(255,255,255,.03),
      rgba(255,255,255,.015)
    );

  backdrop-filter:blur(6px);
}

/* HERO FEEL */

.today-head{
  background:
    linear-gradient(
      180deg,
      rgba(166,203,42,.06),
      transparent 60%
    ),
    var(--bg);

  border-bottom:
    1px solid rgba(166,203,42,.22);
}

/* BIG NUMBER REFINEMENT */

.today-date,
.fuel-big-number,
.stat-value{
  letter-spacing:.02em;
  text-shadow:
    0 0 24px rgba(255,255,255,.04);
}

/* CLEANER BUTTONS */

.action-btn{
  border-radius:18px;
  border:none;
  box-shadow:var(--shadow-glow);
  transition:
    transform .14s ease,
    opacity .14s ease,
    background .14s ease;
}

.action-btn:active{
  transform:scale(.98);
}

/* PREMIUM SECONDARY BUTTONS */

.action-btn.secondary,
.action-btn.amber,
.action-btn.red,
.action-btn.blue{
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.08);
}

/* BETTER CARDS */

.phase-card,
.log-ex,
.hist-entry{
  overflow:hidden;
}

/* NAV UPGRADE */

#nav{
  margin:10px;
  margin-bottom:calc(10px + var(--safe-b));

  border:none;

  background:rgba(20,23,20,.78);

  backdrop-filter:blur(12px);

  border-radius:26px;

  box-shadow:
    0 10px 40px rgba(0,0,0,.35);

  overflow:hidden;
}

/* NAV ACTIVE */

.nav-btn.active{
  background:
    linear-gradient(
      180deg,
      rgba(166,203,42,.12),
      transparent
    );
}

/* INPUTS */

.num-input,
.custom-input,
textarea.notes,
.log-select,
.date-input{
  border-radius:14px;
}

/* FEED / PANEL DEPTH */

.briefing-card,
.protein-card,
.timing-card{
  background:
    linear-gradient(
      180deg,
      rgba(255,255,255,.03),
      rgba(255,255,255,.015)
    );
}

/* SECTION SPACING */

.section-label{
  margin-bottom:16px;
}

/* LESS HARSH EDGES */

.day-tab,
.pill,
.intel-tab,
.move-alt-btn{
  border-radius:12px;
}

/* SUBTLE PREMIUM MOTION */

.card,
.phase-card,
.food-tile,
.hist-entry,
.stat-tile{
  transition:
    transform .18s ease,
    border-color .18s ease,
    background .18s ease;
}

.card:active,
.food-tile:active,
.log-ex:active,
.hist-entry:active{
  transform:scale(.985);
  opacity:.96;
}

/* ============================================================
   FORGE HOME / FEED ENHANCEMENTS
   ============================================================ */

/* PREMIUM SECTION CONTAINERS */

.briefing-card,
.protein-card,
.phase-card,
.log-ex,
.hist-entry,
.timing-card{
  position:relative;
}

/* SUBTLE TOP ACCENT */

.briefing-card::before,
.protein-card::before,
.phase-card::before,
.log-ex::before{
  content:'';

  position:absolute;

  top:0;
  left:0;
  right:0;

  height:2px;

  background:
    linear-gradient(
      90deg,
      transparent,
      rgba(166,203,42,.8),
      transparent
    );

  opacity:.7;
}

/* HOME SCREEN HERO */

.today-head{
  padding-top:
    calc(28px + var(--safe-t));

  padding-bottom:24px;
}

/* DATE HIERARCHY */

.today-dayname{
  opacity:.8;

  margin-bottom:8px;
}

.today-date{
  font-size:72px;

  line-height:.9;

  margin-bottom:14px;
}

/* PREMIUM SECTION LABELS */

.section-label{
  font-size:14px;

  letter-spacing:3px;

  color:var(--accent);

  opacity:.9;
}

/* BETTER WORKOUT ROWS */

.ex-row{
  padding:14px 16px;

  transition:
    background .16s ease,
    transform .16s ease;
}

.ex-row:active{
  transform:scale(.99);

  background:
    rgba(255,255,255,.025);
}

/* CLEANER EXERCISE TYPE TAGS */

.ex-tag{
  border-radius:999px;

  padding:4px 10px;

  font-size:11px;

  background:

// ============================================================
function getLatestWeight() {
  const sorted = getAllMetricsSorted();
  for (const [date, data] of sorted) {
    if (data.weight) return { weight: parseFloat(data.weight), date };
  }
  // Fall back to profile currentWeight
  const u = getUser();
  if (u && u.currentWeight) return { weight: parseFloat(u.currentWeight), date: null };
  return null;
}

function getWeightProgress() {
  const u = getUser();
  if (!u || !u.goalWeight) return null;
  const goal = parseFloat(u.goalWeight);
  const latest = getLatestWeight();
  if (!latest) return null;
  const current = latest.weight;
  // Starting weight = profile currentWeight, or earliest metric
  let start = u.currentWeight ? parseFloat(u.currentWeight) : current;
  const sorted = getAllMetricsSorted().filter(([d,data])=>data.weight);
  if (sorted.length) start = parseFloat(sorted[sorted.length-1][1].weight);
  const totalChange = goal - start;
  const doneChange = current - start;
  const pct = totalChange !== 0 ? Math.max(0, Math.min(100, Math.round((doneChange/totalChange)*100))) : 0;
  const remaining = (goal - current).toFixed(1);
  return { current, goal, start, pct, remaining, isLoss: goal < start };
}

function setCalorieTotal(date, kcal) {
  const all = getAllFuel();
  if (!all[date]) all[date] = { entries: [] };
  all[date].calories = Number(kcal) || 0;
  localStorage.setItem(FUEL_KEY, JSON.stringify(all));
}

function loadStore(){try{return JSON.parse(localStorage.getItem(STORE_KEY)||'{}')}catch(e){return{}}}

function deleteLogEntry(date, entryId) {
  showConfirm('Delete this log?', function() {
    const s = loadStore();
    if (!s[date]) return;
    if (!Array.isArray(s[date])) s[date] = [s[date]];
    if (entryId) {
      s[date] = s[date].filter(e => e.id !== entryId);
      if (!s[date].length) delete s[date];
    } else {
      delete s[date]; // delete all entries for this date (legacy fallback)
    }
    localStorage.setItem(STORE_KEY, JSON.stringify(s));
    S.lastSavedDate = null;
    renderMain();
  }, 'DELETE', 'red');
}
function saveLogEntry(date, phaseId, dayIdx, sets, notes, title) {
  const s = loadStore();
  const entry = {
    id: date + '_' + Date.now(),
    phaseId, dayIdx, sets,
    notes: notes || '',
    title: title || null,
    savedAt: new Date().toISOString(),
  };
  if (!s[date]) s[date] = [];
  // If it's an array already, append. If legacy single object, wrap first.
  if (!Array.isArray(s[date])) s[date] = [s[date]];
  s[date].push(entry);
  localStorage.setItem(STORE_KEY, JSON.stringify(s));
  return entry;
}

// Get the LAST entry for a date (for plan log pre-fill, date changes, etc.)
function getLogEntry(date) {
  const entries = getLogEntries(date);
  return entries.length ? entries[entries.length - 1] : null;
}

// Get ALL entries for a date
function getLogEntries(date) {
  const day = loadStore()[date];
  if (!day) return [];
  if (Array.isArray(day)) return day;
  return [day]; // legacy single entry — wrap transparently
}

// Get all entries across all dates, flat, sorted newest first
function getAllLogs() {
  const store = loadStore();
  const entries = [];
  Object.entries(store).sort((a,b) => b[0].localeCompare(a[0])).forEach(([date, day]) => {
    const dayEntries = Array.isArray(day) ? day : [day];
    dayEntries.slice().reverse().forEach(e => entries.push([date, e]));
  });
  return entries;
}

function parseDate(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d)}
function dateStr(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function todayStr(){return dateStr(new Date())}
function fmtDate(ds){const d=parseDate(ds);const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return{dow:days[d.getDay()],full:`${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`,short:`${days[d.getDay()]} ${months[d.getMonth()]} ${d.getDate()}`}}
function addDays(ds,n){const d=parseDate(ds);d.setDate(d.getDate()+n);return dateStr(d)}
function getPhaseStart(pi){const s=parseDate(getStartDate());const lens=getPlanPhaseLengths();for(let i=0;i<pi;i++)s.setDate(s.getDate()+(lens[i]||14));return s}
function getPhaseEnd(pi){const s=getPhaseStart(pi);const lens=getPlanPhaseLengths();s.setDate(s.getDate()+(lens[pi]||14)-1);return s}
function getPhaseDates(pi){const s=getPhaseStart(pi),e=getPhaseEnd(pi);const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return`${months[s.getMonth()]} ${s.getDate()} – ${months[e.getMonth()]} ${e.getDate()}`}
function getPhaseForDate(ds){const d=parseDate(ds);for(let i=0;i<PHASES.length;i++){if(d>=getPhaseStart(i)&&d<=getPhaseEnd(i))return i;}return -1}
function getDayIdxForDate(ds,pi){if(pi<0)return -1;const dow=parseDate(ds).getDay();const m=(getPlanPhases()[pi]||PHASES[pi]||{}).dowMap;return m&&m[dow]!==undefined?m[dow]:-1}
function getWeekNum(ds){const start=parseDate(getStartDate());const d=parseDate(ds);return Math.max(1,Math.floor((d-start)/(7*86400000))+1)}
function isMonday(ds){return parseDate(ds).getDay()===1}
function isProgramWeekStart(ds){const sd=getStartDate();const startDow=parseDate(sd).getDay();return ds===sd||parseDate(ds).getDay()===startDow;}

// ============================================================
function sessionIntensity(pi,di){
 if(pi<0||di<0)return'rest';
 const tag=(getPlanPhases()[pi]||PHASES[pi]||{schedule:[]}).schedule[di]?.tag||'';
 if(!tag)return'rest';
 if(/MOBILITY|RECOVERY/.test(tag))return'easy';
 if(/^CARDIO ONLY/.test(tag)||/^CARDIO$/.test(tag))return'medium';
 if(/^BODYWEIGHT$/.test(tag))return'medium';
 return'hard';
}
function analyzeConflict(targetDate,movingPi,movingDi){
 const movingInt=sessionIntensity(movingPi,movingDi);
 const prevDate=addDays(targetDate,-1),nextDate=addDays(targetDate,1);
 const prevPi=getPhaseForDate(prevDate),prevDi=getDayIdxForDate(prevDate,prevPi);
 const nextPi=getPhaseForDate(nextDate),nextDi=getDayIdxForDate(nextDate,nextPi);
 const moves=getMoves();const prevMoved=moves[prevDate],nextMoved=moves[nextDate];
 const prevInt=prevMoved?sessionIntensity(prevMoved.phaseId,prevMoved.dayIdx):(prevDi>=0?sessionIntensity(prevPi,prevDi):'rest');
 const nextInt=nextMoved?sessionIntensity(nextMoved.phaseId,nextMoved.dayIdx):(nextDi>=0?sessionIntensity(nextPi,nextDi):'rest');
 const _pp=getPlanPhases();const prevDay=prevDi>=0?(_pp[prevPi]||PHASES[prevPi]||{schedule:[]}).schedule[prevDi]:null,nextDay=nextDi>=0?(_pp[nextPi]||PHASES[nextPi]||{schedule:[]}).schedule[nextDi]:null;
 if(movingInt==='hard'&&prevInt==='hard')return{level:'bad',text:`The day before (${fmtDate(prevDate).dow}) already has a hard session: ${prevDay?prevDay.label:'a workout'}. Back-to-back heavy days will wreck your performance and spike injury risk.`};
 if(movingInt==='hard'&&nextInt==='hard')return{level:'bad',text:`The day after (${fmtDate(nextDate).dow}) has a hard session: ${nextDay?nextDay.label:'a workout'}. Running two heavy sessions back to back degrades the second — less weight, worse form, slower recovery.`};
 if(movingInt==='hard'&&(prevInt==='medium'||nextInt==='medium'))return{level:'warn',text:`Adjacent to a moderate session. Manageable, but make sure you're eating and sleeping well.`};
 return{level:'ok',text:`No conflict. Clean fit — performance won't be compromised.`};
}
function findMoveDates(fromDate,phaseId,dayIdx){
 const results=[];
 for(let i=1;i<=7;i++){
  const ds=addDays(fromDate,i);
  const pi=getPhaseForDate(ds),di=getDayIdxForDate(ds,pi);
  const moves=getMoves(),skips=getSkips();
  if(di>=0||moves[ds])continue;
  if(skips[ds]&&skips[ds].type==='moved')continue;
  results.push({date:ds,conflict:analyzeConflict(ds,phaseId,dayIdx)});
  if(results.length>=3)break;
 }
 return results;
}
function getSessionType(pi,di){
 const day=(getPlanPhases()[pi]||PHASES[0]).schedule[di]||{};const l=day.label.toLowerCase(),t=day.tag;
 if(/lower|leg/i.test(l))return'leg';
 if(/push/i.test(l))return'push';
 if(/pull/i.test(l))return'pull';
 if(/conditioning|hero/i.test(l))return'conditioning';
 if(/recovery|mobility/i.test(t))return'recovery';
 if(/benchmark|test/i.test(t))return'benchmark';
 if(/circuit/i.test(l)||/circuit/i.test(t))return'circuit';
 return'general';
}

function archiveProgram(programId) {
  const all = getPrograms();
  if (all[programId]) {
    all[programId].status = 'archived';
    all[programId].archivedAt = new Date().toISOString();
    savePrograms(all);
    // Unlink from active goals so they fall back to Foundation
    const goals = getGoals();
    let changed = false;
    goals.forEach(g => {
      if (g.programId === programId && g.status === 'active') {
        g.programId = null;
        changed = true;
      }
    });
    if (changed) saveGoals(goals);
  }
}

function buildPregnancyWorkout(focus,duration){
  const counts={20:{warmup:2,main:4,cool:1},30:{warmup:3,main:5,cool:2},45:{warmup:3,main:7,cool:2},60:{warmup:4,main:9,cool:3}}[duration]||{warmup:3,main:5,cool:2};
  function pick(arr,n){return[...arr].sort(()=>Math.random()-.5).slice(0,Math.min(n,arr.length));}
  let exercises=[...pick(PREGNANCY_EXERCISES.warmup,counts.warmup)];
  let title='',coachNote='';
  if(focus==='upper'){exercises.push(...pick(PREGNANCY_EXERCISES.upper,counts.main));title='Pregnancy Safe Upper';coachNote='Strength work is healthy during pregnancy. Listen to your body.';}
  else if(focus==='lower'){exercises.push(...pick(PREGNANCY_EXERCISES.lower,counts.main-1));exercises.push(...pick(PREGNANCY_EXERCISES.core,1));title='Pregnancy Safe Lower';coachNote='Lower body work keeps you strong for labor. Include pelvic floor every session.';}
  else if(focus==='full'){exercises.push(...pick(PREGNANCY_EXERCISES.upper,Math.floor(counts.main/2)));exercises.push(...pick(PREGNANCY_EXERCISES.lower,Math.ceil(counts.main/2)-1));exercises.push(...pick(PREGNANCY_EXERCISES.core,1));title='Pregnancy Safe Full Body';coachNote='Always include pelvic floor work.';}
  else if(focus==='cardio'){exercises.push(...pick(PREGNANCY_EXERCISES.cardio,counts.main));title='Pregnancy Safe Cardio';coachNote='Aim for RPE 4-5 — hold a full conversation throughout.';}
  else{exercises.push(...pick(PREGNANCY_EXERCISES.recovery,counts.main+1));title='Prenatal Recovery';coachNote='Mobility reduces discomfort, prepares for labor, and improves sleep.';}
  exercises.push(...pick(PREGNANCY_EXERCISES.recovery.slice(0,3),counts.cool));
  return{title:`${duration}-Min ${title}`,coachNote,exercises};
}

function getForgeMetrics(){
  const store = loadStore();
  const today = parseDate(todayStr());
  const phases = getActivePlanPhases();
  const hasProgram = !!(phases && phases.length);

  // ── UNIQUE ACTIVE DAYS ──────────────────────────────────────
  // store is keyed by date string — one entry per calendar day
  // multiple workouts on same day = still one day (already handled by storage)
  const activeDays = new Set(Object.keys(store));

  // ── WEEK HELPERS ─────────────────────────────────────────────
  // Calendar week: Monday → Sunday
  function weekStart(d) {
    const day = new Date(d);
    const dow = day.getDay(); // 0=Sun
    const diff = dow === 0 ? -6 : 1 - dow; // adjust to Monday
    day.setDate(day.getDate() + diff);
    day.setHours(0,0,0,0);
    return day;
  }

  function daysLoggedInWeek(weekMonday) {
    let count = 0;
    for (let i = 0; i < 7; i++) {
      const d = new Date(weekMonday);
      d.setDate(weekMonday.getDate() + i);
      if (activeDays.has(dateStr(d))) count++;
    }
    return count;
  }

  function plannedWorkoutDaysInWeek(weekMonday) {
    // Count scheduled workout days (non-REST) that fall in this week
    if (!hasProgram) return null;
    let planned = 0;
    for (let i = 0; i < 7; i++) {
      const d = new Date(weekMonday);
      d.setDate(weekMonday.getDate() + i);
      const ds = dateStr(d);
      if (isScheduledWorkoutDay(ds)) planned++;
    }
    return planned;
  }

  // ── isScheduledWorkoutDay ────────────────────────────────────
  function isScheduledWorkoutDay(ds) {
    if (!hasProgram) return null;
    const startDate = parseDate(getStartDate());
    const d = parseDate(ds);
    let dayOffset = Math.floor((d - startDate) / 86400000);
    if (dayOffset < 0) return null;
    let phaseIdx = 0, remaining = dayOffset;
    const _phaseLens = getPlanPhaseLengths();
    for (let i = 0; i < phases.length; i++) {
      const len = _phaseLens[i] || 14; // already in days
      if (remaining < len) { phaseIdx = i; break; }
      remaining -= len;
      if (i === phases.length - 1) phaseIdx = i;
    }
    const phase = phases[phaseIdx];
    if (!phase || !phase.dowMap) return null;
    const dow = parseDate(ds).getDay();
    const dayInPhase = phase.dowMap[dow];
    if (dayInPhase === undefined) return false;
    const day = phase.schedule && phase.schedule[dayInPhase];
    if (!day) return false;
    const tag = (day.tag || '').toUpperCase();
    return tag !== 'REST' && tag !== 'RECOVERY' && tag !== 'ACTIVE' && tag !== 'OFF';
  }

  // ── STREAK — WEEKLY COMPLETION ───────────────────────────────
  // A streak week = unique days logged >= planned workout days that week
  // Moved sessions count: if you do Wednesday's workout on Thursday, it still
  // counts toward the week's tally. Life happens — reward the work, not the day.
  // Current (incomplete) week never breaks the streak.
  let streak = 0;
  const thisWeekStart = weekStart(today);

  if (hasProgram) {
    for (let w = 0; w < 52 * 10; w++) { // up to 10 years back
      const wStart = new Date(thisWeekStart);
      wStart.setDate(thisWeekStart.getDate() - w * 7);
      const wEnd = new Date(wStart);
      wEnd.setDate(wStart.getDate() + 6);

      // Skip current incomplete week — don't penalize for days still to come
      if (w === 0) { streak = 0; continue; }

      const logged = daysLoggedInWeek(wStart);
      const planned = plannedWorkoutDaysInWeek(wStart);

      // Week before program started — stop counting
      if (planned === 0 || planned === null) break;

      if (logged >= planned) {
        streak++;
      } else {
        break; // week not completed — streak over
      }
    }
  } else {
    // No program — simple consecutive-day streak as fallback
    for (let i = 0; i < 3650; i++) {
      const d = new Date(today);
      d.setDate(today.getDate() - i);
      if (activeDays.has(dateStr(d))) streak++;
      else if (i > 0) break;
    }
  }

  // ── THIS WEEK ────────────────────────────────────────────────
  const weekLogs = daysLoggedInWeek(thisWeekStart);
  const _u = getUser();
  let plannedDaysThisWeek = (_u && _u.daysPerWeek) ? parseInt(_u.daysPerWeek) : 5;
  if (hasProgram) {
    const planned = plannedWorkoutDaysInWeek(thisWeekStart);
    if (planned !== null && planned > 0) plannedDaysThisWeek = planned;
  }

  // ── LAST 30 DAYS (for no-program display) ───────────────────
  const monthLogs = Array.from(activeDays).filter(ds => {
    const diff = (today - parseDate(ds)) / 86400000;
    return diff >= 0 && diff < 30;
  }).length;

  return { streak, weekLogs, monthLogs, plannedDaysThisWeek, hasProgram };
}

function getTodaySession(){
  // Returns session for the currently selected goal/program (S.planGoalId)
  // Falls back to built-in Base plan
  const phases = getActivePlanPhases();
  if (!phases || !phases.length) return null;

  const today = todayStr();
  const startDate = parseDate(getStartDate());
  const d = parseDate(today);
  const dayOffset = Math.floor((d - startDate) / 86400000);
  const phaseLens = getPlanPhaseLengths();

  let phaseIdx = 0, remaining = Math.max(0, dayOffset);
  for (let i = 0; i < phases.length; i++) {
    const len = phaseLens[i] || 14;
    if (remaining < len) { phaseIdx = i; break; }
    remaining -= len;
    if (i === phases.length - 1) phaseIdx = i;
  }

  const ph = phases[phaseIdx];
  if (!ph || !ph.schedule || !ph.schedule.length) return null;
  const dow = parseDate(today).getDay();
  const mapped = ph.dowMap && ph.dowMap[dow];
  if (mapped === undefined) return null; // rest day
  const day = ph.schedule[mapped];
  if (!day) return null;
  return {phaseIdx, phase: ph, dayIdx: mapped, day};
}

function getAllTodaySessions() {
  // Returns an array of {session, goal} for every active goal with a workout today
  const results = [];
  const goals = getActiveGoals();
  const today = todayStr();
  const dow = parseDate(today).getDay();
  const startDate = parseDate(getStartDate());
  const phaseLens = getPlanPhaseLengths();

  goals.forEach(function(goal) {
    if (goal.planType === 'own') return; // own-program goals don't have scheduled sessions
    var session = getTodayGoalSession(goal);
    if (session) results.push({session, goal});
  });

  // Also check built-in Base if no goals linked to it
  const hasBaseGoal = goals.some(g => !g.programId && (g.planType==='app'||g.planType==='undecided'));
  if (!hasBaseGoal && !isFoundationHidden()) {
    // Check Base plan for today
    const phases = PHASES;
    const dayOffset = Math.max(0, Math.floor((parseDate(today)-startDate)/86400000));
    let phaseIdx = 0, rem = dayOffset;
    for (let i = 0; i < phaseLens.length; i++) {
      if (rem < (phaseLens[i]||14)) { phaseIdx=i; break; }
      rem -= (phaseLens[i]||14);
      if (i===phaseLens.length-1) phaseIdx=i;
    }
    const ph = phases[phaseIdx];
    if (ph && ph.dowMap && ph.dowMap[dow] !== undefined) {
      const dayInPhase = ph.dowMap[dow];
      const day = ph.schedule[dayInPhase];
      if (day) results.push({session:{phaseIdx,phase:ph,dayIdx:dayInPhase,day}, goal:null});
    }
  }
  return results;
}

      +(sessionLogged?'<div style="display:flex;align-items:center;gap:8px;margin-top:10px;padding:8px 0;border-top:1px solid var(--border)"><span style="color:var(--accent)">&#10003;</span><div style="font-family:var(--display);font-size:12px;letter-spacing:1px;color:var(--text2)">LOGGED</div></div>':'')

function timeAgo(isoStr){
  const diff=(Date.now()-new Date(isoStr))/1000;
  if(diff<60)return'just now';
  if(diff<3600)return Math.floor(diff/60)+'m ago';
  if(diff<86400)return Math.floor(diff/3600)+'h ago';
  if(diff<604800)return Math.floor(diff/86400)+'d ago';
  const d=new Date(isoStr);return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

async function buildExSummary(exercises){
  return exercises.map(([name,sets])=>{
    const done=sets.filter(s=>s.done);
    if(!done.length) return null;
    const isCardio=/run|ride|row|swim|walk|cardio|easy|tempo|long/i.test(name);
    const isTimed=/tabata|emom|amrap|circuit|wod|for time|interval/i.test(name);
    if(isCardio||isTimed){
      const f=done[0];
      const parts=[];
      if(f.reps) parts.push(f.reps+' min');
      if(f.weight&&f.weight!=='0') parts.push(f.weight+' mi');
      return {name, detail:parts.join(' · ')||'Completed', type:isTimed?'time':'cardio'};
    }
    const setLines=done.map(s=>{
      const r=s.reps||'—';
      const w=(s.weight&&s.weight!=='0')?s.weight+'lb':null;
      return w?r+' @ '+w:r+' reps';
    });
    const allSame=setLines.every(l=>l===setLines[0]);
    const detail=allSame
      ?done.length+' × '+setLines[0]
      :setLines.map((l,i)=>'S'+(i+1)+': '+l).join(' · ');
    return {name, detail, type:'strength'};
  }).filter(Boolean);
}
function sendToSquad(workoutTitle,phaseName,durationEst,exercises,notes){
  const user=getUser();if(!user)return;
  const exSummary=buildExSummary(exercises);
  const payload={
    user_name:user.name,user_gender:user.gender,
    workout_title:workoutTitle,phase_name:phaseName||null,
    duration_est:durationEst||null,
    exercises:JSON.stringify(exSummary),
    notes:notes||null,
    local_date:todayStr(), // actual training date, not server receipt time
  };
  supaFetch('workouts',{method:'POST',prefer:'return=minimal',body:JSON.stringify(payload)})
    .catch(e=>console.warn('Squad sync failed:',e));
}

// Get today's scheduled session for a goal with an app plan
function getTodayGoalSession(goal) {
  var phases;
  // Model B: use linked program from forge_programs
  if (goal.programId) {
    var prog = getProgramById(goal.programId);
    if (prog && prog.phases && prog.phases.length) phases = prog.phases;
  }
  // Model A fallback: embedded planData
  if (!phases && goal.planData && goal.planData.phases) {
    phases = goal.planData.phases;
  }
  // Built-in Base plan fallback — ONLY for goals with no program linked
  if (!phases && !goal.programId && (goal.planType === 'app' || goal.planType === 'undecided')) {
    phases = getPlanPhases();
  }
  if (!phases) return null;
  if (!phases || !phases.length) return null;
  var today = new Date();
  var dow = today.getDay();
  // Find which phase we're in based on goal start date (use settings startDate or goal createdAt)
  var startDate = parseDate(getStartDate());
  var daysSinceStart = Math.floor((today - startDate) / 86400000);
  if (daysSinceStart < 0) daysSinceStart = 0;

  var daysAccum = 0;
  for (var pi = 0; pi < phases.length; pi++) {
    var ph = phases[pi];
    daysAccum += ph.durationDays || 14;
    if (daysSinceStart < daysAccum) {
      var dowMap = ph.dowMap || {};
      var sessionIdx = dowMap[String(dow)];
      if (sessionIdx === undefined) return null;
      var session = ph.schedule[sessionIdx];
      if (!session) return null;
      return {
        label: session.label,
        tag: session.tag,
        est: getDayEst ? getDayEst(session.label) : null,
        exercises: session.exercises,
        phaseIdx: pi,
        sessionIdx: sessionIdx,
      };
    }
  }
  return null;
}

function getActivePlanPhases() {
  // Try to get phases from the selected goal's linked program (Model B)
  if (S.planGoalId) {
    var goal = getGoals().find(function(g){ return g.id === S.planGoalId; });
    if (goal) {
      // Model B: goal has a programId pointing to forge_programs
      if (goal.programId) {
        var prog = getProgramById(goal.programId);
        if (prog && prog.phases && prog.phases.length) return prog.phases;
      }
      // Model A fallback: goal still has embedded planData (pre-migration)
      if (goal.planData && goal.planData.phases) return goal.planData.phases;
    }
  }
  // Last resort: built-in 14-week plan
  return getPlanPhases();
}
function getActivePlanStartDate() {
  if (S.planGoalId) {
    var goal = getGoals().find(function(g){ return g.id === S.planGoalId; });
    if (goal && goal.createdAt) {
      return goal.createdAt.slice(0,10);
    }
  }
  return getStartDate();
}
function detectConflicts(sessions) {
  // Conflict = two sessions that are both high-intensity on same day
  // e.g. two IRON sessions, or IRON + FUNCTIONAL
  // Easy Run + Lift = not a conflict
  var conflicts = [];
  var hardTags = ['IRON','FUNCTIONAL','HIIT','WOD','BUILD'];
  var hardSessions = sessions.filter(function(s) {
    return hardTags.some(function(t) { return (s.session.tag||'').includes(t); });
  });
  if (hardSessions.length > 1) {
    conflicts = hardSessions;
  }
  return conflicts;
}

const GOALS_KEY = 'forge_goals';

// ============================================================
// PROGRAMS — standalone entities (Model B)
// ============================================================
const PROGRAMS_KEY = 'forge_programs';

function getPrograms() {
  try { return JSON.parse(localStorage.getItem(PROGRAMS_KEY) || '{}'); }
  catch(e) { return {}; }
}

function savePrograms(programs) {
  localStorage.setItem(PROGRAMS_KEY, JSON.stringify(programs));
}

function getProgramById(id) {
  if (!id) return null;
  return getPrograms()[id] || null;
}

function saveProgramEntry(program) {
  const all = getPrograms();
  all[program.id] = program;
  savePrograms(all);
  return program;
}

function deleteProgramEntry(id) {
  const all = getPrograms();
  delete all[id];
  savePrograms(all);
}

function makeProgramId() {
  return 'prog_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7);
}

// Get all programs referenced by active goals
function getActivePrograms() {
  const progs = getPrograms();
  const goals = getActiveGoals();
  const seen = new Set();
  return goals
    .filter(g => g.programId && progs[g.programId])
    .map(g => progs[g.programId])
    .filter(p => { if (seen.has(p.id)) return false; seen.add(p.id); return true; });
}

function getGoals(status) {
  try {
    const all = JSON.parse(localStorage.getItem(GOALS_KEY) || '[]');
    return status ? all.filter(g => g.status === status) : all;
  } catch(e) { return []; }
}

function getActiveGoals() { return getGoals('active'); }

function saveGoals(goals) {
  localStorage.setItem(GOALS_KEY, JSON.stringify(goals));
  syncGoalsToSupabase(goals).catch(() => {});
}

function upsertGoal(goal) {
  const all = getGoals();
  const idx = all.findIndex(g => g.id === goal.id);
  if (idx >= 0) all[idx] = {...all[idx], ...goal, updatedAt: new Date().toISOString()};
  else all.unshift({...goal, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString()});
  saveGoals(all);
}

function archiveGoal(id) {
  const all = getGoals();
  const g = all.find(g => g.id === id);
  if (g) { g.status = 'archived'; g.updatedAt = new Date().toISOString(); }
  saveGoals(all);
}

function completeGoal(id) {
  const all = getGoals();
  const g = all.find(g => g.id === id);
  if (g) { g.status = 'completed'; g.completedAt = new Date().toISOString(); g.updatedAt = new Date().toISOString(); }
  saveGoals(all);
}

function makeGoalId() {
  return 'g_' + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
}

function getDisciplineLabel(d) {
  return {weight_training:'Weight Training', endurance:'Endurance', functional:'Functional Fitness', hiit:'HIIT', mobility:'Mobility'}[d] || d;
}

function getActivityLabel(a) {
  return {running:'Running', cycling:'Cycling', rowing:'Rowing', swimming:'Swimming', walking:'Walking / Hiking', general:'General Cardio'}[a] || a;
}

function getGoalTypeLabel(t) {
  return {
    '5k':'5K', '10k':'10K', 'half_marathon':'Half Marathon', 'full_marathon':'Full Marathon',
    'century':'Century / Gran Fondo', 'sportive':'Sportive', 'general':'General Fitness',
    '2k_race':'2K Race', '5k_race':'5K Race', 'open_water':'Open Water Event',
    'pool_distance':'Pool Distance', 'event':'Specific Event'
  }[t] || t;
}

function goalCountdown(targetDate) {
  if (!targetDate) return null;
  const days = Math.ceil((new Date(targetDate) - new Date().setHours(0,0,0,0)) / 86400000);
  if (days < 0) return 'RACE DAY PAST';
  if (days === 0) return 'RACE DAY';
  if (days === 1) return '1 DAY OUT';
  return days + ' DAYS';
}

function goalSubLabel(goal) {
  if (goal.discipline === 'endurance') {
    const parts = [getActivityLabel(goal.activity)];
    if (goal.goalType && goal.goalType !== 'general') parts.push(getGoalTypeLabel(goal.goalType));
    return parts.join(' — ');
  }
  return getDisciplineLabel(goal.discipline);
}

async function syncGoalsToSupabase(goals) {
  if (SUPABASE_URL === 'YOUR_SUPABASE_URL') return;
  // Goals are personal — sync under user_plans table using a goals prefix
  const uid = getUserId();
  const active = goals.filter(g => g.status === 'active');
  await supaFetch('user_plans?user_id=eq.' + uid + '&plan_data->>type=eq.goals', {
    method: 'DELETE', prefer: 'return=minimal'
  });
  if (active.length) {
    await supaFetch('user_plans', {
      method: 'POST', prefer: 'return=minimal',
      body: JSON.stringify({user_id: uid, user_name: getUser()?.name, plan_data: JSON.stringify({type:'goals', goals: active})})
    });
  }
}

};


function gbClearDate(){GB.draft.targetDate='';gbNext();}
function gbPlanOwn(){gbSetPlanType('own');}

function gbReuseProgram(programId) {
  const prog = getProgramById(programId);
  if (!prog) return;
  GB.draft.programId = programId;
  GB.draft.planType = 'app';
  GB.reusePrompt = false;
  // Skip plantype and builder — go straight to review
  GB.step = 7;
  renderMain();
}

function gbPlanApp(){gbSetPlanType('app');}
function gbPlanUndecided(){gbSetPlanType('undecided');}
function gbCancel(){gbReset();S.showGoalCreator=false;renderMain();}


function gbReset() {
  GB.step = 0;
  GB.draft = {id:null,label:'',targetDate:'',discipline:null,activity:null,goalType:null,crossTraining:[],planType:null,planData:null,status:'active'};
  GB.builderStep = 0; GB.builderAnswers = {}; GB.editingId = null; GB.loading = false; GB.error = null;
}

function gbNext() { GB.step++; renderMain(); }
function gbLabelNext(){
  if(GB.draft.label.trim()){
    // Check for existing programs to potentially reuse
    const ep = getActivePrograms();
    if(ep.length > 0 && !GB.editingId) GB.reusePrompt = true;
    gbNext();
  } else {
    const el=document.getElementById("gb-label");
    if(el) el.style.borderBottomColor="var(--red)";
  }
}
function gbBack() {
  if (GB.step <= 0) return;
  GB.step--;
  GB.reusePrompt = false; // clear reuse prompt if going back
  // Skip steps that auto-advance (e.g. step 3 sub-type only shows for endurance)
  // If we land on step 3 and discipline isn't endurance, skip back further
  if (GB.step === 3 && GB.draft.discipline !== 'endurance') GB.step--;
  renderMain();
}
function gbSetDisc(d) { GB.draft.discipline = d; GB.draft.activity = null; GB.draft.goalType = null; GB.draft.crossTraining = []; gbNext(); }
function gbSetActivity(a) { GB.draft.activity = a; gbNext(); }
function gbSetGoalType(t) { GB.draft.goalType = t; gbNext(); }
function gbToggleXtrain(d) {
  const arr = GB.draft.crossTraining;
  const idx = arr.indexOf(d);
  if (idx >= 0) arr.splice(idx,1);
  else if (arr.length < 2) arr.push(d);
  renderMain();
}
function gbSetPlanType(t) { GB.draft.planType = t; if(t==='app') GB.step=6; else GB.step=7; renderMain(); }

const DISCIPLINES = [
  {id:'weight_training', label:'Weight Training', desc:'Barbell, dumbbell, progressive resistance'},
  {id:'endurance',       label:'Endurance',       desc:'Running, cycling, rowing, swimming'},
  {id:'functional',      label:'Functional Fitness', desc:'WODs, AMRAPs, EMOMs, functional movement'},
  {id:'hiit',            label:'HIIT',            desc:'High intensity intervals, work/rest structure'},
  {id:'mobility',        label:'Mobility',        desc:'Yoga, flexibility, recovery'},
];

const ENDURANCE_ACTIVITIES = [
  {id:'running',  label:'Running'},
  {id:'cycling',  label:'Cycling'},
  {id:'rowing',   label:'Rowing'},
  {id:'swimming', label:'Swimming'},
  {id:'walking',  label:'Walking / Hiking'},
  {id:'general',  label:'General Cardio'},
];

  running:  [{id:'5k',label:'5K'},{id:'10k',label:'10K'},{id:'half_marathon',label:'Half Marathon'},{id:'full_marathon',label:'Full Marathon'},{id:'general',label:'General Fitness'}],
  cycling:  [{id:'century',label:'Century / Gran Fondo'},{id:'sportive',label:'Sportive'},{id:'general',label:'General Fitness'}],
  rowing:   [{id:'2k_race',label:'2K Race'},{id:'5k_race',label:'5K Race'},{id:'general',label:'General Fitness'}],
  swimming: [{id:'open_water',label:'Open Water Event'},{id:'pool_distance',label:'Pool Distance'},{id:'general',label:'General Fitness'}],
  walking:  [{id:'event',label:'Specific Event'},{id:'general',label:'General Fitness'}],
  general:  [{id:'general',label:'General Fitness'}],
};

// Duration options per discipline/goal type
function gbDurationOptions(discipline, goalType) {
  if (discipline === 'endurance') {
    if (goalType === 'full_marathon') return ['16 weeks','18 weeks','20 weeks'];
    if (goalType === 'half_marathon') return ['12 weeks','14 weeks','16 weeks'];
    if (goalType === '10k') return ['10 weeks','12 weeks','14 weeks'];
    if (goalType === '5k') return ['8 weeks','10 weeks','12 weeks'];
    return ['8 weeks','12 weeks','16 weeks','20 weeks'];
  }
  if (discipline === 'functional' || discipline === 'hiit') return ['4 weeks','6 weeks','8 weeks'];
  if (discipline === 'mobility') return ['4 weeks','6 weeks','8 weeks','12 weeks'];
  return ['4 weeks','6 weeks','8 weeks','12 weeks']; // weight training default
}

// Builder questions per discipline
function gbBuilderQuestions(discipline, goalType) {
  const durationOpts = gbDurationOptions(discipline, goalType);
  const base = [
    {id:'days', label:'DAYS PER WEEK?', opts:['2 days','3 days','4 days','5 days','6 days']},
    {id:'duration', label:'PROGRAM LENGTH?', opts: durationOpts},
    {id:'experience', label:'EXPERIENCE LEVEL?', opts:['Beginner','Intermediate','Advanced']},
  ];
  if (discipline === 'endurance') {
    // Running/endurance doesn't need equipment in the same way
    return base;
  }
  if (discipline === 'mobility') {
    return [
      {id:'days', label:'DAYS PER WEEK?', opts:['3 days','4 days','5 days','6 days','Every day']},
      {id:'duration', label:'PROGRAM LENGTH?', opts: durationOpts},
      {id:'experience', label:'EXPERIENCE LEVEL?', opts:['Beginner','Intermediate','Advanced']},
    ];
  }
  return [
    ...base,
    {id:'equipment', label:'EQUIPMENT AVAILABLE?', opts:['Bodyweight only','Resistance bands','Dumbbells','Dumbbells + bench','Full home gym','Commercial gym']},
  ];
}

function renderGoalCreator() {

  const cancelX = '<button onclick="gbCancel()" aria-label="Cancel goal creation" style="background:none;border:none;font-family:var(--display);font-size:22px;letter-spacing:1px;color:var(--text3);cursor:pointer;padding:0 4px;flex-shrink:0;line-height:1">×</button>';

            '</button>';

            '<div style="font-family:var(--body);font-size:13px;color:var(--text3);margin-top:4px">Create a fresh program for this goal</div>' +
          '</button>' +

      }
      GB.reusePrompt = false;
    }
    return '<div class="fade-in" style="padding:24px 16px">' + hdr +
      '<div style="font-family:var(--display);font-size:26px;letter-spacing:2px;color:var(--text);margin-bottom:8px">TARGET DATE?</div>' +
      '<div style="font-family:var(--body);font-size:15px;color:var(--text2);margin-bottom:20px">Optional — adds a countdown to your goal card.</div>' +

      '<button onclick="gbNext()" class="action-btn amber">CONTINUE</button>' +

  if (step === 2) {
    return '<div class="fade-in" style="padding:24px 16px">' + hdr +
      '<div style="font-family:var(--display);font-size:32px;letter-spacing:3px;color:var(--text);margin-bottom:20px">PRIMARY DISCIPLINE</div>' +

        return '<button data-disc="' + disc.id + '" onclick="gbSetDisc(this.dataset.disc)" style="display:block;width:100%;padding:14px 16px;margin-bottom:10px;border-radius:12px;background:' + (on?'var(--bg4)':'var(--bg2)') + ';border:1px solid ' + (on?'var(--accent-border)':'var(--border)') + ';border-left:3px solid ' + (on?'var(--accent)':'var(--border2)') + ';color:var(--text);text-align:left;cursor:pointer">' +
          '<div style="font-family:var(--display);font-size:17px;letter-spacing:2px;color:' + (on?'var(--accent)':'var(--text)') + '">' + disc.label + '</div>' +

  }

  if (step === 3) {
    if (d.discipline === 'endurance' && !d.activity) {
      return '<div class="fade-in" style="padding:24px 16px">' + hdr +
        '<div style="font-family:var(--display);font-size:32px;letter-spacing:3px;color:var(--text);margin-bottom:20px">ACTIVITY</div>' +

          return '<button data-act="' + a.id + '" onclick="gbSetActivity(this.dataset.act)" style="display:block;width:100%;padding:16px 16px;margin-bottom:12px;background:var(--bg2);border:1px solid var(--border);color:var(--text2);text-align:left;cursor:pointer;font-family:var(--display);font-size:17px;letter-spacing:2px">' + a.label + '</button>';

    if (d.discipline === 'endurance' && d.activity && !d.goalType) {
      var types = ENDURANCE_GOAL_TYPES[d.activity] || [];
      return '<div class="fade-in" style="padding:24px 16px">' + hdr +
        '<div style="font-family:var(--display);font-size:32px;letter-spacing:3px;color:var(--text);margin-bottom:20px">GOAL TYPE</div>' +
        types.map(function(t) {
          return '<button data-gt="' + t.id + '" onclick="gbSetGoalType(this.dataset.gt)" style="display:block;width:100%;padding:16px 16px;margin-bottom:12px;background:var(--bg2);border:1px solid var(--border);color:var(--text2);text-align:left;cursor:pointer;font-family:var(--display);font-size:17px;letter-spacing:2px">' + t.label + '</button>';
        }).join('') + '</div>';
    }
    GB.step = 4; return renderGoalCreator();
  }

  if (step === 4) {
    var available = DISCIPLINES.filter(function(disc) { return disc.id !== d.discipline; });
    var selected = d.crossTraining;
    return '<div class="fade-in" style="padding:24px 16px">' + hdr +
      '<div style="font-family:var(--display);font-size:26px;letter-spacing:2px;color:var(--text);margin-bottom:6px">CROSS-TRAINING</div>' +

        return '<button data-xt="' + disc.id + '" onclick="' + (blocked ? '' : 'gbToggleXtrain(this.dataset.xt)') + '" style="display:block;width:100%;padding:16px 16px;margin-bottom:12px;background:' + (on?'var(--bg4)':'var(--bg2)') + ';border:1px solid ' + (on?'var(--accent-border)':'var(--border)') + ';border-left:3px solid ' + (on?'var(--accent)':'var(--border2)') + ';color:' + (blocked?'var(--text4)':on?'var(--accent)':'var(--text2)') + ';text-align:left;cursor:' + (blocked?'default':'pointer') + '">' +

      }).join('') +
      '<button onclick="gbNext()" class="action-btn amber" style="margin-top:8px">' + (selected.length ? 'CONTINUE WITH ' + selected.length + ' SELECTED' : 'SKIP — NO CROSS-TRAINING') + '</button></div>';
  }

  if (step === 5) {
    // Reuse prompt: show if user has existing programs and not editing
    const existingProgs = getActivePrograms();
    if (existingProgs.length > 0 && !GB.editingId && !GB.reusePrompt && !GB.draft.programId) {
      GB.reusePrompt = true;
    }
    if (GB.reusePrompt && !GB.draft.programId) {
      return '<div class="fade-in" style="padding:24px 16px">' + hdr +

        '<button onclick="GB.reusePrompt=false;GB.draft.programId=null;renderMain()" style="display:block;width:100%;padding:16px;margin-bottom:10px;background:var(--bg2);border:1px solid var(--border);color:var(--text2);text-align:left;cursor:pointer;font-family:var(--display);font-size:18px;letter-spacing:1px">BUILD A NEW PROGRAM<div style="font-family:var(--body);font-size:13px;color:var(--text3);margin-top:4px;font-weight:400">Create a fresh program just for this goal</div></button>' +

      '<div style="font-family:var(--body);font-size:14px;color:var(--text2);margin-bottom:20px">The app can build one for you, or just track your own.</div>' +
      '<button onclick="gbPlanApp()" style="display:block;width:100%;padding:16px 16px;margin-bottom:12px;border-radius:12px;background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--green);color:var(--text);text-align:left;cursor:pointer">' +
      '<div style="font-family:var(--display);font-size:17px;letter-spacing:2px;color:var(--green)">BUILD A PROGRAM FOR ME</div>' +
      '<div style="font-family:var(--body);font-size:13px;color:var(--text2);margin-top:3px">Answer a few questions — app generates your schedule</div></button>' +
      '<button onclick="gbPlanOwn()" style="display:block;width:100%;padding:14px 16px;margin-bottom:8px;background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--accent);color:var(--text);text-align:left;cursor:pointer">' +
      '<div style="font-family:var(--display);font-size:17px;letter-spacing:2px;color:var(--accent)">FOLLOWING MY OWN PROGRAM</div>' +

      '<button onclick="gbPlanUndecided()" style="display:block;width:100%;padding:14px 16px;margin-bottom:8px;background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--border2);color:var(--text2);text-align:left;cursor:pointer">' +
      '<div style="font-family:var(--display);font-size:17px;letter-spacing:2px">NOT YET — DECIDE LATER</div></button></div>';
  }

  if (step === 6) {

    var current = questions[answered];
    if (!current) { GB.step = 7; return renderGoalCreator(); }
    var progress = Math.round(answered / questions.length * 100);
