 "Wall Walks":"Feet against wall in push-up position. Walk feet up the wall as hands walk toward it until as vertical as possible. Walk back down with control.\n★ shoulders and core stability — go slow, this is skill work.",
 "Bodyweight Squat":"Feet shoulder-width, toes slightly out. Sit back and down, chest up, knees over toes. Full depth — hip crease below knees. Drive through heels.\n★ quads, glutes, hamstrings equally — not just your knees.",
 "Reverse Lunge":"Step one foot straight back, lower rear knee to just above the floor. Front shin stays vertical. Drive through front heel to return.\n★ front glute and quad — rear leg is just balance.",
 "Glute Bridge":"On your back, knees bent, feet flat. Drive through heels, squeeze glutes hard, raise hips to a straight line from knees to shoulders. Hold 1 second.\n★ glutes contracting. If you feel lower back — push through heels more.",
 "Calf Raises":"Rise up onto toes as high as possible. Lower for 3 slow seconds. Full range every rep.\n★ calf belly burning on the descent. 3 seconds down is non-negotiable.",
 "Jump Squat":"Squat to full depth, explode upward off both feet. Land softly toes-to-heel, absorb the impact, straight into next rep.\n★ explosive glutes and quads. Land quiet — not heavy.",
 "Wall Sit":"Back flat on wall, thighs parallel to floor, shins vertical. Hold position. Don't let thighs rise above parallel.\n★ quads burning — breathe steadily.",
 "Step-Ups on Bench":"Step up with one foot, drive through that heel to stand tall on bench. Step down with control. All reps one side before switching.\n★ glute of the working leg. If you're pushing off the back foot — step higher.",
 "Cossack Squat":"Feet wide. Shift weight to one side, bend that knee into a deep squat, other leg stays straight. Return through center, shift sides.\n★ inner thigh and hip flexibility — only go as deep as mobility allows.",
 "Bird Dog":"On hands and knees, spine neutral. Extend opposite arm and leg simultaneously, hold 1-2 seconds, return. Don't let hips rotate.\n★ deep core stabilizers. If hips swing — slow down.",
 "Dead Bug":"On your back, arms straight up, knees bent at 90° in the air. Lower opposite arm and leg toward floor, keeping lower back pressed flat. Return.\n★ lower abs bracing. Lower back must stay on the floor.",
 "Hollow Hold":"Press lower back to floor. Raise shoulders and legs off floor into a dish shape. Arms overhead.\n★ entire anterior chain. If lower back lifts — raise legs higher or bend knees.",
 "V-Ups":"Lie flat. Simultaneously raise straight legs and upper body, reaching hands toward feet. Lower with control.\n★ full rectus abdominis. No momentum. Too hard — bend your knees.",
 "Bicycle Crunches":"Hands behind head, knees raised. Alternate elbow to opposite knee while extending the other leg. Move slowly.\n★ obliques on each rotation. Rushing eliminates the benefit.",
 "Russian Twists":"Knees bent, feet off floor, torso at 45°. Rotate side to side, touching the floor at each hip. Add weight when easy.\n★ obliques and deep core — spine tall, don't collapse forward.",
 "Leg Raises":"Lie on back, hands under lower back. Raise straight legs to vertical, lower slowly. Stop just before heels touch the floor.\n★ lower abs. Slow descent. Lower back stays pressed down.",
 "Mountain Climbers":"In push-up position, drive one knee toward chest in a running motion. Hips stay level.\n★ hip flexors and core. Faster is cardio, slower is core work.",
 "Side Plank":"On forearm and outside foot, body in a straight diagonal. Keep hips elevated and square.\n★ lateral core — obliques and glute medius both firing.",
 "Plank Circuit":"Three variations back to back: standard forearm plank, left side plank, right side plank. Minimal transition time.\n★ full core — front and both sides in one circuit.",
 "Incline DB Bench Press":"Set bench to 30-45°. DBs at shoulder level, palms forward. Press up and slightly in. Lower with a 3-second count — feel the stretch at the bottom.\n★ upper chest and front shoulder. Don't fully lockout — keep tension.",
 "DB Shoulder Press":"DBs at ear height, palms forward. Press straight up. Don't lean back to assist — if you have to, the weight is too heavy.\n★ front and side deltoids. Core braced throughout.",
 "DB Lateral Raise":"DBs at sides. Raise out to shoulder height, slight elbow bend — like pouring water. Lower slowly. No swinging.\n★ lateral deltoid. Light weight done right beats heavy done wrong.",
 "DB Close-Grip Floor Press":"Lie on floor, DBs together at chest, elbows tucked close. Press up keeping elbows in. Floor limits range — intentional. Tricep exercise.\n★ back of the arm driving the press, not your chest.",
 "DB Fly":"On incline bench. DBs above chest, palms facing. Lower in a wide arc — feel the deep chest stretch. Return in the same arc.\n★ pec stretch at the bottom. This is a fly, not a press.",
 "DB Tricep Extension":"Hold one DB overhead with both hands. Lower behind head by bending elbows, drive back up. Upper arms pinned in place.\n★ long head of the tricep — the stretch at the bottom is the point.",
 "Push-Ups to Failure":"After weighted work, push until you physically can't. Record the number every session — this number going up is one of your clearest progress markers.\n★ STANDARD: chest touches the floor on every rep. Partial reps don't count.",
 "Push-Up Burnout":"Same as push-ups to failure — go until you hit the floor.\n★ complete chest and tricep fatigue.",
 "Dips + Push-Up Superset":"Bench dips immediately into push-ups to failure — no rest between. This is a superset — the discomfort is the point.\n★ tricep and chest pump. Tight on dips, no flaring elbows.",
 "Goblet Squat":"Hold DB vertically at chest. Squat down between your heels — elbows track inside knees at the bottom. Drive through heels.\n★ quads and glutes. The DB counterbalances — use it to squat deeper.",
 "Romanian Deadlift":"DBs at thighs. Hinge at hip, push hips back as DBs travel down your legs. Slight knee bend, flat back. Stop when you feel a strong hamstring stretch.\n★ hamstrings loading under stretch. If lower back hurts — you're rounding.",
 "Walking Lunge":"Step forward into a lunge, front shin vertical, rear knee lowers to just above the floor. Drive through front heel to bring rear foot forward.\n★ each glute independently — unilateral strength is the goal.",
 "Bulgarian Split Squat":"Rear foot elevated on bench, front foot forward so shin stays vertical. Lower straight down — rear knee approaches the floor.\n★ glute and quad of the front leg. This will humble you. Don't rush the descent.",
 "DB RDL":"Same as Romanian Deadlift. On heavier weeks, increase weight from last session.\n★ hamstrings. If not feeling them — hinge more at the hip.",
 "DB Squat":"DBs at sides, feet shoulder-width. Squat to full depth.\n★ quads and glutes. Heavier weight means harder squeeze on the way up.",
 "Weighted Calf Raise":"DBs at sides. Full rise onto toes, then lower for 3 slow seconds. Full range every rep.\n★ calf belly burning on descent.",
 "Single-Leg RDL":"Balance on one foot. Hinge at hip, opposite leg extends behind as counterbalance. Keep back flat, hips square.\n★ hamstring of working leg plus balance challenge.",
 "DB Sumo Squat":"Feet wider than shoulder-width, toes out 45°. One DB held vertically at center. Squat between your feet.\n★ inner thighs and glutes — the wide stance shifts emphasis.",
 "Single-Arm DB Row":"Brace one hand and knee on the bench. Pull elbow back and up — DB comes to your hip, not armpit. Don't rotate torso to assist.\n★ mid-back and lat. If bicep is tired and back isn't — use more back.",
 "DB Hammer Curl":"DBs at sides, palms facing each other. Curl without rotating wrists. Neutral grip throughout.\n★ brachialis — under the bicep. Builds arm thickness.",
 "DB Bicep Curl":"DBs at sides, palms forward. Full range — fully extended at bottom, fully contracted at top. No swinging.\n★ bicep peak contraction. Squeeze hard at top, lower 2-3 seconds.",
 "DB Curl":"Same as DB Bicep Curl. Heavier weeks — increase weight, slow the eccentric.\n★ full bicep — controlled, no momentum.",
 "DB Curl Superset":"Standard curl immediately into hammer curl. Back to back, no rest between movements.\n★ complete bicep fatigue across both heads.",
 "Incline DB Curl":"Lie back on incline bench, arms hanging straight down. Curl from fully stretched position.\n★ deep stretch at the bottom — upper arm stays in place.",
 "Reverse Fly":"Hinge forward at hips, DBs hanging. Raise out to sides, slight elbow bend — like opening a book. Squeeze shoulder blades at top.\n★ rear deltoids and upper back. If neck hurts — lighten the weight.",
 "DB Pullover":"Lie flat on bench. One DB overhead with both hands. Lower in an arc behind your head until you feel a lat and chest stretch. Return.\n★ lats and chest stretch. Keep slight elbow bend throughout.",
 "Rower or Treadmill":"Easy effort — RPE 4-5 means you can hold a full conversation. Building aerobic base, not burning yourself out.\n★ ON THE ROWER: legs drive first, then lean back, then pull. Sequence matters every stroke.",
 "Rower Intervals":"Work at moderate-hard effort. Lock in stroke rate — 22-26 spm for conditioning work.\n★ ROWER FORM: legs → back → arms on drive. Arms → back → legs on recovery.",
 "Rower 8×250m":"Each 250m should be a hard, consistent effort. Your splits should be within 3-4 seconds of each other. If last intervals drop dramatically — you went out too hard.\n★ AIM: consistent splits, not a fast first and dying last.",
 "Rower 5×500m":"Each 500m is a hard sustained effort. Record every split. These numbers tell you week-to-week conditioning progress.\n★ TARGET: sub-2:00/500m if you're pushing. Record every split.",
 "Rower 2000m Time Trial":"The gold standard rowing benchmark. Warm up thoroughly. Go all out for 2000m. Pace the first 500m — going out too hard means a death march at the end.\n★ STRATEGY: even splits or negative split (faster in the second half). Don't sprint the first 500m.",
 "Treadmill Run/Walk":"Run 2 minutes, walk 1 minute. Reduce walk breaks each week until running continuously.\n★ FORM: don't hold the rails. Arms drive pace. Land midfoot, not heel.",
 "Treadmill Run":"Sustained effort — no walking. RPE 6-7 means you can speak a sentence but not a paragraph.\n★ IF YOU NEED TO WALK: slow the belt before stepping off — don't just grab the rails.",
 "Treadmill 20 min":"No walking. 20 minutes sustained at challenging but sustainable pace.\n★ PACE: uncomfortable but repeatable. This trains your aerobic engine.",
 "Treadmill HIIT":"30 seconds hard sprint (RPE 8-9), 30 seconds walking. The sprint should feel genuinely hard — not a fast jog.\n★ HARDER WITHOUT MORE SPEED: increase incline instead. Safer on knees.",
 "Easy Cardio":"Walk or easy row at RPE 3 — fully conversational, no sweat. This is active recovery, not training.\n★ DON'T SKIP: it accelerates recovery for the next hard session.",
 "Circuit — 4 Rounds":"Move between exercises with no rest within the round. Rest 90 seconds between rounds.\n★ PACING: round 1 should feel manageable. If you're dying in round 1 — scale the reps.",
 "Circuit — 5 Rounds":"Same as 4-round circuit. Phase 3 volume increase is intentional.\n★ EXPECTATION: rounds 4 and 5 will be hard. That's the signal.",
 "DB Thrusters":"DBs at shoulder height. Squat to depth, then drive out of the squat and press overhead in one continuous movement. Squat powers the press.\n★ legs and shoulders integrated. Don't break into two separate movements.",
 "Core Circuit":"Three movements back to back with minimal rest between. Rest only between full rounds.\n★ PURPOSE: core endurance, not just strength. High rep counts are intentional.",
 "Dynamic Warmup":"Move through all joints in order — never skip this. Takes 5 minutes, prevents injuries, and directly improves performance in the session.\nSTANDARD SEQUENCE:\n1. Arm circles — 10 forward, 10 back\n2. Shoulder rolls — 10 each direction\n3. Cat-cow — 10 slow reps on hands and knees\n4. Hip circles — 10 each direction standing\n5. Leg swings — 10 front/back each leg, 10 side/side each leg\n6. Inchworm walks — 5 reps\n7. Deep squat hold — 20 seconds\n★ BEFORE LEG DAYS: add glute bridges x10 and cossack squats x5 each side.\n★ BEFORE UPPER DAYS: add shoulder dislocates x10 and doorframe pec stretch x30 sec.\n★ NEVER SKIP IT: 5 minutes of warmup prevents 5 weeks of injury recovery.",
 "Hip Flexor Stretch":"Kneeling on one knee. Drive hips forward until you feel front of hip stretching. Torso upright — don't lean forward.\n★ WHY IT MATTERS: sitting wrecks hip flexors. This is injury prevention and affects your squat depth.",
 "Hip Flexor & Quad Stretch":"Combine hip flexor kneeling position with grabbing the rear foot. Feel both the front of the hip and the quad.\n★ DO THIS EVERY NIGHT: workout or not.",
 "Thoracic Rotation":"On your side, knees stacked, arms extended forward. Rotate top arm open toward ceiling. Return.\n★ WHY: locked thoracic spine affects every pressing and pulling movement. Especially if you sit at a desk.",
 "Hamstring Stretch":"Extend one leg, hinge forward from the hips — not by rounding your back. Feel stretch in back of thigh, not behind the knee.\n★ KEY: fold from the hip joint, not by rounding your spine.",
 "Foam Roll":"Sustained pressure on tight areas — glutes, IT band, upper back, calves. Hold on sore spots for 20-30 seconds.\n★ TECHNIQUE: hold, don't roll rapidly. Find the knot and breathe into it.",
 "Cat-Cow":"On hands and knees. Inhale, let belly drop and look up (cow). Exhale, round spine and tuck chin (cat). Slow and deliberate.\n★ PURPOSE: spinal mobility in both flexion and extension before loading.",
 "Inchworm Walks":"Hinge to touch floor, walk hands to push-up position, walk feet back to hands, stand. Keep legs as straight as possible.\n★ hamstrings, lats, hip flexors all stretching in sequence.",
 "World's Greatest Stretch":"Step into a lunge, place same-side hand on floor inside front foot. Rotate opposite arm toward ceiling. Return and repeat.\n★ WHY: hip, thoracic, and hamstring mobility in one movement. Earns its name.",
 "Deep Squat Hold":"Hold a full squat position, heels down. Hold onto something if needed. Breathe deeply.\n★ GOAL: hip crease below parallel, chest up. Work toward 60 seconds.",
 "Shoulder Dislocates":"Hold a towel or band with wide grip. Raise overhead and continue until behind your back with straight arms. Return.\n★ CAUTION: never force range. Pain means stop — tightness is fine.",
 "90/90 Hip Switch":"Both knees bent at 90°, one in front and one to the side. Rotate through hips to switch sides. Stay upright.\n★ hip external and internal rotation — critical for squat and lunge mechanics.",
 "Couch Stretch":"Back knee on floor, rear foot against wall behind you. Upright torso, drive hips forward.\n★ PRIORITY: one of the most effective hip flexor stretches. Hold the full prescribed time.",
 "Child's Pose":"Kneel, sit back on heels, arms extended forward on floor. Breathe deeply into your back.\n★ ACTIVE STRETCH: breathe into the resistance — don't just lie there.",
 "Spinal Twist":"Lie on back. Pull one knee across your body toward the floor on the opposite side. Extend opposite arm out. Shoulders stay on floor.\n★ lumbar rotation and IT band release.",
 "Pigeon Pose":"From push-up position, bring one knee forward toward same-side wrist. Extend rear leg. Lower hips toward floor.\n★ PRIORITY AREA: glute and external hip rotator. One of the most important stretches in this program.",
 "Band chest press":"Anchor band at chest height behind you. Hold both ends, press forward to full extension. Control the return.\n★ chest and anterior deltoid — use enough resistance to feel it working at 10-12 reps.",
 "Band rows":"Anchor band in front. Row both hands toward your lower ribs, elbows driven back. Squeeze shoulder blades.\n★ mid-back. Shoulders stay down — not shrugging up.",
 "Band overhead press":"Stand on the band, press overhead from shoulder height. Don't lean back.\n★ deltoids. Same mechanics as a DB press.",
 "Band pull-aparts":"Hold band at shoulder height with wide grip. Pull both ends apart, bringing hands to sides. Squeeze shoulder blades.\n★ rear delts and upper back — key for shoulder health.",
 "Band curls":"Stand on the band, curl as you would with dumbbells. High reps compensate for lower resistance.\n★ bicep. Full range of motion.",
 "Band tricep pushdowns":"Anchor band high. Press down, elbows pinned to sides.\n★ tricep — no flaring, no leaning forward.",
 "Lateral band walks":"Band at ankles or knees. Slight squat. Step laterally keeping tension in band. Feet never come together.\n★ glute medius — the side of the glute. Key for knee stability.",
 "Monster walks":"Band at ankles, slight squat. Walk forward and backward maintaining tension.\n★ hip abductors and glutes — injury prevention work.",
 "Banded glute bridge":"Band above the knees. Perform glute bridge with the band providing resistance.\n★ glutes harder than standard bridge — working in two planes.",
 "Band good mornings":"Band across upper back. Hinge at hips with slight knee bend. Return to standing.\n★ hamstrings and lower back — move from hip, not spine.",
 "Jumping jacks":"Full arm and leg extension at the top. Classic.\n★ PURPOSE: rapid warm-up or cardio gap filler.",
 "High knees":"Drive knees up alternately with arms in opposition. Don't shuffle — drive upward.\n★ hip flexors and calves. Keep pace up.",
 "Burpees":"Squat down, place hands, jump feet to push-up position, push-up, jump feet forward, stand and jump with arms overhead.\n★ FULL REP: push-up must touch floor, jump must leave the ground. No shortcuts.",
 "Skater hops":"Lateral jumps from foot to foot, reaching opposite hand toward landing foot. Absorb each landing with bent knee.\n★ lateral power and single-leg stability.",
 "Star jumps":"Jump from standing to spread-eagle in the air, arms and legs wide. Land softly.\n★ PURPOSE: high-intensity burst. Full extension counts.",
 "Shadow boxing":"On balls of feet, knees slightly bent. Mix jabs, crosses, hooks. Hands up.\n★ PURPOSE: cardio requiring coordination — harder than it looks when done properly.",
 "Rower steady":"20 minutes at RPE 6 — steady state aerobic work. Lock in a pace and hold it.\n★ STROKE RATE: 20-22 spm for aerobic work. Slower and more powerful, not faster and weaker.",
 "Rower intervals":"Work at hard effort, rest easy. Consistent splits are the goal.\n★ ROWER FORM: legs first, then back, then arms. Recover in reverse.",
 "Treadmill steady":"Sustained pace for the prescribed duration. RPE 5-6.\n★ IF IT FEELS EASY: increase incline by 1-2% rather than speed. Safer and more effective.",
 "Cool Down":"After a hard session your heart rate is elevated and muscles are loaded. Don't just stop — a proper cooldown brings your heart rate down gradually and begins the recovery process.\n★ WHAT TO DO: 3-5 minutes walking or very light movement to let heart rate drop. Then spend 8-10 minutes on the muscles you just trained — hold each stretch 45-90 seconds. Don't rush. This is when flexibility improves.",
 "Cool Down + Mobility":"After today's session, you need both heart rate reduction AND dedicated mobility work. Walk or pace lightly for 3-5 minutes first, then move through the following sequence:\n1. Hip flexor stretch — 90 sec each side (priority every time)\n2. Figure 4 / pigeon — 90 sec each side (glutes and external rotators)\n3. Hamstring stretch — 60 sec each leg\n4. Thoracic rotation — 10 reps each side\n5. Child's pose — 90 sec breathing into the stretch\n6. Couch stretch — 90 sec each side (quad + hip flexor together)\n★ TIME: this takes the full 15 minutes if done properly. Don't cut it short.",
 "Full Mobility Routine":"This is your dedicated 20-minute mobility block. Move through the full sequence with intention — not rushing.\nSEQUENCE:\n1. Hip flexor stretch — 90 sec each side\n2. Pigeon pose or Figure 4 — 90 sec each side\n3. Couch stretch — 90 sec each side\n4. Deep squat hold — 60 sec\n5. Thoracic rotation — 10 reps each side\n6. 90/90 hip switch — 10 reps each side\n7. Hamstring stretch — 60 sec each leg\n8. Child's pose — 90 sec\n9. Spinal twist — 60 sec each side\n★ WHY: your hip flexors, glutes, and thoracic spine are your three biggest limiters in this program. This session directly addresses all three.",
};

function toggleExDesc(key){
 S.expandedEx[key]=!S.expandedEx[key];
 renderMain();
}

function renderExRow(ex, prefix){
 const tm=TM[ex.t||ex.type]||TM.bw;
 const name=ex.n||ex.name||'';
 const detail=ex.d||ex.detail||'';
 const note=ex.note||'';
 const key=(prefix||'')+name;
 const isOpen=!!S.expandedEx[key];
 const desc=EX_DESC[name];
 const pregAvoid=isPregnancyMode()&&PREGNANCY_AVOID.includes(name);
 const pregMod=isPregnancyMode()&&!pregAvoid&&PREGNANCY_MODIFY[name];
 const esc=key.replace(/'/g,"\\'");
 return `<div class="ex-row${desc?' has-desc':''}" ${desc?`onclick="toggleExDesc('${esc}')"`:''}>
  <span class="ex-tag" style="color:${tm.c};border-color:${tm.c}">${tm.label}</span>
  <div style="flex:1;min-width:0">
   <div class="ex-name">${name}</div>
   <div class="ex-detail">${detail}</div>
   ${note?`<div class="ex-note">${note}</div>`:''}
   ${pregAvoid?`<div style="font-family:var(--mono);font-size:9px;color:var(--red);letter-spacing:1px;margin-top:4px">⚠ SKIP — NOT SAFE IN PREGNANCY</div>`:''}
   ${pregMod?`<div style="font-family:var(--mono);font-size:9px;color:var(--amber);letter-spacing:1px;margin-top:4px">🤰 MODIFY: ${pregMod}</div>`:''}
  </div>
  ${desc?`<span class="ex-toggle${isOpen?' open':''}">${isOpen?'−':'+'}</span>`:''}
 </div>
 ${isOpen&&desc?`<div class="ex-desc">
  ${desc.split('\n').map(line=>line.startsWith('★')?`<span class="ex-desc-cue">${line}</span>`:`<div class="ex-desc-text">${line}</div>`).join('')}
 </div>`:''}`
}

// AI PLAN BUILDER
// ============================================================
let PB = {
  step: 'start',
  answers: {},
  generatedPlan: null,
  error: null,
  loading: false,
};

const PB_QUESTIONS = [
  {id:'goal',   label:'WHAT IS YOUR GOAL?',
   opts:['Build muscle and strength','Lose fat and get lean','Improve fitness and endurance','General health and feel better']},
  {id:'days',   label:'HOW MANY DAYS PER WEEK?',
   opts:['2 days','3 days','4 days','5 days','6 days']},
  {id:'duration',label:'HOW LONG IS YOUR PROGRAM?',
   opts:['4 weeks','6 weeks','8 weeks','12 weeks']},
  {id:'equip',  label:'WHAT EQUIPMENT DO YOU HAVE?',
   opts:['Bodyweight only','Dumbbells','Dumbbells + bench','Full home gym','Commercial gym']},
  {id:'level',  label:'TRAINING EXPERIENCE?',
   opts:['Complete beginner','Some experience','Intermediate','Advanced']},
  {id:'focus',  label:'ANY SPECIFIC FOCUS?',
   opts:['Upper/lower split','Push/pull/legs','Full body each session','Athletic and conditioning','Cardio focus']},
];


function pbSetStep(step){PB.step=step;renderMain();}
function pbSetMode(mode){S.planMode=mode;renderMain();}
function pbGoToday(){PB.step='start';S.planMode='myplan';renderMain();setTab('today');}
function pbGoMyPlan(){PB.step='start';S.planMode='myplan';renderMain();}
function pbStartQuestions(){PB.step='questions';PB.answers={};renderMain();}
function pbRegenerate(){buildAIPlan();}
function pbChangeAnswers(){PB.step='questions';PB.generatedPlan=null;renderMain();}
function pbClickImport(){document.getElementById("import-plan-file").click();}
function pbResetProfile(){if(confirm("Reset profile? Your data stays intact.")){localStorage.removeItem(USER_KEY);location.reload();}}
function pbDeletePlan(){if(confirm('Delete your current plan? Logs stay intact.')){deletePlan();S.planMode='myplan';renderMain();}}
function pbSetAnswer(k,v){PB.answers[k]=v;renderMain();}
function pbBack(){const keys=Object.keys(PB.answers);if(keys.length){delete PB.answers[keys[keys.length-1]];}else{S.planMode='myplan';}renderMain();}
function pbClearError(){PB.error=null;PB.step='questions';renderMain();}
function renderPlanBuilder(){
  if(PB.loading) return '<div style="padding:60px 24px;text-align:center"><div class="spinner" style="margin-bottom:16px"></div><div style="font-family:var(--mono);font-size:11px;letter-spacing:2px;color:var(--text2)">BUILDING YOUR PLAN...</div><div style="font-family:var(--body);font-size:13px;color:var(--text3);margin-top:8px">This takes about 10 seconds</div></div>';
  if(PB.error) return '<div style="padding:24px 16px"><div style="font-family:var(--mono);font-size:11px;color:var(--red);margin-bottom:12px">COULD NOT BUILD PLAN</div><div style="font-family:var(--body);font-size:14px;color:var(--text2);margin-bottom:16px;line-height:1.5">'+PB.error+'</div><button class="action-btn secondary" onclick="pbClearError()">← TRY AGAIN</button></div>';
  if(PB.step==='review'&&PB.generatedPlan) return renderPlanReview();
  if(PB.step==='saved') return '<div style="padding:24px 16px;text-align:center"><div style="font-family:var(--display);font-size:32px;letter-spacing:3px;color:var(--green);margin-bottom:8px">PLAN SAVED</div><div style="font-family:var(--body);font-size:15px;color:var(--text2);margin-bottom:24px;line-height:1.6">Your plan is live. TODAY shows your scheduled sessions.</div><button class="action-btn" onclick="pbGoToday()">GO TO TODAY</button><button class="action-btn secondary" onclick="pbGoMyPlan()">VIEW MY PLAN</button></div>';

  if(PB.step==='questions'){
    const answered=Object.keys(PB.answers).length;
    const total=PB_QUESTIONS.length;
    const current=PB_QUESTIONS[answered];
    if(!current){
      return '<div style="padding:24px 16px"><div style="font-family:var(--mono);font-size:10px;letter-spacing:3px;color:var(--amber);margin-bottom:16px">READY TO BUILD</div><div style="margin-bottom:16px">'+
        PB_QUESTIONS.map(q=>'<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)"><div style="font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:1px">'+q.label+'</div><div style="font-family:var(--body);font-size:13px;color:var(--text)">'+(PB.answers[q.id]||'—')+'</div></div>').join('')+
        '</div><button class="action-btn amber" onclick="pbRegenerate()">BUILD MY PLAN</button><button class="action-btn secondary" onclick="PB.answers={};renderMain()">START OVER</button></div>';
    }
    const progress=Math.round(answered/total*100);
    return '<div style="padding:24px 16px">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'+
      '<div style="font-family:var(--mono);font-size:10px;letter-spacing:3px;color:var(--amber)">'+(answered+1)+' OF '+total+'</div>'+
      '<button onclick="pbBack()" style="background:none;border:none;font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--text3);cursor:pointer">← BACK</button></div>'+
      '<div style="height:3px;background:var(--bg3);margin-bottom:20px"><div style="width:'+progress+'%;height:100%;background:var(--amber);transition:width .3s"></div></div>'+
      '<div style="font-family:var(--display);font-size:22px;letter-spacing:2px;color:var(--text);margin-bottom:16px">'+current.label+'</div>'+
      current.opts.map(function(opt){return '<button class="gen-option" onclick="pbSetAnswer('+JSON.stringify(current.id)+','+JSON.stringify(opt)+')">'+ opt +'</button>';}).join('')+
      '</div>';
  }

  // step === start
  const hasPlan=hasCustomPlan();
  return '<div style="padding:24px 16px">'+
    '<div style="font-family:var(--display);font-size:26px;letter-spacing:2px;color:var(--text);margin-bottom:6px">BUILD A PLAN</div>'+
    '<div style="font-family:var(--body);font-size:15px;color:var(--text2);margin-bottom:20px;line-height:1.5">Answer 6 quick questions. The app builds a custom training plan for you.</div>'+
    '<button class="action-btn amber" onclick="pbStartQuestions()">START PLAN BUILDER</button>'+
    (hasPlan?'<button class="action-btn red" style="margin-top:8px" onclick="pbDeletePlan()">DELETE CURRENT PLAN</button>':'')+
    '<button class="action-btn secondary" onclick="exportAllData()" style="margin-top:8px">EXPORT BACKUP</button>'+
    '<button class="action-btn secondary" onclick="pbClickImport()" style="margin-top:4px">IMPORT BACKUP</button>'+
    '<input type="file" id="import-plan-file" accept=".json" style="display:none" onchange="handleImportFile(this)">'+
    '</div>';
}

async function buildAIPlan_unused(){
  PB.loading=true;PB.error=null;PB.generatedPlan=null;renderMain();
  const a=PB.answers;
  const prompt='Create a structured training plan. Requirements: Goal: '+a.goal+'. Days/week: '+a.days+'. Duration: '+a.duration+'. Equipment: '+a.equip+'. Level: '+a.level+'. Split: '+a.focus+'. Return ONLY valid JSON: {"title":"Plan name","summary":"One sentence","phases":[{"id":0,"title":"PHASE NAME","short":"SHORT","weeks":"Wks 1-4","durationDays":28,"color":"#7a8c5e","tagline":"Focus","dowMap":{"1":0,"3":1,"5":2},"schedule":[{"day":"MON","label":"Session name","tag":"TYPE","exercises":[{"n":"Exercise","d":"3 x 10 cue","t":"lift","log":true}]}]}]}. Rules: dowMap maps JS day-of-week (0=Sun) to schedule index. t values: warmup|bw|lift|circuit|core|cardio|mob|cool. Add log:true to loggable exercises, ro:true for reps-only. durationDays = weeks*7. Use only '+a.equip+' appropriate exercises. Scale to '+a.level+'.';
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:4000,system:'You are a fitness coach. Output ONLY valid JSON. No markdown, no explanation.',messages:[{role:'user',content:prompt}]})});
    if(!res.ok) throw new Error('API '+res.status);
    const data=await res.json();
    const text=data.content?.find(b=>b.type==='text')?.text||'';
    const plan=JSON.parse(text.replace(/\`\`\`json|\`\`\`/g,'').trim());
    if(!plan.phases||!Array.isArray(plan.phases)) throw new Error('Invalid structure');
    plan.phases.forEach((ph,i)=>{ph.id=i;ph.color=ph.color||['#7a8c5e','#8c7a4a','#8c5a3a','#8c3a3a','#5a3a8c'][i%5];ph.schedule=ph.schedule||[];});
    PB.generatedPlan=plan;PB.step='review';PB.loading=false;renderMain();
  }catch(e){
    PB.loading=false;PB.error='Could not generate. Check connection. ('+e.message+')';PB.step='questions';renderMain();
  }
}

function getSearchableExercises(){
  const names=new Set();
  PHASES.forEach(ph=>ph.schedule.forEach(day=>day.exercises.forEach(ex=>names.add(ex.n))));
  Object.keys(EX_DESC).forEach(n=>names.add(n));
  Object.values(EX_LIB).forEach(arr=>arr.forEach(ex=>names.add(ex.n)));
  return[...names].sort();
}
function customSearch(q){
  if(!q||q.length<2){S.custom.searchResults=[];renderMain();return;}
  const ql=q.toLowerCase();
  S.custom.searchResults=getSearchableExercises().filter(n=>n.toLowerCase().includes(ql)).slice(0,8);
  renderMain();
}
function customAddExercise(name){
  if(S.custom.exercises.find(e=>e.name===name))return;
  let type='lift';
  PHASES.forEach(ph=>ph.schedule.forEach(day=>day.exercises.forEach(ex=>{if(ex.n===name)type=ex.t;})));
  Object.values(EX_LIB).forEach(arr=>arr.forEach(ex=>{if(ex.n===name)type=ex.t;}));
  const repsOnly=type==='cardio'||type==='mob'||type==='cool'||type==='warmup';
  S.custom.exercises.push({name,type,sets:[{reps:'',weight:'',done:false}],repsOnly});
  S.custom.search='';S.custom.searchResults=[];S.custom.activeEx=name;
  renderMain();
}
function customAddFreeform(){
  const name=S.custom.search.trim();if(!name)return;
  if(S.custom.exercises.find(e=>e.name===name)){S.custom.search='';S.custom.searchResults=[];renderMain();return;}
  S.custom.exercises.push({name,type:'lift',sets:[{reps:'',weight:'',done:false}],repsOnly:false});
  S.custom.search='';S.custom.searchResults=[];S.custom.activeEx=name;
  renderMain();
}
function customRemoveExercise(name){
  S.custom.exercises=S.custom.exercises.filter(e=>e.name!==name);
  if(S.custom.activeEx===name)S.custom.activeEx=null;
  renderMain();
}
function customAddSet(name){const ex=S.custom.exercises.find(e=>e.name===name);if(ex){ex.sets.push({reps:'',weight:'',done:false});renderMain();}}
function customRemoveSet(name,i){const ex=S.custom.exercises.find(e=>e.name===name);if(ex&&ex.sets.length>1){ex.sets.splice(i,1);renderMain();}}
function customUpdateSet(name,i,f,v){const ex=S.custom.exercises.find(e=>e.name===name);if(ex)ex.sets[i][f]=v;}
function customToggleDone(name,i){const ex=S.custom.exercises.find(e=>e.name===name);if(ex){ex.sets[i].done=!ex.sets[i].done;renderMain();}}
function customToggleDoneOnly(name){const ex=S.custom.exercises.find(e=>e.name===name);if(ex){ex.sets[0].done=!ex.sets[0].done;renderMain();}}

function changeLogDate(v){S.logDate=v;const ex=getLogEntry(v);if(ex&&ex.phaseId>=0){S.logPhase=ex.phaseId;S.logDay=ex.dayIdx;S.logSets=ex.sets;S.logNotes=ex.notes||'';}else{const pi=getPhaseForDate(v);const di=getDayIdxForDate(v,pi>=0?pi:0);if(pi>=0)S.logPhase=pi;if(di>=0)S.logDay=di;initLogSets(S.logPhase,S.logDay);}renderMain();}
function changeLogPhase(v){S.logPhase=parseInt(v);S.logDay=0;if(S.logPhase<getPlanPhases().length){initLogSets(S.logPhase,S.logDay);}renderMain();}
function changeLogDay(v){S.logDay=parseInt(v);initLogSets(S.logPhase,S.logDay);renderMain();}
function saveWorkout(){
  saveLogEntry(S.logDate,S.logPhase,S.logDay,S.logSets,S.logNotes,null);
  S.squadShareShown=false;S.squadShareOk=false;S.squadShareCopied=false;
  const btn=document.getElementById('save-btn');
  if(btn){btn.textContent='✓ SAVED';btn.classList.add('saved');}
  setTimeout(()=>{if(btn){btn.textContent='SAVE WORKOUT';btn.classList.remove('saved');}},1800);
  renderMain();
}
function saveAndShareWorkout(){
  const ph=getPlanPhases()[S.logPhase]||getPlanPhases()[0];const day=ph.schedule[S.logDay]||ph.schedule[0];
  const exPairs=Object.entries(S.logSets);
  saveLogEntry(S.logDate,S.logPhase,S.logDay,S.logSets,S.logNotes,null);
  sendToSquad(day.label,ph.title+' · '+day.tag,getDayEst(day.label),exPairs,S.logNotes);
}

// Pick N random unique items from array
function pickN(arr, n) {
 const shuffled = [...arr].sort(() => Math.random() - 0.5);
 return shuffled.slice(0, Math.min(n, arr.length));
}

function buildWorkout(location, equipment, focus, duration) {
 const hasDB = location === 'home' || equipment.includes('dumbbells') || equipment.includes('hotel');
 const hasBands = equipment.includes('bands') || equipment.includes('hotel');
 const hasMachines = location === 'home' || equipment.includes('hotel');
 const bwOnly = !hasDB && !hasBands && !hasMachines;

 // Duration-based exercise counts
 const counts = {
  20: { warmup: 2, main: 4, finisher: 1, cool: 1 },
  30: { warmup: 3, main: 6, finisher: 1, cool: 2 },
  45: { warmup: 3, main: 8, finisher: 2, cool: 2 },
  60: { warmup: 4, main: 10, finisher: 2, cool: 3 },
 }[duration];

 let exercises = [];
 let title = '';
 let coachNote = '';

 // RECOVERY is special — all mobility
 if (focus === 'recovery') {
  title = `${duration}-Minute Recovery`;
  coachNote = "Recovery is not a soft session. It's injury prevention. Breathe through every stretch, move slow, respect the hold times.";
  exercises = [
   ...pickN(EX_LIB.warmup.filter(e => /cat-cow|hip circles|shoulder/i.test(e.n)), 2),
   ...pickN(EX_LIB.recovery, counts.main + 2),
   ...pickN(EX_LIB.cooldown, 1),
  ];
  return { title, coachNote, exercises };
 }

 // Warmup
 exercises.push(...pickN(EX_LIB.warmup, counts.warmup));

 // Main work based on focus + equipment
 let mainPool = [];
 if (focus === 'upper') {
  if (hasDB) mainPool.push(...EX_LIB.upper_db);
  if (hasBands) mainPool.push(...EX_LIB.upper_bands);
  mainPool.push(...EX_LIB.upper_bw);
  title = bwOnly ? 'Bodyweight Upper' : hasDB ? 'Dumbbell Upper' : 'Banded Upper';
  coachNote = bwOnly ? "No iron, no problem. Push every set to 2 reps shy of failure. Bodyweight still builds." : "Pick weights you can control with crisp form. Push the last 2 reps.";
 } else if (focus === 'lower') {
  if (hasDB) mainPool.push(...EX_LIB.lower_db);
  if (hasBands) mainPool.push(...EX_LIB.lower_bands);
  mainPool.push(...EX_LIB.lower_bw);
  title = bwOnly ? 'Bodyweight Lower' : hasDB ? 'Dumbbell Lower' : 'Banded Lower';
  coachNote = "Legs built mine, they'll build yours. Full range on every rep — no half squats.";
 } else if (focus === 'full') {
  const upperP = hasDB ? EX_LIB.upper_db : hasBands ? EX_LIB.upper_bands : EX_LIB.upper_bw;
  const lowerP = hasDB ? EX_LIB.lower_db : hasBands ? EX_LIB.lower_bands : EX_LIB.lower_bw;
  const upperCount = Math.ceil(counts.main / 2);
  const lowerCount = Math.floor(counts.main / 2);
  exercises.push(...pickN(upperP, upperCount));
  exercises.push(...pickN(lowerP, lowerCount));
  exercises.push(...pickN(EX_LIB.core, 2));
  title = 'Full Body';
  coachNote = "Compound sessions build the most in the least time. Rest 60 sec between sets — keep moving.";
 } else if (focus === 'cardio') {
  if (hasMachines) {
   exercises.push(...pickN(EX_LIB.cardio_machine, 1));
  }
  exercises.push(...pickN(EX_LIB.cardio_bw, counts.main - (hasMachines ? 1 : 0)));
  exercises.push(...pickN(EX_LIB.core, 2));
  title = hasMachines ? 'Mixed Cardio' : 'Bodyweight Conditioning';
  coachNote = "Cardio builds the base that makes every lift feel easier. Push hard, recover fast, repeat.";
 }

 // For upper/lower, add main work from pool
 if (focus === 'upper' || focus === 'lower') {
  exercises.push(...pickN(mainPool, counts.main));
  // Add core if time allows
  if (counts.main >= 6) exercises.push(...pickN(EX_LIB.core, 2));
 }

 // Finisher for longer workouts
 if (counts.finisher > 0 && focus !== 'cardio') {
  const finisherPool = bwOnly ? EX_LIB.cardio_bw : [...EX_LIB.cardio_bw, ...EX_LIB.cardio_machine.slice(0, 2)];
  exercises.push(...pickN(finisherPool, counts.finisher));
 }

 // Cooldown
 exercises.push(...pickN(EX_LIB.cooldown.concat(EX_LIB.recovery.slice(0, 3)), counts.cool));

 return { title: `${duration}-Min ${title}`, coachNote, exercises };
}

function generateWorkout() {
 G.loading = true;
 G.result = null;
 G.error = null;
 renderMain();
 setTimeout(() => {
  try {
   if (isPregnancyMode()) {
     G.result = buildPregnancyWorkout(G.focus, G.duration);
   } else {
     G.result = buildWorkout(G.location, G.equipment, G.focus, G.duration);
   }
   G.loading = false;
   renderMain();
  } catch (err) {
   G.loading = false;
   G.error = 'Could not generate. Please try different options.';
   renderMain();
  }
 }, 400);
}
function logGeneratedWorkout(){
 if(!G.result)return;
 const sets={};(G.result.exercises||[]).forEach(ex=>{if(ex.t!=='warmup'&&ex.t!=='cool'&&ex.t!=='mob')sets[ex.n]=[{reps:'',weight:'',done:false}];});
 S.logDate=todayStr();S.logPhase=Math.max(0,getPhaseForDate(todayStr()));S.logDay=0;S.logSets=sets;S.logNotes=`Generated: ${G.result.title} (${G.location==='home'?'home':'away'}, ${G.focus}, ${G.duration}min)`;
 setTab('log');
}

function renderHistoryBlock(){
 const logs=Object.entries(loadStore());const skips=getSkips();const moves=getMoves();
 const allDates=new Set([...logs.map(l=>l[0]),...Object.keys(skips),...Object.keys(moves)]);
 const sorted=[...allDates].sort((a,b)=>b.localeCompare(a));
 if(sorted.length===0)return`<div style="padding:30px 0;text-align:center;font-family:var(--mono);font-size:18px;letter-spacing:2px;color:var(--text2);line-height:2">NO WORKOUTS LOGGED YET.<br><br>START TODAY.</div>`;
 const logStore=loadStore();
 return sorted.map(date=>{
  const log=logStore[date];const skip=skips[date];const move=moves[date];
  const{dow,full}=fmtDate(date);const isOpen=S.histOpen[date];
  if(skip&&!log){
   const ph=(skip.phaseId>=0?getPlanPhases()[skip.phaseId]:null);const day=ph?.schedule?.[skip.dayIdx];
   return`<div class="hist-entry" style="border-color:${skip.type==='skipped'?'var(--red-border)':'var(--amber-border)'}">
    <div class="hist-head" onclick="S.histOpen['${date}']=!S.histOpen['${date}'];renderMain()">
     <div><div class="hist-date">${dow} · ${full}</div><div class="hist-sub">${day?day.label:''} <span class="${skip.type==='skipped'?'skipped-pill':'moved-pill'}">${skip.type==='skipped'?'SKIPPED':'MOVED'}</span>${skip.movedTo?` → ${fmtDate(skip.movedTo).short}`:''}</div></div>
     <div class="hist-chevron ${isOpen?'open':''}">▼</div>
    </div>
    <div class="hist-body ${isOpen?'open':''}">${skip.type==='skipped'?`<div style="font-family:var(--body);font-size:17px;color:var(--red);margin-bottom:8px">Session skipped.</div>`:`<div style="font-family:var(--body);font-size:17px;color:var(--amber);margin-bottom:8px">Moved to ${fmtDate(skip.movedTo||date).short}.</div>`}<button class="action-btn secondary" style="padding:8px;font-size:17px" onclick="undoSkip('${date}')">UNDO</button></div>
   </div>`;
  }
  if(!log)return'';
  const ph=(log.phaseId>=0?getPlanPhases()[log.phaseId]:null);const day=ph?.schedule?.[log.dayIdx];
  const allSets=Object.values(log.sets||{}).flat();const done=allSets.filter(s=>s.done).length;
  return`<div class="hist-entry">
   <div class="hist-head" onclick="S.histOpen['${date}']=!S.histOpen['${date}'];renderMain()">
    <div><div class="hist-date">${dow} · ${full}</div><div class="hist-sub">${ph?ph.short:''} — ${day?day.label:''} · ${done}/${allSets.length} sets${move?` <span class="moved-pill">MOVED IN</span>`:''}</div></div>
    <div class="hist-chevron ${isOpen?'open':''}">▼</div>
   </div>
   <div class="hist-body ${isOpen?'open':''}">${Object.entries(log.sets||{}).map(([exName,sets])=>`<div style="margin-bottom:8px"><div class="hist-ex-name">${exName}</div>${sets.map((s,i)=>`<div class="hist-set ${s.done?'done-set':''}">Set ${i+1}:${s.reps?' '+s.reps+' reps':''}${s.weight&&s.weight!='0'?' @ '+s.weight+'lbs':''}${s.done?' ✓':''}</div>`).join('')}</div>`).join('')}${log.notes?`<div class="hist-notes-text">"${log.notes}"</div>`:''}<button class="action-btn secondary" style="margin-top:8px;padding:8px;font-size:17px" onclick="editLog('${date}',${log.phaseId},${log.dayIdx})">EDIT</button></div>
  </div>`;
 }).join('');
}

function formatDateDisplay(ds){
  const d=parseDate(ds);
  const days=['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const months=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  return {dow:days[d.getDay()],full:months[d.getMonth()]+' '+d.getDate()+', '+d.getFullYear()};
}
function renderToday(){
  if(S.showGoalCreator) return '<div class="fade-in">'+renderGoalCreator()+'</div>';
  const dateStr=todayStr();
  const {dow,full}=formatDateDisplay(dateStr);
  const phaseIdx=getPhaseForDate(dateStr);
  const phases=getPlanPhases();
  const pi=phaseIdx>=0?phaseIdx:-1;
  const ph=pi>=0?phases[pi]:null;
  const logged=getLogEntry(dateStr);
  const checkin=getCheckin(dateStr);
  const settings=getSettings();
  const startDate=getStartDate();

  // Header
  let html=`<div class="today-head">
   <div class="today-dayname">${dow} — WK ${getWeekNum(dateStr)}</div>
   <div class="today-date">${full}</div>
   ${pi>=0?`<div style="margin-top:8px;font-family:var(--mono);font-size:11px;letter-spacing:2px;color:var(--text2)"><span class="phase-dot" style="background:${ph.color}"></span>PHASE ${pi+1} — ${ph.title}${isPregnancyMode()?' <span style="color:var(--amber)">· PREGNANCY SAFE</span>':''}</div>`:''}
  </div>`;

  // Check-in strip
  html+=renderCheckinStrip(dateStr,checkin);

  // Goal strip
  html+=renderGoalStrip();

  // Week briefing (for users with the built-in 14-week plan or similar)
  if(ph&&ph.briefings){html+=renderBriefing(pi,ph);}

  // Settings panel
  if(S.showSettings){html+=renderSettingsPanel(settings,phases);}

  // Settings toggle at bottom
  html+=`<div style="padding:16px 16px 0;text-align:center">
   <button onclick="S.showSettings=!S.showSettings;renderMain()" style="background:none;border:none;font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--text3);cursor:pointer">
    ${S.showSettings?'▲ CLOSE SETTINGS':'PROGRAM SETTINGS'}
   </button>
  </div>
  <div style="height:30px"></div>`;

  return html;
}

      <span class="checkin-title">CHECK-IN</span>

function getCheckin(dateStr){
  try{const all=JSON.parse(localStorage.getItem(CHECKIN_KEY)||'{}');return all[dateStr]||null;}

}
function saveCheckinNow(){
  const d=S.checkinDraft;
  if(d.sleep===null||d.energy===null||d.pain===null)return;
  const all=JSON.parse(localStorage.getItem(CHECKIN_KEY)||'{}');
  all[todayStr()]={sleep:d.sleep,energy:d.energy,pain:d.pain,ts:Date.now()};
  localStorage.setItem(CHECKIN_KEY,JSON.stringify(all));
  S.checkinOpen=false;
  S.checkinDraft={sleep:null,energy:null,pain:null};
  renderMain();
}
